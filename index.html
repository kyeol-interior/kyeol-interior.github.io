<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KYEOL</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Montserrat:wght@300;500&display=swap" rel="stylesheet">

<style>
body, html {
  margin: 0;
  padding: 0;
  height: 100%;
  overflow: hidden;
  font-family: 'Montserrat', sans-serif;
}

/* 🔥 공통 화면 */
.screen {
  position: fixed;
  width: 100%;
  height: 100%;
  transition: 1s ease;
}

/* 🎬 메인 화면 */
.main-screen {
  z-index: 2;
}

/* 영상 */
.video-bg {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* 어둡게 */
.overlay {
  position: absolute;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.4);
}

/* 중앙 텍스트 */
.center-text {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  color: white;
  text-align: center;
  cursor: pointer;
}

.center-text h1 {
  font-size: 60px;
  letter-spacing: 8px;
  font-family: 'Playfair Display', serif;
}

.center-text p {
  font-size: 14px;
  opacity: 0.8;
}

/* 🔥 내부 화면 */
.second-screen {
  background: #111;
  color: white;
  z-index: 1;
  opacity: 0;
  transform: scale(1.1);
}

/* 내부 메뉴 */
.inner-menu {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  text-align: center;
}

.inner-menu a {
  display: block;
  margin: 20px 0;
  color: white;
  text-decoration: none;
  font-size: 20px;
  letter-spacing: 2px;
  transition: 0.3s;
}

.inner-menu a:hover {
  opacity: 0.5;
}
</style>
</head>

<body>

<!-- 🎬 메인 화면 -->
<div class="screen main-screen" id="main">

  <video class="video-bg" autoplay muted loop>
    <source src="15129223_2160_3840_30fps.mp4">
  </video>

  <div class="overlay"></div>

  <div class="center-text" onclick="enterSite()">
    <h1>KYEOL</h1>
    <p>CLICK TO ENTER</p>
  </div>

</div>

<!-- 🔥 내부 화면 -->
<div class="screen second-screen" id="second">

  <div class="inner-menu">
    <a href="#">ABOUT</a>
    <a href="#">PORTFOLIO</a>
    <a href="proposal.html">PROPOSAL</a>
    <a href="#">CONTACT</a>
  </div>

</div>

<script>
function enterSite() {
  document.getElementById("main").style.opacity = "0";
  document.getElementById("main").style.pointerEvents = "none";

  document.getElementById("second").style.opacity = "1";
  document.getElementById("second").style.transform = "scale(1)";
}
</script>

</body>
</html>
