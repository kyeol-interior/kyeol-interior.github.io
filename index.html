<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>결 실내건축</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f0f2f5;
    }

    header {
      background: #333;
      color: white;
      padding: 15px;
      text-align: center;
    }

    nav {
  background: #2c3e50;
      padding: 10px;
      text-align: center;
      position: sticky;
      top: 0;
    }

    nav a {
      color: white;
      margin: 0 10px;
      text-decoration: none;
      font-weight: bold;
        padding: 8px 12px;
  border-radius: 5px;
}
    }

    nav a:hover {
      color: yellow;
      background: rgba(255,255,255,0.2);
    }

    html {
      scroll-behavior: smooth;
    }

    .container {
      max-width: 1000px;
      margin: auto;
      padding: 20px;

      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }

    .box {
      background: white;
      padding: 20px;
      margin-bottom: 20px;
      border-radius: 15px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
      scroll-margin-top: 60px;
      text-align: center;
    }
.box {
  transition: all 0.3s ease;
}
    .box:hover {
  transform: translateY(-10px) scale(1.02);
  box-shadow: 0 10px 25px rgba(0,0,0,0.2);
}
    .box {
  line-height: 1.6;
}
    h1 {
      margin: 0;
    }

    h2 {
      margin-top: 0;
      color: #333;
    }

    img {
      width: 100%;
      border-radius: 10px;
    }

    button {
background: #3498db;
      color: white;
      padding: 20px 30px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 20px;
    }

    button:hover {
   background: #2980b9;
    }
    button {
  transition: all 0.3s ease;
}

button:hover {
  transform: scale(1.1);
}
button {
  margin: 5px;
}
    footer {
      background: #333;
      color: white;
      text-align: center;
      padding: 10px;
    }

    /* 👉 모바일 전용 (이것만 넣는 곳!) */
    @media (max-width: 600px) {
      .container {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>

<header>
  <h1>KYEOL INTERIOR</h1>
</header>

<nav>
  <a href="#home">홈</a>
  <a href="#about">소개</a>
  <a href="#contact">연락처</a>
</nav>

<div class="container">

  <div id="home" class="box">
    <h2>환영합니다 👋</h2>
    <p>이곳은 내가 만든 홈페이지입니다.</p>
    <button onclick="alert('환영합니다!')">클릭해보세요</button>
  </div>

 <div id="about" class="box">
  <h2>소개</h2>

  <button onclick="showTab('info')">소개</button>
  <button onclick="showTab('skill')">기술</button>

  <div id="info">
    <p>HTML과 CSS로 만든 사이트입니다.</p>
  </div>

  <div id="skill" style="display:none;">
    <p>HTML / CSS / JavaScript 공부 중</p>
  </div>

</div>
  <div id="contact" class="box">
    <h2>연락처</h2>
    <p>이메일: kyeol999@naver.com</p>
  </div>

</div>

<footer>
  <p>© 2026 내 홈페이지</p>
</footer>
<script>
  function showTab(tab) {
    document.getElementById("info").style.display = "none";
    document.getElementById("skill").style.display = "none";

    document.getElementById(tab).style.display = "block";
  }
</script>
</body>
</html>
