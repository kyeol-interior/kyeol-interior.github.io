<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KYEOL | (주)결</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500&family=Montserrat:wght@300&display=swap" rel="stylesheet">
    <style>
        /* 1. 기본 배경 및 여백 제거 */
        * { margin:0; padding:0; box-sizing:border-box; }
        body, html { width:100%; height:100%; background:#000; overflow:hidden; font-family:'Montserrat', sans-serif; }

        /* 2. 배경 영상: 최하단 강제 고정 */
        #video-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: -2; /* 가장 뒤로 보냄 */
        }

        /* 3. 영상 위에 깔리는 투명 덮개 (너무 어둡지 않게 조정) */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.25); /* 텍스트가 보일 정도의 최소한의 어둠 */
            z-index: -1;
        }

        /* 4. 메인 중앙 콘텐츠 */
        .main-frame {
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            cursor: pointer;
            text-decoration: none;
            color: #fff;
        }

        /* 중앙 'KYEOL' 타이틀 */
        .brand-name { 
            font-family: 'Playfair Display', serif; 
            font-size: 90px; 
            letter-spacing: 30px; 
            margin-right: -30px; 
            margin-bottom: 10px;
            line-height: 1.2;
            text-shadow: 0 0 25px rgba(0,0,0,0.6); /* 글자 테두리에 그림자를 줘서 영상과 분리 */
        }

        /* 서브 타이틀 */
        .sub-title { 
            font-size: 13px; 
            letter-spacing: 12px; 
            color: #fff; /* 흰색으로 강제 고정 */
            opacity: 0.8; 
            margin-bottom: 80px; 
        }

        /* 클릭 안내문 (밝게 수정) */
        .click-text { 
            font-size: 11px; 
            letter-spacing: 6px; 
            color: #fff; /* 어두웠던 색상을 순백색으로 변경 */
            font-weight: 500;
            border-bottom: 1.5px solid rgba(255,255,255,0.6); 
            padding-bottom: 6px; 
            opacity: 0.9;
        }

        /* 모바일 대응 */
        @media (max-width:768px) {
            .brand-name { font-size: 45px; letter-spacing: 15px; margin-right: -15px; }
            .sub-title { font-size: 9px; letter-spacing: 7px; }
        }
    </style>
</head>
<body>

    <video id="video-bg" autoplay muted loop playsinline preload="auto">
        <source src="./image/kyeol_video_optimized1.mp4" type="video/mp4">
    </video>

    <div class="overlay"></div>

    <a href="about.html" class="main-frame">
        <div class="brand-name">KYEOL</div>
        <div class="sub-title">ARCHITECTURE & INTERIOR</div>
        <div class="click-text">CLICK TO ENTER</div>
    </a>

    <script>
        // 영상 강제 실행 엔진
        window.onload = function() {
            var v = document.getElementById('video-bg');
            // 브라우저가 자동재생을 막을 경우 클릭 시 바로 재생되도록 설정
            var playVideo = function() {
                v.play();
                document.body.removeEventListener('click', playVideo);
                document.body.removeEventListener('touchstart', playVideo);
            };
            v.play().catch(function() {
                document.body.addEventListener('click', playVideo);
                document.body.addEventListener('touchstart', playVideo);
            });
        };
    </script>
</body>
</html>
