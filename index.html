<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KYEOL | (주)결</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500&family=Montserrat:wght@300&display=swap" rel="stylesheet">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body, html { width:100%; height:100%; background:#000; overflow:hidden; font-family:'Montserrat', sans-serif; }

        /* [1] 배경 영상: 다시 확실하게 바닥에 깔았습니다 */
        #bg-container { position:fixed; top:0; left:0; width:100%; height:100%; z-index:-10; }
        #bg-video { width:100%; height:100%; object-fit:cover; display:block; }
        .bg-overlay { position:absolute; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.35); z-index:-9; }

        /* [2] 좌측 SNS 메뉴 */
        .sns-ui { position:fixed; top:40px; left:40px; z-index:100; color:#fff; }
        .sns-ui h2 { font-size:12px; letter-spacing:4px; margin-bottom:20px; opacity:0.7; }
        .sns-ui a { display:block; color:#fff; text-decoration:none; font-size:10px; letter-spacing:3px; margin-bottom:12px; opacity:0.4; transition:0.3s; }
        .sns-ui a:hover { opacity:1; }

        /* [3] 메인 화면: 로고 이미지 삭제, 타이포그래피만 남김 */
        .viewport { width:100%; height:100vh; display:flex; align-items:center; justify-content:center; position:relative; z-index:10; }
        .main-btn { background:none; border:none; cursor:pointer; display:flex; flex-direction:column; align-items:center; outline:none; text-decoration:none; color:#fff; width:100%; }

        .brand-name { 
            font-family:'Playfair Display', serif; 
            font-size:90px; 
            letter-spacing:30px; 
            margin-right:-30px; 
            margin-bottom:15px; 
            line-height:1; 
            text-shadow: 0 0 30px rgba(0,0,0,0.5);
        }
        .sub-title { font-size:13px; letter-spacing:12px; opacity:0.5; margin-bottom:80px; text-transform:uppercase; }
        .click-text { font-size:10px; letter-spacing:5px; opacity:0.3; border-bottom:1px solid rgba(255,255,255,0.3); padding-bottom:5px; }

        /* 모바일 최적화 */
        @media (max-width:768px) {
            .sns-ui { top:30px; left:30px; }
            .brand-name { font-size:45px; letter-spacing:15px; margin-right:-15px; }
            .sub-title { font-size:9px; letter-spacing:7px; }
        }
    </style>
</head>
<body>

    <div id="bg-container">
        <video id="bg-video" autoplay muted loop playsinline preload="auto">
            <source src="./image/kyeol_video_optimized1.mp4" type="video/mp4">
        </video>
        <div class="bg-overlay"></div>
    </div>

    <div class="sns-ui">
        <h2>MY STUDIO</h2>
        <a href="https://blog.naver.com/rotte123" target="_blank">BLOG</a>
        <a href="https://pf.kakao.com/_bTIEX/friend" target="_blank">KAKAO</a>
    </div>

    <div class="viewport">
        <a href="about.html" class="main-btn">
            <div class="brand-name">KYEOL</div>
            <div class="sub-title">ARCHITECTURE & INTERIOR</div>
            <div class="click-text">CLICK TO ENTER</div>
        </a>
    </div>

    <script>
        // 영상 강제 재생 스크립트 (모바일 대응)
        window.onload = function() {
            var v = document.getElementById('bg-video');
            if (v) {
                v.play().catch(function() {
                    document.body.addEventListener('click', function() { v.play(); }, {once:true});
                    document.body.addEventListener('touchstart', function() { v.play(); }, {once:true});
                });
            }
        };
    </script>
</body>
</html>
