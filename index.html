<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KYEOL | (주)결</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500&family=Montserrat:wght@300&display=swap" rel="stylesheet">
    <style>
        /* [기초 공사] */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { width: 100%; height: 100%; background: #000; overflow: hidden; font-family: 'Montserrat', sans-serif; }

        /* [1. 배경 영상 - 가장 아래 바닥] */
        .bg-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; }
        video { width: 100%; height: 100%; object-fit: cover; }
        .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); }

        /* [2. SNS 메뉴 - 왼쪽 상단] */
        .sns-links { position: absolute; top: 40px; left: 40px; z-index: 10; }
        .sns-links h2 { color: #fff; font-size: 13px; letter-spacing: 4px; margin-bottom: 20px; opacity: 0.8; }
        .sns-links a { display: block; color: #fff; text-decoration: none; font-size: 10px; letter-spacing: 3px; margin-bottom: 12px; opacity: 0.5; transition: 0.3s; }
        .sns-links a:hover { opacity: 1; }

        /* [3. 중앙 브랜드 영역] */
        .main-wrapper { width: 100%; height: 100vh; display: flex; align-items: center; justify-content: center; text-align: center; color: #fff; }
        .content-box { cursor: pointer; border: none; background: none; outline: none; }
        
        /* 로고 가독성 핵심 필터 */
        .logo-img { width: 300px; filter: brightness(0) invert(1) drop-shadow(0 0 10px rgba(255,255,255,0.3)); margin-bottom: 10px; }
        .brand-text { font-family: 'Playfair Display', serif; font-size: 80px; letter-spacing: 25px; margin-right: -25px; line-height: 1; margin-bottom: 15px; }
        .sub-text { font-size: 12px; letter-spacing: 10px; opacity: 0.5; text-transform: uppercase; margin-bottom: 70px; }
        .click-enter { font-size: 10px; letter-spacing: 5px; opacity: 0.3; border-bottom: 1px solid rgba(255,255,255,0.3); padding-bottom: 5px; }

        /* [4. 2페이지 메뉴 화면] */
        #menu-page { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 100; }
        #menu-page a { color: #fff; text-decoration: none; font-size: 35px; margin: 20px 0; letter-spacing: 10px; opacity: 0.7; transition: 0.4s; }
        #menu-page a:hover { opacity: 1; letter-spacing: 15px; }
        .back-btn { position: absolute; top: 40px; left: 40px; color: #fff; font-size: 11px; letter-spacing: 4px; cursor: pointer; opacity: 0.5; }

        /* [모바일 마감 처리] */
        @media (max-width: 768px) {
            .sns-links, .back-btn { top: 30px; left: 30px; }
            .logo-img { width: 160px; }
            .brand-text { font-size: 38px; letter-spacing: 12px; margin-right: -12px; }
            .sub-text { font-size: 9px; letter-spacing: 6px; }
            #menu-page a { font-size: 22px; letter-spacing: 6px; }
        }
    </style>
</head>
<body>

    <div class="bg-container">
        <video autoplay muted loop playsinline>
            <source src="image/kyeol_video_optimized1.mp4" type="video/mp4">
        </video>
        <div class="overlay"></div>
    </div>

    <div class="sns-links" id="sns-ui">
        <h2>MY STUDIO</h2>
        <a href="https://blog.naver.com/rotte123" target="_blank">BLOG</a>
        <a href="https://pf.kakao.com/_bTIEX/friend" target="_blank">KAKAO</a>
    </div>

    <div class="main-wrapper" id="main-ui">
        <div class="content-box" onclick="openMenu()">
            <img src="image/logo.png" alt="결" class="logo-img">
            <div class="brand-text">KYEOL</div>
            <div class="sub-text">ARCHITECTURE & INTERIOR</div>
            <div class="click-enter">CLICK TO ENTER</div>
        </div>
    </div>

    <div id="menu-page">
        <div class="back-btn" onclick="closeMenu()">← BACK</div>
        <a href="about.html">ABOUT</a>
        <a href="portfolio.html">PORTFOLIO</a>
        <a href="proposal.html">PROPOSAL</a>
        <a href="contact.html">CONTACT</a>
    </div>

    <script>
        function openMenu() {
            document.getElementById('main-ui').style.display = 'none';
            document.getElementById('sns-ui').style.display = 'none';
            document.getElementById('menu-page').style.display = 'flex';
        }
        function closeMenu() {
            document.getElementById('menu-page').style.display = 'none';
            document.getElementById('main-ui').style.display = 'flex';
            document.getElementById('sns-ui').style.display = 'block';
        }
    </script>
</body>
</html>
