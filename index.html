<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>(주)결 | KYEOL Interior Design</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Noto+Sans+KR:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; -webkit-font-smoothing: antialiased; }
        body { background:#000; font-family: 'Noto Sans KR', sans-serif; overflow: hidden; height: 100vh; }

        nav { 
            position:fixed; top:0; width:100%; height:80px; 
            display:flex; justify-content:space-between; align-items:center; 
            padding:0 50px; background:transparent; z-index:1000; 
        }
        .logo { font-family: 'Playfair Display', serif; font-size:24px; font-weight:700; text-decoration:none; color:#fff; letter-spacing:4px; }
        .nav-links { display:flex; gap:35px; }
        .nav-links a { text-decoration:none; color:rgba(255,255,255,0.7); font-size:13px; letter-spacing:2px; font-weight:400; transition: 0.3s; }
        .nav-links a:hover { color:#fff; }

        .menu-btn { display: none; cursor: pointer; flex-direction: column; gap: 6px; z-index: 1002; }
        .menu-btn span { width: 22px; height: 2px; background: #fff; transition: 0.3s; }

        .mobile-nav {
            position: fixed; top: 0; left: 0; width: 100%; height: 100vh;
            background: #fff; display: none; flex-direction: column; 
            justify-content: center; align-items: center; z-index: 1100;
        }
        .mobile-nav a { padding: 20px; text-decoration: none; color: #111; font-size: 24px; font-weight: 700; }

        .video-background {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1; overflow: hidden;
        }
        .video-background video { width: 100%; height: 100%; object-fit: cover; filter: brightness(0.6); }

        .main-content {
            height: 100vh; display: flex; flex-direction: column;
            justify-content: center; align-items: center; text-align: center;
            color: #fff; padding: 0 20px; position: relative; z-index: 1;
        }
        .main-title { font-size: 56px; font-weight: 800; line-height: 1.2; margin-bottom: 25px; letter-spacing: -2px; word-break: keep-all; }
        .main-sub { font-size: 18px; font-weight: 300; letter-spacing: 5px; color: rgba(255,255,255,0.8); margin-bottom: 50px; }
        .enter-btn { padding: 15px 45px; border: 1px solid #fff; text-decoration: none; color: #fff; font-size: 13px; letter-spacing: 4px; transition: 0.4s; }
        .enter-btn:hover { background: #fff; color: #000; }

        @media (max-width: 1024px) {
            nav { padding: 0 25px; height: 70px; }
            .nav-links { display: none; } .menu-btn { display: flex; } 
            .main-title { font-size: 32px; }
        }
    </style>
</head>
<body>
    <nav>
        <a href="index.html" class="logo">KYEOL</a>
        <div class="nav-links">
            <a href="about.html">ABOUT</a>
            <a href="portfolio.html">PORTFOLIO</a>
            <a href="proposal.html">PROPOSAL</a>
            <a href="contact.html">CONTACT</a>
        </div>
        <div class="menu-btn" id="menuToggle"><span></span><span></span><span></span></div>
    </nav>
    <div class="mobile-nav" id="dropdown">
        <a href="about.html">ABOUT</a>
        <a href="portfolio.html">PORTFOLIO</a>
        <a href="proposal.html">PROPOSAL</a>
        <a href="contact.html">CONTACT</a>
    </div>
    <div class="video-background">
        <video autoplay muted loop playsinline preload="auto">
            <source src="./image/main_video.mp4" type="video/mp4">
        </video>
    </div>
    <div class="main-content">
        <h1 class="main-title">당신이 머무는 곳마다,<br>기분 좋은 결이 흐르도록.</h1>
        <p class="main-sub">INTERIOR DESIGN & ARCHITECTURE</p>
        <a href="about.html" class="enter-btn">ENTER VIEW</a>
    </div>
    <script>
        const menuToggle = document.getElementById('menuToggle');
        const dropdown = document.getElementById('dropdown');
        menuToggle.onclick = function(e) {
            e.stopPropagation();
            dropdown.style.display = (dropdown.style.display === 'flex') ? 'none' : 'flex';
        };
        window.onclick = function() { dropdown.style.display = 'none'; }
    </script>
</body>
</html>
