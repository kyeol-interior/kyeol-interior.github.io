<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KYEOL | (주)결</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body, html { width:100%; height:100%; background:#000; overflow:hidden; font-family: sans-serif; }
        
        /* 영상 레이어 */
        #video-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            object-fit: cover; z-index: -1;
        }

        /* 중앙 콘텐츠 */
        .main-frame {
            width: 100%; height: 100vh; display: flex; flex-direction: column;
            align-items: center; justify-content: center; text-align: center;
            text-decoration: none; color: #fff;
        }

        .brand-name { font-size: 80px; letter-spacing: 20px; font-weight: 700; margin-bottom: 10px; }
        .click-text { 
            font-size: 12px; letter-spacing: 5px; color: #fff !important; 
            border-bottom: 1px solid #fff; padding-bottom: 5px; margin-top: 50px;
        }

        @media (max-width:768px) {
            .brand-name { font-size: 40px; letter-spacing: 10px; }
        }
    </style>
</head>
<body>
    <video id="video-bg" autoplay muted loop playsinline>
        <source src="./image/kyeol_video_optimized1.mp4" type="video/mp4">
    </video>

    <a href="about.html" class="main-frame">
        <div class="brand-name">KYEOL</div>
        <div class="click-text">CLICK TO ENTER</div>
    </a>

    <script>
        // 브라우저 차단 강제 돌파 스크립트
        window.addEventListener('load', function() {
            var video = document.getElementById('video-bg');
            video.play().catch(function() {
                // 자동재생 막히면 화면 클릭 시 바로 재생
                document.body.addEventListener('click', function() {
                    video.play();
                }, {once: true});
            });
        });
    </script>
</body>
</html>
