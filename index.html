<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KYEOL | ARCHITECTURE & INTERIOR</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Montserrat:wght@300;500&display=swap" rel="stylesheet">
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: black; font-family: 'Montserrat', sans-serif; }
        
        /* [공통] 배경 영상: 화면 전체 고정 */
        .video-bg { 
            position: fixed !important; top: 0; left: 0; 
            width: 100vw !important; height: 100vh !important; 
            object-fit: cover !important; z-index: 1; filter: brightness(0.6);
        }
        .overlay { position: fixed; width: 100%; height: 100%; background: rgba(0,0,0,0.3); z-index: 2; transition: 1s; }

        /* [1페이지] SNS 메뉴 (왼쪽 상단) */
        .left-menu { position: fixed; left: 60px; top: 60px; z-index: 100; transition: 0.5s; }
        .left-menu h2 { color: white; font-size: 14px; opacity: 0.6; margin-bottom: 25px; letter-spacing: 4px; }
        .left-menu a { display: block; margin: 16px 0; font-size: 13px; color: white; text-decoration: none; letter-spacing: 3px; opacity: 0.8; transition: 0.3s; }
        .left-menu a:hover { opacity: 0.4; transform: translateX(6px); }

        /* [1페이지] 중앙 텍스트 */
        .main-screen { position: fixed; width: 100%; height: 100%; z-index: 10; display: flex; align-items: center; justify-content: center; transition: 1s; }
        .center-text { text-align: center; color: white; cursor: pointer; }
        .center-text h1 { font-size: 80px; letter-spacing: 14px; font-family: 'Playfair Display'; margin: 0; }
        .subtitle { font-size: 12px; letter-spacing: 6px; margin-top: 20px; opacity: 0.7; }
        .click-text { font-size: 10px; margin-top: 40px; letter-spacing: 4px; opacity: 0.5; }

        /* [2페이지] 메뉴 화면 (기본은 숨김) */
        .second-screen { position: fixed; width: 100%; height: 100%; z-index: 20; opacity: 0; pointer-events: none; transform: scale(1.1); transition: 1s; display: flex; align-items: center; justify-content: center; }
        .inner-menu a { display: block; margin: 35px 0; color: white; text-decoration: none; font-size: 24px; letter-spacing: 6px; text-align: center; opacity: 0; transform: translateY(20px); transition: 0.8s; }
        .inner-menu a.show { opacity: 1; transform: translateY(0); }
        .inner-menu a:hover { opacity: 0.5; }

        /* [2페이지] BACK 버튼 (왼쪽 상단 - SNS 메뉴 자리에 등장) */
        .back-btn { position: absolute; top: 60px; left: 60px; color: white; background: none; border: none; cursor: pointer; font-size: 11px; letter-spacing: 4px; opacity: 0.6; transition: 0.3s; z-index: 110; }
        .back-btn:hover { opacity: 1; }

        @media (max-width: 768px) {
            .left-menu, .back-btn { left: 30px; top: 40px; }
            .center-text h1 { font-size: 45px; }
            .inner-menu a { font-size: 18px; }
        }
    </style>
</head>
<body>

    <video class="video-bg" autoplay muted loop playsinline>
        <source src="image/kyeol_video_optimized.mp4" type="video/mp4">
    </video>
    <div class="overlay" id="main-overlay"></div>

    <div class="left-menu" id="sns-menu">
        <h2>MY STUDIO</h2>
        <a href="https://www.instagram.com/" target="_blank">INSTAGRAM</a>
        <a href="https://pf.kakao.com/_bTIEX/friend" target="_blank">KAKAO</a>
        <a href="https://blog.naver.com/rotte123" target="_blank">BLOG</a>
    </div>

    <div class="main-screen" id="main-page">
        <div class="center-text" onclick="enterSite()">
            <h1>KYEOL</h1>
            <div class="subtitle">ARCHITECTURE & INTERIOR</div>
            <div class="click-text">CLICK TO ENTER</div>
        </div>
    </div>

    <div class="second-screen" id="second-page">
        <button class="back-btn" onclick="goBack()">← BACK</button>
        <div class="inner-menu">
            <a href="about.html">ABOUT</a>
            <a href="portfolio.html">PORTFOLIO</a>
            <a href="proposal.html">PROPOSAL</a>
            <a href="contact.html">CONTACT</a>
        </div>
    </div>

   <script>
    // 1페이지(메인) -> 2페이지(메뉴) 들어갈 때
    function enterSite() {
        // 1페이지 요소들 숨기기
        const mainPage = document.getElementById('main-page');
        const snsMenu = document.getElementById('sns-menu');
        const secondPage = document.getElementById('second-page');
        const overlay = document.getElementById('main-overlay');

        if(mainPage) mainPage.style.display = 'none'; // 아예 안보이게 차단
        if(snsMenu) snsMenu.style.display = 'none';
        
        // 2페이지 요소들 나타내기
        if(secondPage) {
            secondPage.style.opacity = '1';
            secondPage.style.pointerEvents = 'auto';
            secondPage.style.transform = 'scale(1)';
            secondPage.style.display = 'flex'; // 화면에 표시
        }
        
        // 배경 흐리게(블러) 처리
        if(overlay) overlay.style.backdropFilter = 'blur(10px)';

        // 중앙 메뉴들 하나씩 나타나게 하기
        document.querySelectorAll('.inner-menu a').forEach((el, i) => {
            setTimeout(() => el.classList.add('show'), i * 150);
        });
    }

    // 2페이지(메뉴) -> 1페이지(메인) 뒤로 나갈 때 (여기가 핵심!)
    function goBack() {
        const mainPage = document.getElementById('main-page');
        const snsMenu = document.getElementById('sns-menu');
        const secondPage = document.getElementById('second-page');
        const overlay = document.getElementById('main-overlay');

        // 2페이지 다시 숨기기
        if(secondPage) {
            secondPage.style.opacity = '0';
            secondPage.style.pointerEvents = 'none';
            secondPage.style.transform = 'scale(1.1)';
            setTimeout(() => { secondPage.style.display = 'none'; }, 500); // 0.5초 뒤 완전히 제거
        }

        // 1페이지 다시 나타내기
        if(mainPage) {
            mainPage.style.display = 'flex'; 
            setTimeout(() => { mainPage.style.opacity = '1'; }, 10);
        }
        if(snsMenu) {
            snsMenu.style.display = 'block';
            setTimeout(() => { snsMenu.style.opacity = '1'; }, 10);
        }
        
        // 배경 흐림 제거
        if(overlay) overlay.style.backdropFilter = 'blur(0px)';

        // 메뉴 애니메이션 초기화
        document.querySelectorAll('.inner-menu a').forEach(el => {
            el.classList.remove('show');
        });
    }
</script>
</body>
</html>
