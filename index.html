<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KYEOL | INTERIOR DESIGN</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;700&family=Noto+Sans+KR:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background-color: #0a0a0a; font-family: 'Montserrat', 'Noto Sans KR', sans-serif; color: white; overflow: hidden; }
        
        /* 배경 영상: image 폴더 내부를 바라보도록 설정 */
        .video-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; }
        .video-bg video { width: 100%; height: 100%; object-fit: cover; opacity: 0.5; }

        /* 왼쪽 메뉴 스타일 (차장님 기존 스타일 복구) */
        .side-menu {
            position: absolute;
            top: 0;
            left: 0;
            width: 40%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding-left: 80px;
            box-sizing: border-box;
            z-index: 2;
        }

        .logo { 
            font-size: 32px; 
            font-weight: 700; 
            letter-spacing: 12px; 
            text-decoration: none; 
            color: white; 
            margin-bottom: 10px;
        }

        .sub-text {
            font-size: 13px;
            letter-spacing: 4px;
            color: #888;
            margin-bottom: 50px;
        }

        .nav-link {
            font-size: 14px;
            letter-spacing: 3px;
            text-decoration: none;
            color: rgba(255,255,255,0.5);
            margin-bottom: 20px;
            transition: 0.4s;
        }

        .nav-link:hover { color: white; padding-left: 10px; }

        /* 모바일 대응 */
        @media (max-width: 768px) {
            .side-menu { width: 100%; padding-left: 40px; text-align: left; }
        }
    </style>
</head>
<body>

    <div class="video-bg">
        <video autoplay muted loop playsinline>
            <source src="image/kyeol_video_optimized.mp4" type="video/mp4">
        </video>
    </div>

    <div class="side-menu">
        <a href="index.html" class="logo">KYEOL</a>
        <div class="sub-text">INTERIOR DESIGN STUDIO</div>
        
        <a href="portfolio.html" class="nav-link">VIEW PORTFOLIO</a>
        <a href="about.html" class="nav-link">ABOUT</a>
        <a href="contact.html" class="nav-link">CONTACT</a>
    </div>

</body>
</html>
