<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>KYEOL | (주)결</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500&family=Montserrat:wght@300&display=swap" rel="stylesheet">
<style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body, html { width:100%; height:100%; background:#000; overflow:hidden; font-family:'Montserrat', sans-serif; }

    /* 영상 배경 - 절대 위치 고정 */
    #bg-container { position:fixed; top:0; left:0; width:100%; height:100%; z-index:-10; }
    #bg-video { width:100%; height:100%; object-fit:cover; display:block; }
    .bg-overlay { position:absolute; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.45); z-index:-9; }

    /* 좌측 SNS 메뉴 */
    .sns-ui { position:fixed; top:40px; left:40px; z-index:100; color:#fff; }
    .sns-ui h2 { font-size:13px; letter-spacing:4px; margin-bottom:20px; opacity:0.8; }
    .sns-ui a { display:block; color:#fff; text-decoration:none; font-size:10px; letter-spacing:3px; margin-bottom:12px; opacity:0.5; }

    /* 메인 화면 중앙 정렬 (절대 안 쏠림) */
    .viewport { width:100%; height:100vh; display:flex; align-items:center; justify-content:center; }
    .main-btn { background:none; border:none; cursor:pointer; display:flex; flex-direction:column; align-items:center; outline:none; }

    .logo-img { width:300px; filter:brightness(0) invert(1) drop-shadow(0 0 15px rgba(255,255,255,0.4)); margin-bottom:5px; }
    .brand-name { font-family:'Playfair Display', serif; font-size:80px; color:#fff; letter-spacing:25px; margin-right:-25px; margin-bottom:15px; line-height:1; }
    .sub-title { font-size:12px; letter-spacing:10px; color:rgba(255,255,255,0.5); margin-bottom:70px; }
    .click-text { font-size:10px; letter-spacing:5px; color:#fff; opacity:0.3; border-bottom:1px solid rgba(255,255,255,0.3); padding-bottom:5px; }

    /* 2페이지 메뉴 */
    #menu-overlay { position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); display:none; flex-direction:column; align-items:center; justify-content:center; z-index:1000; }
    #menu-overlay a { color:#fff; text-decoration:none; font-size:35px; margin:18px 0; letter-spacing:10px; opacity:0.7; }
    .back-btn { position:absolute; top:40px; left:40px; color:#fff; font-size:11px; letter-spacing:4px; cursor:pointer; opacity:0.5; }

    @media (max-width:768px) {
        .sns-ui, .back-btn { top:35px; left:35px; }
        .logo-img { width:160px; }
        .brand-name { font-size:38px; letter-spacing:12px; margin-right:-12px; }
        .sub-title { font-size:9px; letter-spacing:6px; }
        #menu-overlay a { font-size:24px; letter-spacing:7px; }
    }
</style>
</head>
<body>

    <div id="bg-container">
        <video id="bg-video" autoplay muted loop playsinline preload="auto">
 
            <source src="./image/kyeol_video_optimized1.mp4" type="video/mp4">
 
        </video>
        <div class="bg-overlay"></div>
    </div>

    <div class="sns-ui" id="sns-area">
        <h2>MY STUDIO</h2>
        <a href="https://blog.naver.com/rotte123" target="_blank">BLOG</a>
        <a href="https://pf.kakao.com/_bTIEX/friend" target="_blank">KAKAO</a>
    </div>

    <div class="viewport" id="main-area">
        <button class="main-btn" onclick="openMenu()">
            <img src="./image/logo.png" alt="KYEOL" class="logo-img">
            <div class="brand-name">KYEOL</div>
            <div class="sub-title">ARCHITECTURE & INTERIOR</div>
            <div class="click-text">CLICK TO ENTER</div>
        </button>
    </div>

    <div id="menu-overlay">
        <div class="back-btn" onclick="closeMenu()">← BACK</div>
        <a href="about.html">ABOUT</a>
        <a href="portfolio.html">PORTFOLIO</a>
        <a href="proposal.html">PROPOSAL</a>
        <a href="contact.html">CONTACT</a>
    </div>

    <script>
        // 영상 강제 실행 보조
        window.onload = function() {
            var v = document.getElementById('bg-video');
            v.play().catch(function() {
                // 자동재생이 막힌 경우, 첫 터치 시 재생
                document.body.addEventListener('touchstart', function() { v.play(); }, {once:true});
                document.body.addEventListener('click', function() { v.play(); }, {once:true});
            });
        };

        function openMenu() {
            document.getElementById('main-area').style.display = 'none';
            document.getElementById('sns-area').style.display = 'none';
            document.getElementById('menu-overlay').style.display = 'flex';
        }
        function closeMenu() {
            document.getElementById('menu-overlay').style.display = 'none';
            document.getElementById('main-area').style.display = 'flex';
            document.getElementById('sns-area').style.display = 'block';
        }
    </script>
</body>
</html>
