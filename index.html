<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KYEOL</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Montserrat:wght@300;500&display=swap" rel="stylesheet">

<style>
body, html {
  margin:0;
  padding:0;
  height:100%;
  overflow:hidden;
  font-family:'Montserrat', sans-serif;
  background:black;
}

/* ===== 로딩 ===== */
#loader {
  position:fixed;
  width:100%;
  height:100%;
  background:black;
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  letter-spacing:5px;
  z-index:9999;
}

/* ===== 커서 ===== */
#cursor {
  width:18px;
  height:18px;
  border:1px solid white;
  border-radius:50%;
  position:fixed;
  pointer-events:none;
  z-index:999;
}

/* ===== 공통 ===== */
.screen {
  position:fixed;
  width:100%;
  height:100%;
  transition:1s ease;
}

/* ===== 좌측 메뉴 ===== */
.left-menu {
  position:fixed;
  left:40px;
  top:40px;
  z-index:10;
}

.left-menu a {
  display:block;
  margin:12px 0;
  font-size:13px;
  color:white;
  text-decoration:none;
  letter-spacing:2px;
  opacity:0.8;
  transition:0.3s;
}

.left-menu a:hover {
  opacity:0.4;
  transform:translateX(5px);
}

.menu-title {
  color:white;
  font-size:14px;
  opacity:0.6;
  margin-bottom:20px;
  letter-spacing:3px;
}

/* ===== 메인 ===== */
.main-screen { z-index:3; }

.video-bg {
  width:100%;
  height:100%;
  object-fit:cover;
}

.overlay {
  position:absolute;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.4);
  backdrop-filter:blur(2px);
}

.center-text {
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  color:white;
  text-align:center;
  cursor:pointer;
}

.center-text h1 {
  font-size:70px;
  letter-spacing:10px;
  font-family:'Playfair Display';
}

.subtitle {
  font-size:12px;
  letter-spacing:5px;
  margin-top:10px;
  opacity:0.7;
}

.click-text {
  font-size:11px;
  margin-top:20px;
  opacity:0.5;
  animation:blink 1.8s infinite;
}

@keyframes blink {
  0% {opacity:0.2;}
  50% {opacity:0.7;}
  100% {opacity:0.2;}
}

/* ===== 내부 ===== */
.second-screen {
  background:#111;
  z-index:2;
  opacity:0;
  transform:scale(1.1);
}

/* 🔥 핵심 (뒤로가기 영역) */
.back-area {
  position:absolute;
  width:100%;
  height:100%;
  z-index:1;
}

/* 메뉴 */
.inner-menu {
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  z-index:2;
}

.inner-menu a {
  display:block;
  margin:25px 0;
  color:white;
  text-decoration:none;
  font-size:22px;
  letter-spacing:3px;
  opacity:0;
  transform:translateY(20px);
  transition:0.6s;
}

.inner-menu a.show {
  opacity:1;
  transform:translateY(0);
}

.inner-menu a:hover {
  letter-spacing:6px;
  opacity:0.5;
}

/* 모바일 */
@media (max-width:768px){
  .left-menu { display:none; }
  .center-text h1 { font-size:40px; }
}
</style>
</head>

<body>

<!-- 로딩 -->
<div id="loader">LOADING...</div>

<!-- 커서 -->
<div id="cursor"></div>

<!-- 사운드 -->
<audio id="bgm" loop>
  <source src="bgm.mp3">
</audio>

<!-- SNS -->
<div class="left-menu" id="sns">
  <h2 class="menu-title">MY STUDIO</h2>
  <a href="#">INSTAGRAM</a>
  <a href="https://pf.kakao.com/_bTIEX/friend" target="_blank">KAKAO</a>
  <a href="https://blog.naver.com/rotte123" target="_blank">BLOG</a>
</div>

<!-- 메인 -->
<div class="screen main-screen" id="main">
  <video class="video-bg" autoplay muted loop playsinline>
    <source src="15129223_2160_3840_30fps.mp4">
  </video>

  <div class="overlay"></div>

  <div class="center-text" onclick="enterSite()">
    <h1>KYEOL</h1>
    <div class="subtitle">ARCHITECTURE & INTERIOR</div>
    <div class="click-text">CLICK TO ENTER</div>
  </div>
</div>

<!-- 내부 -->
<div class="screen second-screen" id="second">
  <div class="back-area" onclick="goBack()"></div>

  <div class="inner-menu">
    <a href="about.html">ABOUT</a>
    <a href="portfolio.html">PORTFOLIO</a>
    <a href="proposal.html">PROPOSAL</a>
    <a href="contact.html">CONTACT</a>
  </div>
</div>

<script>

/* 로딩 */
window.onload = ()=>{
  setTimeout(()=>{
    document.getElementById("loader").style.display="none";
  },1000);
}

/* 커서 */
const cursor = document.getElementById("cursor");
document.addEventListener("mousemove", e=>{
  cursor.style.left = e.clientX+"px";
  cursor.style.top = e.clientY+"px";
});

/* 진입 */
function enterSite(){
  const main = document.getElementById("main");
  const second = document.getElementById("second");
  const sns = document.getElementById("sns");

  main.style.opacity="0";
  main.style.pointerEvents="none";
  sns.style.display="none";

  second.style.opacity="1";
  second.style.transform="scale(1)";

  document.getElementById("bgm").play();

  document.querySelectorAll(".inner-menu a").forEach((el,i)=>{
    setTimeout(()=>el.classList.add("show"), i*150);
  });
}

/* 뒤로가기 (완벽 복구) */
function goBack(){
  const main = document.getElementById("main");
  const second = document.getElementById("second");
  const sns = document.getElementById("sns");

  main.style.opacity="1";
  main.style.pointerEvents="auto";
  sns.style.display="block";

  second.style.opacity="0";
  second.style.transform="scale(1.1)";

  document.querySelectorAll(".inner-menu a").forEach(el=>{
    el.classList.remove("show");
  });
}

</script>

</body>
</html>
