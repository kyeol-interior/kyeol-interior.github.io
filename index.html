<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>(주)결 | KYEOL</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Noto+Sans+KR:wght@300&display=swap" rel="stylesheet">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; -webkit-font-smoothing: antialiased; }
        body, html { width:100%; height:100%; background:#000; overflow:hidden; font-family: 'Noto Sans KR', sans-serif; }
        
        .video-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; background: #000; }
        video { width: 100%; height: 100%; object-fit: cover; display: block; opacity: 0.65; }

        .main-link { 
            width: 100%; height: 100vh; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; text-decoration: none; text-align: center;
        }

        /* ------------------------------------------------------ */
        /* [PC 버전 기본값] - 시원하고 웅장한 사이즈 */
        /* ------------------------------------------------------ */
        .brand-logo { 
            font-family: 'Playfair Display', serif; 
            font-size: 110px; /* PC에서 압도적인 크기 */
            color: #fff; letter-spacing: 30px; font-weight: 600; 
            margin-right: -30px;
            transition: 0.4s;
        }

        .brand-meaning { 
            font-size: 22px; /* PC에서 잘 읽히는 크기 */
            color: #fff; letter-spacing: 18px; 
            margin-top: 35px;
            opacity: 0.8; font-weight: 300; 
            white-space: nowrap;
        }

        .click-btn { 
            margin-top: 80px; color:#fff; font-size: 12px; 
            letter-spacing: 6px; border-bottom: 1px solid rgba(255,255,255,0.4); 
            padding-bottom: 8px; opacity: 0.6;
        }

        /* ------------------------------------------------------ */
        /* [모바일 버전 전용] - 콤팩트하고 정갈한 사이즈 (768px 이하) */
        /* ------------------------------------------------------ */
        @media (max-width: 768px) {
            .brand-logo { 
                font-size: 42px; /* 모바일에서 딱 예쁜 크기 */
                letter-spacing: 12px; 
                margin-right: -12px; 
            }
            .brand-meaning { 
                font-size: 11px; /* 모바일에서 한 줄로 들어가는 크기 */
                letter-spacing: 5px; 
                margin-top: 18px;
            }
            .click-btn { 
                margin-top: 55px; 
                font-size: 10px; 
                letter-spacing: 4px;
            }
        }
    </style>
</head>
<body onclick="document.getElementById('bg-v').play()">

    <div class="video-bg">
        <video id="bg-v" autoplay muted loop playsinline preload="auto" poster="./image/8-4.jpg">
            <source src="./image/kyeol_video_optimized1.mp4" type="video/mp4">
        </video>
    </div>

    <a href="about.html" class="main-link">
        <div class="brand-logo">KYEOL</div>
        <div class="brand-meaning">공간과 사람의 인연을 맺다 : 結</div>
        <div class="click-btn">CLICK TO ENTER</div>
    </a>

    <script>
        const v = document.getElementById('bg-v');
        window.addEventListener('load', () => { v.play().catch(() => {}); });
        document.body.addEventListener('touchstart', () => { if(v.paused) v.play(); }, {once: true});
    </script>
</body>
</html>
