<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KYEOL</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Montserrat:wght@300;500&display=swap" rel="stylesheet">

<style>
body, html {
  margin: 0;
  padding: 0;
  height: 100%;
  overflow: hidden;
  font-family: 'Montserrat', sans-serif;
}

/* 🔥 공통 화면 */
.screen {
  position: fixed;
  width: 100%;
  height: 100%;
  transition: 1s ease;
}

/* 🎬 메인 화면 */
.main-screen {
  z-index: 2;
}

/* 영상 */
.video-bg {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* 어둡게 */
.overlay {
  position: absolute;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.4);
}

/* 중앙 텍스트 */
.center-text {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  color: white;
  text-align: center;
  cursor: pointer;
}

.center-text h1 {
  font-size: 60px;
  letter-spacing: 8px;
  font-family: 'Playfair Display', serif;
}

.center-text p {
  font-size: 14px;
  opacity: 0.8;
}

/* 🔥 내부 화면 */
.second-screen {
  background: #111;
  color: white;
  z-index: 1;
  opacity: 0;
  transform: scale(1.1);
}

/* 내부 메뉴 */
.inner-menu {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  text-align: center;
}

.inner-menu a {
  display: block;
  margin: 20px 0;
  color: white;
  text-decoration: none;
  font-size: 20px;
  letter-spacing: 2px;
  opacity: 0;
  transform: translateY(20px);
  transition: 0.6s;
}
  /* 나타난 상태 */
.inner-menu a.show {
  opacity: 1;
  transform: translateY(0);
}
.inner-menu a:hover {
  opacity: 0.5;
  letter-spacing: 4px;
  transform: translateX(10px);
}
 /* 🔥 왼쪽 SNS */
.left-menu {
  position: absolute;
  left: 40px;
  top: 50%;
  transform: translateY(-50%);
}

.left-menu a {
  display: block;
  margin: 18px 0;
  color: white;
  text-decoration: none;
  letter-spacing: 2px;
  font-weight: 300;
  opacity: 0.8;
  transition: 0.3s;
}

.left-menu a:hover {
  opacity: 0.4;
} 
  /* 🔥 빈 공간 클릭 영역 */
.back-area {
  position: absolute;
  width: 100%;
  height: 100%;
  z-index: 1;
}

/* 메뉴는 위로 */
.left-menu,
.inner-menu {
  position: relative;
  z-index: 2;
}
  .back-area:hover {
  cursor: pointer;
}
.portfolio-screen {
  background: #111;
  z-index: 0;
  opacity: 0;
  transition: 1s;
}

/* 그리드 */
.portfolio-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 10px;
  padding: 20px;
}

/* 이미지 */
.item img {
  width: 100%;
  height: 200px;
  object-fit: cover;
  transition: 0.4s;
}

/* 호버 */
.item:hover img {
  transform: scale(1.1);
}  
</style>
</head>

<body>

<!-- 🎬 메인 화면 -->
<div class="screen main-screen" id="main">

  <video class="video-bg" autoplay muted loop>
    <source src="15129223_2160_3840_30fps.mp4">
  </video>

  <div class="overlay"></div>

  <div class="center-text" onclick="enterSite()">
    <h1>KYEOL</h1>
    <p>CLICK TO ENTER</p>
  </div>

</div>

<!-- 🔥 내부 화면 -->
<div class="screen second-screen" id="second">
<div class="screen portfolio-screen" id="portfolio">

  <div class="portfolio-grid">

    <div class="item"><img src="page1.jpg"></div>
    <div class="item"><img src="page2.jpg"></div>
    <div class="item"><img src="page3.jpg"></div>
    <div class="item"><img src="page4.jpg"></div>

  </div>
<div class="item" onclick="openImage(this)">
  <img src="page1.jpg">
</div>
</div>  
 <!-- 🔥 배경 클릭 영역 -->
<div class="back-area" onclick="goBack()"></div>
   <!-- 🔥 왼쪽 SNS -->
  <div class="left-menu">
    <a href="#">INSTAGRAM</a>
    <a href="https://pf.kakao.com/_bTIEX/friend" target="_blank">KAKAO</a>
    <a href="https://blog.naver.com/rotte123" target="_blank">BLOG</a>
  </div>
  <div class="inner-menu">
    <a href="#">ABOUT</a>
    <a href="#" onclick="openPortfolio()">PORTFOLIO</a>
    <a href="proposal.html">PROPOSAL</a>
    <a href="#">CONTACT</a>
  </div>

</div>

<script>
function enterSite() {
  const main = document.getElementById("main");
  const second = document.getElementById("second");
  const menuItems = document.querySelectorAll(".inner-menu a");

  main.style.opacity = "0";
  main.style.pointerEvents = "none";

  second.style.opacity = "1";
  second.style.transform = "scale(1)";
  function goBack() {
  const main = document.getElementById("main");
  const second = document.getElementById("second");

  main.style.opacity = "1";
  main.style.pointerEvents = "auto";

  second.style.opacity = "0";
  second.style.transform = "scale(1.1)";
}
function openPortfolio() {
  document.getElementById("second").style.opacity = "0";
  document.getElementById("portfolio").style.opacity = "1";
  document.getElementById("portfolio").style.zIndex = "3";
}
  function openImage(el) {
  const src = el.querySelector("img").src;
  const viewer = document.createElement("div");

  viewer.style.position = "fixed";
  viewer.style.top = "0";
  viewer.style.left = "0";
  viewer.style.width = "100%";
  viewer.style.height = "100%";
  viewer.style.background = "rgba(0,0,0,0.9)";
  viewer.style.display = "flex";
  viewer.style.justifyContent = "center";
  viewer.style.alignItems = "center";

  viewer.innerHTML = `<img src="${src}" style="max-width:90%">`;

  viewer.onclick = () => viewer.remove();

  document.body.appendChild(viewer);
}
  /* 🔥 메뉴 순차 등장 */
  menuItems.forEach((item, index) => {
    setTimeout(() => {
      item.classList.add("show");
    }, index * 200); // 하나씩 0.2초 간격
  });
}
  
</script>

</body>
</html>
