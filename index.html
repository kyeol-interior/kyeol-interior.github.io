<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>(주)결 | KYEOL</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Noto+Sans+KR:wght@300;500&display=swap" rel="stylesheet">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body, html { width:100%; height:100%; background:#000; overflow:hidden; font-family: 'Noto Sans KR', sans-serif; }
        
        .v-bg { position:fixed; top:0; left:0; width:100%; height:100%; z-index:-1; }
        video { width:100%; height:100%; object-fit:cover; display:block; opacity: 0.65; }

        .main-frame { 
            width:100%; height:100vh; display:flex; flex-direction:column; 
            align-items:center; justify-content:center; text-decoration:none;
        }
        .brand-name { 
            font-family: 'Playfair Display', serif; font-size: clamp(55px, 16vw, 100px); 
            color:#fff; letter-spacing: 25px; font-weight:600; margin-right: -25px;
        }
        /* 서브 타이틀 사이즈 상향 */
        .brand-meaning { 
            font-size: clamp(16px, 3vw, 22px); color: #fff; letter-spacing: 15px; 
            margin-top: 25px; font-weight: 300; text-shadow: 0 0 10px rgba(0,0,0,0.5);
        }
        .enter-hint { 
            margin-top:80px; color:#fff; font-size:11px; letter-spacing:5px; 
            border-bottom:1px solid rgba(255,255,255,0.4); padding-bottom:5px; opacity: 0.6;
        }
    </style>
</head>
<body onclick="document.getElementById('main-v').play()">
    <div class="v-bg">
        <video id="main-v" autoplay muted loop playsinline poster="./image/8-4.jpg">
            <source src="./image/kyeol_video_optimized1.mp4" type="video/mp4">
        </video>
    </div>
    <a href="about.html" class="main-frame">
        <div class="brand-name">KYEOL</div>
        <div class="brand-meaning">공간과 사람의 인연을 맺다 : 結</div>
        <div class="enter-hint">CLICK TO ENTER</div>
    </a>
</body>
</html>
