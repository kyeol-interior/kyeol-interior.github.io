<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KYEOL | (주)결</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&display=swap" rel="stylesheet">
    <style>
        /* 1. 기본 배경 및 폰트 세팅 */
        * { margin:0; padding:0; box-sizing:border-box; }
        body, html { 
            width:100%; height:100%; background:#000; 
            overflow:hidden; font-family: 'Apple SD Gothic Neo', sans-serif; 
        }
        
        /* 2. 영상 배경: 화면 전체 꽉 차게 (절대 실패 없는 레이아웃) */
        .video-background {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1; background: #000;
        }
        video {
            width: 100%; height: 100%; object-fit: cover;
            display: block; opacity: 0.7; /* 텍스트 가독성을 위해 살짝 어둡게 */
        }

        /* 3. 중앙 텍스트 레이어 */
        .main-content { 
            width: 100%; height: 100vh; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; text-decoration: none;
        }
        .brand-logo { 
            font-family: 'Playfair Display', serif; 
            font-size: clamp(50px, 15vw, 95px); 
            color: #fff; letter-spacing: 25px; font-weight: 600; 
            margin-right: -25px; /* 글자 간격 때문에 우측으로 쏠리는 현상 방지 */
            transition: 0.5s;
        }
        .enter-text { 
            margin-top: 50px; color: #fff; font-size: 11px; 
            letter-spacing: 6px; border-bottom: 1px solid rgba(255,255,255,0.5); 
            padding-bottom: 8px; opacity: 0.6;
        }

        /* 모바일 대응 */
        @media (max-width: 768px) {
            .brand-logo { font-size: 45px; letter-spacing: 12px; margin-right: -12px; }
        }
    </style>
</head>
<body>

    <div class="video-background">
        <video id="main-video" autoplay muted loop playsinline preload="auto" poster="./image/8-4.jpg">
            <source src="./image/kyeol_video_optimized1.mp4" type="video/mp4">
        </video>
    </div>

    <a href="about.html" class="main-content">
        <div class="brand-logo">KYEOL</div>
        <div class="enter-text">CLICK TO ENTER</div>
    </a>

    <script>
        // 브라우저의 '자동재생 차단'을 뚫기 위한 강력한 트리거
        const v = document.getElementById('main-video');
        
        // 1. 페이지 로드 시 즉시 실행
        window.addEventListener('load', () => {
            v.play().catch(() => {
                console.log("자동재생 차단됨 - 사용자 상호작용 대기");
            });
        });

        // 2. 사용자가 화면 어디든 '클릭'하거나 '터치'하면 무조건 재생 (안전장치)
        document.body.addEventListener('click', () => { if(v.paused) v.play(); }, {once: true});
        document.body.addEventListener('touchstart', () => { if(v.paused) v.play(); }, {once: true});
    </script>
</body>
</html>
