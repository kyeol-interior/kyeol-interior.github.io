<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KYEOL | (주)결</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body, html { width:100%; height:100%; background:#000; overflow:hidden; font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif; }
        
        #v-container { position:fixed; top:0; left:0; width:100%; height:100%; z-index:-1; }
        video { width:100%; height:100%; object-fit:cover; display:block; }

        .main-link { 
            width:100%; height:100vh; display:flex; flex-direction:column; 
            align-items:center; justify-content:center; text-decoration:none;
            background: rgba(0,0,0,0.25);
        }
        .brand { font-family: 'Playfair Display', serif; font-size: clamp(40px, 12vw, 90px); color:#fff; letter-spacing: 20px; font-weight:700; margin-right:-20px; }
        .enter { margin-top:50px; color:#fff; font-size:12px; letter-spacing:5px; border-bottom:1px solid #fff; padding-bottom:5px; opacity:0.8; }
    </style>
</head>
<body>
    <div id="v-container">
        <video id="kyeol-video" autoplay muted loop playsinline poster="./image/8-4.jpg">
            <source src="./image/kyeol_video_optimized1.mp4" type="video/mp4">
        </video>
    </div>
    <a href="about.html" class="main-link">
        <div class="brand">KYEOL</div>
        <div class="enter">CLICK TO ENTER</div>
    </a>
    <script>
        // 브라우저가 막아도 사용자가 화면을 누르는 순간 무조건 재생
        window.onclick = function() { document.getElementById('kyeol-video').play(); }
        window.ontouchstart = function() { document.getElementById('kyeol-video').play(); }
    </script>
</body>
</html>
