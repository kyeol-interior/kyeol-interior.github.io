<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>(주)결 | KYEOL</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Noto+Sans+KR:wght@300&display=swap" rel="stylesheet">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; -webkit-font-smoothing: antialiased; }
        body, html { width:100%; height:100%; background:#000; overflow:hidden; font-family: 'Noto Sans KR', sans-serif; }
        
        /* 영상이 안 나올 때를 대비해 8-4.jpg를 배경으로 대기시킵니다 */
        .video-bg { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; 
            background: url('./image/8-4.jpg') no-repeat center center; 
            background-size: cover; 
        }
        video { width: 100%; height: 100%; object-fit: cover; display: block; opacity: 0.6; }

        .main-link { 
            width: 100%; height: 100vh; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; text-decoration: none; text-align: center;
        }

        /* PC 버전: 시원하고 압도적인 스케일 */
        .brand-logo { 
            font-family: 'Playfair Display', serif; font-size: 110px; 
            color: #fff; letter-spacing: 30px; font-weight: 600; margin-right: -30px;
        }
        .brand-meaning { 
            font-size: 22px; color: #fff; letter-spacing: 18px; 
            margin-top: 35px; opacity: 0.9; font-weight: 300; white-space: nowrap;
        }
        .click-btn { 
            margin-top: 80px; color:#fff; font-size: 12px; letter-spacing: 6px; 
            border-bottom: 1px solid rgba(255,255,255,0.4); padding-bottom: 8px; opacity: 0.6;
        }

        /* 모바일 버전: 한 줄 정렬 및 최적화 */
        @media (max-width: 768px) {
            .brand-logo { font-size: 42px; letter-spacing: 12px; margin-right: -12px; }
            .brand-meaning { font-size: 11px; letter-spacing: 5px; margin-top: 18px; }
            .click-btn { margin-top: 55px; font-size: 10px; letter-spacing: 4px; }
        }
    </style>
</head>
<body onclick="forcePlay()">
    <div class="video-bg">
        <video id="main-v" autoplay muted loop playsinline preload="auto" poster="./image/8-4.jpg">
            <source src="./image/kyeol_video_optimized1.mp4" type="video/mp4">
        </video>
    </div>

    <a href="about.html" class="main-link">
        <div class="brand-logo">KYEOL</div>
        <div class="brand-meaning">공간과 사람의 인연을 맺다 : 結</div>
        <div class="click-btn">CLICK TO ENTER</div>
    </a>

    <script>
        const v = document.getElementById('main-v');
        function forcePlay() { if(v.paused) v.play(); }
        window.addEventListener('load', () => { v.play().catch(() => { console.log("Play blocked"); }); });
        document.body.addEventListener('touchstart', forcePlay, {once: true});
    </script>
</body>
</html>
