<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KYEOL</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Montserrat:wght@300;500&display=swap" rel="stylesheet">

<style>
body, html {
  margin: 0;
  padding: 0;
  height: 100%;
  overflow: hidden;
  background: black;
  font-family: 'Montserrat', sans-serif;
  cursor: none;
}

/* 🔥 커스텀 커서 */
.cursor {
  width: 20px;
  height: 20px;
  border: 1px solid white;
  border-radius: 50%;
  position: fixed;
  pointer-events: none;
  z-index: 999;
  transition: transform 0.15s ease;
}

/* 🔥 로딩 */
.loader {
  position: fixed;
  width: 100%;
  height: 100%;
  background: black;
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 9999;
  letter-spacing: 5px;
  font-size: 14px;
}

/* 공통 */
.screen {
  position: fixed;
  width: 100%;
  height: 100%;
  transition: 1s;
}

/* SNS */
.left-menu {
  position: fixed;
  left: 40px;
  top: 40px;
  z-index: 10;
}

.left-menu a {
  display: block;
  margin: 12px 0;
  color: white;
  text-decoration: none;
  opacity: 0.8;
}

/* 메인 */
.video-bg {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.overlay {
  position: absolute;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.5);
}

.center-text {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  color: white;
  text-align: center;
  cursor: pointer;
}

.center-text h1 {
  font-size: 70px;
  letter-spacing: 10px;
  font-family: 'Playfair Display';
}

/* 내부 */
.second-screen {
  background: black;
  opacity: 0;
}

/* 메뉴 */
.inner-menu a {
  display: block;
  margin: 20px;
  color: white;
  text-decoration: none;
  opacity: 0;
  transform: translateY(20px);
  transition: 0.6s;
}

.inner-menu a.show {
  opacity: 1;
  transform: translateY(0);
}

/* 🔥 포트폴리오 */
.portfolio {
  display: flex;
  height: 100%;
}

.portfolio-item {
  flex: 1;
  background-size: cover;
  background-position: center;
  transition: 0.6s;
}

.portfolio-item:hover {
  flex: 2;
  filter: brightness(1.2);
}

/* 🔥 스크롤 애니메이션 */
.fade-up {
  opacity: 0;
  transform: translateY(40px);
  transition: 1s;
}

.fade-up.show {
  opacity: 1;
  transform: translateY(0);
}

</style>
</head>

<body>

<!-- 🔥 로딩 -->
<div class="loader" id="loader">LOADING...</div>

<!-- 🔥 커서 -->
<div class="cursor" id="cursor"></div>

<!-- 🔊 배경음 -->
<audio id="bgm" loop>
  <source src="bgm.mp3">
</audio>

<!-- 메인 -->
<div class="screen" id="main">
  <video class="video-bg" autoplay muted loop>
    <source src="15129223_2160_3840_30fps.mp4">
  </video>
  <div class="overlay"></div>

  <div class="center-text" onclick="enterSite()">
    <h1>KYEOL</h1>
    <p>CLICK TO ENTER</p>
  </div>
</div>

<!-- 내부 -->
<div class="screen second-screen" id="second">

  <div class="inner-menu">
    <a href="#">ABOUT</a>
    <a href="#">PORTFOLIO</a>
    <a href="#">CONTACT</a>
  </div>

  <!-- 🔥 포트폴리오 -->
  <div class="portfolio">
    <div class="portfolio-item" style="background-image:url('img1.jpg')"></div>
    <div class="portfolio-item" style="background-image:url('img2.jpg')"></div>
    <div class="portfolio-item" style="background-image:url('img3.jpg')"></div>
  </div>

</div>

<script>

/* 🔥 로딩 */
window.onload = ()=>{
  setTimeout(()=>{
    document.getElementById("loader").style.display="none";
  },1500);
}

/* 🔥 커서 */
const cursor = document.getElementById("cursor");
document.addEventListener("mousemove", e=>{
  cursor.style.left = e.clientX+"px";
  cursor.style.top = e.clientY+"px";
});

/* 🔥 입장 */
function enterSite(){
  document.getElementById("main").style.opacity="0";
  document.getElementById("second").style.opacity="1";

  document.getElementById("bgm").play();

  document.querySelectorAll(".inner-menu a").forEach((el,i)=>{
    setTimeout(()=>el.classList.add("show"), i*200);
  });
}

/* 🔥 스크롤 애니메이션 */
window.addEventListener("scroll", ()=>{
  document.querySelectorAll(".fade-up").forEach(el=>{
    if(el.getBoundingClientRect().top < window.innerHeight - 50){
      el.classList.add("show");
    }
  });
});

</script>

</body>
</html>
