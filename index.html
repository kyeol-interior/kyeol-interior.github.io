<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KYEOL | ARCHITECTURE & INTERIOR</title>

    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;500&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="index-style.css">
    
    <style>
        /* 로고 중심 레이아웃 스타일 */
        .center-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        /* 💡 메인 로고 이미지 스타일 */
        .main-logo-img {
            width: 450px; /* PC에서 압도적인 크기 (필요시 조절 가능) */
            height: auto;
            margin-bottom: 25px;
            filter: brightness(1.2); /* 영상 배경에서 더 선명하게 */
            transition: transform 0.6s cubic-bezier(0.2, 1, 0.3, 1);
        }

        .center-text:hover .main-logo-img {
            transform: scale(1.05); /* 마우스 올리면 슬며시 커지는 효과 */
        }

        .sub-title {
            font-size: 15px;
            letter-spacing: 12px;
            opacity: 0.5;
            margin-bottom: 100px; /* 💡 이 넉넉한 공간에 나중에 인증 로고가 들어갑니다 */
            text-transform: uppercase;
            font-weight: 300;
        }

        .enter-text {
            font-size: 11px;
            letter-spacing: 6px;
            opacity: 0.3;
            border-bottom: 1px solid rgba(255,255,255,0.2);
            padding-bottom: 8px;
            transition: 0.4s;
        }

        .center-text:hover .enter-text {
            opacity: 1;
            letter-spacing: 9px;
            border-bottom: 1px solid rgba(255,255,255,0.6);
        }

        /* 모바일 대응 */
        @media (max-width: 768px) {
            .main-logo-img {
                width: 220px; /* 모바일에서 적당한 크기 */
            }
            .sub-title {
                font-size: 9px;
                letter-spacing: 6px;
                margin-bottom: 60px;
            }
        }
    </style>
</head>

<body>

    <video class="video-bg" autoplay muted loop playsinline preload="none">
        <source src="image/kyeol_video_optimized1.mp4" type="video/mp4">
    </video>

    <div class="overlay"></div>

    <div id="sns-menu" class="left-menu">
        <h2>MY STUDIO</h2>
        <a href="https://blog.naver.com/rotte123" target="_blank">BLOG</a>
        <a href="https://pf.kakao.com/_bTIEX/friend" target="_blank">KAKAO</a>
    </div>

    <div id="main-page">
        <div class="center-content">
            <button class="center-text" onclick="enterSite()">
                <img src="image/logo.png" alt="KYEOL" class="main-logo-img">
                
                <div class="sub-title">ARCHITECTURE & INTERIOR</div>
                
                <div class="enter-text">CLICK TO ENTER</div>
            </button>
        </div>
    </div>

    <div id="second-page">
        <div class="back" onclick="goBack()">← BACK</div>
        <div class="inner-menu">
            <a href="about.html">ABOUT</a>
            <a href="portfolio.html">PORTFOLIO</a>
            <a href="proposal.html">PROPOSAL</a>
            <a href="contact.html">CONTACT</a>
        </div>
    </div>

    <script>
        function enterSite() {
            document.getElementById('main-page').style.display = 'none';
            document.getElementById('sns-menu').style.display = 'none';
            const second = document.getElementById('second-page');
            second.style.display = 'flex';
            setTimeout(() => {
                second.style.opacity = '1';
                document.querySelectorAll('.inner-menu a').forEach((el, i) => {
                    setTimeout(() => el.classList.add('show'), i * 100);
                });
            }, 10);
        }

        function goBack() {
            const second = document.getElementById('second-page');
            second.style.opacity = '0';
            setTimeout(() => {
                second.style.display = 'none';
                document.getElementById('main-page').style.display = 'flex';
                document.getElementById('sns-menu').style.display = 'block';
            }, 300);
        }
    </script>

</body>
</html>
