<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KYEOL | (주)결</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500&family=Montserrat:wght@300&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { width: 100%; height: 100%; background: #000; font-family: 'Montserrat', sans-serif; color: #fff; }

        /* [1] 영상 배경: 바닥에 깔기 */
        .bg-video {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 1;
        }
        .bg-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.4);
            z-index: 2;
        }

        /* [2] 메인 콘텐츠: 영상 위에 띄우기 */
        .main-content {
            position: relative;
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            z-index: 10; /* 영상보다 높은 숫자 */
            cursor: pointer;
        }

        /* 로고 및 텍스트 스타일 */
        .logo-img { width: 300px; filter: brightness(0) invert(1); margin-bottom: 10px; }
        .brand-name { font-family: 'Playfair Display', serif; font-size: 80px; letter-spacing: 25px; margin-right: -25px; margin-bottom: 15px; }
        .sub-name { font-size: 12px; letter-spacing: 10px; opacity: 0.6; margin-bottom: 60px; }
        .enter-btn { font-size: 11px; letter-spacing: 5px; opacity: 0.4; border-bottom: 1px solid #fff; padding-bottom: 5px; }

        /* 좌측 SNS 메뉴 */
        .sns-menu { position: fixed; top: 40px; left: 40px; z-index: 20; }
        .sns-menu h2 { font-size: 13px; letter-spacing: 4px; margin-bottom: 20px; }
        .sns-menu a { display: block; color: #fff; text-decoration: none; font-size: 10px; letter-spacing: 3px; margin-bottom: 12px; opacity: 0.5; }

        /* 모바일 대응 */
        @media (max-width: 768px) {
            .logo-img { width: 160px; }
            .brand-name { font-size: 40px; letter-spacing: 12px; margin-right: -12px; }
            .sub-name { font-size: 9px; letter-spacing: 6px; }
        }
    </style>
</head>
<body>

    <video class="bg-video" autoplay muted loop playsinline>
        <source src="./image/kyeol_video_optimized1.mp4" type="video/mp4">
    </video>
    <div class="bg-overlay"></div>

    <div class="sns-menu">
        <h2>MY STUDIO</h2>
        <a href="https://blog.naver.com/rotte123" target="_blank">BLOG</a>
        <a href="https://pf.kakao.com/_bTIEX/friend" target="_blank">KAKAO</a>
    </div>

    <div class="main-content" onclick="location.href='about.html'">
        <img src="./image/logo.png" alt="KYEOL" class="logo-img">
        <div class="brand-name">KYEOL</div>
        <div class="sub-name">ARCHITECTURE & INTERIOR</div>
        <div class="enter-btn">CLICK TO ENTER</div>
    </div>

</body>
</html>
