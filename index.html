<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KYEOL | (주)결</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&display=swap" rel="stylesheet">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body, html { width:100%; height:100%; background:#000; overflow:hidden; font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif; }
        
        #video-bg { position:fixed; top:0; left:0; width:100%; height:100%; z-index:-1; }
        video { width:100%; height:100%; object-fit:cover; display:block; opacity: 0.7; }

        .main-frame { 
            width:100%; height:100vh; display:flex; flex-direction:column; 
            align-items:center; justify-content:center; text-decoration:none;
        }
        .brand-name { font-family: 'Playfair Display', serif; font-size: 80px; color:#fff; letter-spacing: 20px; font-weight:600; margin-right: -20px; }
        .click-hint { margin-top:40px; color:#fff; font-size:11px; letter-spacing:5px; border-bottom:1px solid #fff; padding-bottom:5px; opacity:0.6; }

        @media (max-width:768px) { .brand-name { font-size: 42px; letter-spacing: 10px; } }
    </style>
</head>
<body onclick="document.getElementById('bg-v').play()">
    <div id="video-bg">
        <video id="bg-v" autoplay muted loop playsinline poster="./image/8-4.jpg">
            <source src="./image/kyeol_video_optimized1.mp4" type="video/mp4">
        </video>
    </div>
    <a href="about.html" class="main-frame">
        <div class="brand-name">KYEOL</div>
        <div class="click-hint">CLICK TO ENTER</div>
    </a>
</body>
</html>
