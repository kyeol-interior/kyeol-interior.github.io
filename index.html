<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kyeol Interior</title>
  <link rel="icon" href="images/logo.png" type="image/png">
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:'Noto Sans KR',sans-serif;background:#f7f7f7;}
    header{display:flex;align-items:center;justify-content:space-between;padding:10px 20px;background:#fff;box-shadow:0 2px 5px rgba(0,0,0,0.1);position:sticky;top:0;z-index:1000;}
    .logo{height:50px;}
    nav ul{display:flex;list-style:none;gap:20px;}
    nav ul li a{text-decoration:none;color:#333;font-weight:500;transition:color 0.3s;}
    nav ul li a:hover{color:#007BFF;}
    @media(max-width:768px){.logo{height:40px;} nav ul{gap:10px;}}
    .gallery{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:15px;padding:20px;}
    .gallery img{width:100%;height:200px;object-fit:cover;cursor:pointer;border-radius:5px;transition:transform 0.3s,box-shadow 0.3s;}
    .gallery img:hover{transform:scale(1.05);box-shadow:0 5px 15px rgba(0,0,0,0.3);}
    .lightbox{position:fixed;display:none;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.8);justify-content:center;align-items:center;z-index:2000;}
    .lightbox img{max-width:90%;max-height:90%;border-radius:5px;}
  </style>
</head>
<body>

<header>
  <a href="index.html"><img src="images/logo.png" alt="Kyeol Interior" class="logo"></a>
  <nav>
    <ul>
      <li><a href="about.html">소개</a></li>
      <li><a href="gallery.html">시공사례</a></li>
      <li><a href="contact.html">문의</a></li>
    </ul>
  </nav>
</header>

<main>
  <div class="gallery" id="gallery"></div>
</main>

<div class="lightbox" id="lightbox"><img src="" alt="확대 이미지"></div>

<script>
  // ---------------------------
  // 여기에 images 폴더 안 사진 파일명만 넣으면 자동 갤러리 생성
  // ---------------------------
  const images = [
    '사진1.jpg',
    '사진2.jpg',
    '사진3.jpg',
    '사진4.jpg'
    // 추가 사진은 여기만 넣으면 자동 갤러리
  ];

  const gallery = document.getElementById('gallery');
  images.forEach(filename => {
    const img = document.createElement('img');
    img.src = `images/${filename}`;
    img.alt = filename;
    gallery.appendChild(img);
  });

  // Lightbox
  const lightbox = document.getElementById('lightbox');
  const lightboxImg = lightbox.querySelector('img');
  gallery.addEventListener('click', e => {
    if(e.target.tagName === 'IMG'){
      lightbox.style.display = 'flex';
      lightboxImg.src = e.target.src;
    }
  });
  lightbox.addEventListener('click', () => { lightbox.style.display = 'none'; });
</script>

<div class="main">
  <h2>공간을 바꾸면, 삶이 바뀝니다</h2>
  <p>학교 · 상가 · 사무실 인테리어 전문</p>

  <a class="btn" href="tel:010-2224-6582">📞 전화 문의</a>
  <a class="btn" href="https://pf.kakao.com/_bTIEX/friend" target="_blank">💬 카카오톡 상담</a>
</div>

<div class="main">
  <h2>시공 사례</h2>
  <div class="gallery">
    <img src="https://via.placeholder.com/300" alt="시공1">
    <img src="https://via.placeholder.com/300" alt="시공2">
    <img src="https://via.placeholder.com/300" alt="시공3">
  </div>
</div>

<footer>
  <p>© Kyoul Interior</p>
</footer>

</body>
</html>
