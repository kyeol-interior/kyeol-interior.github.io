<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KYEOL | ARCHITECTURE & INTERIOR</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Montserrat:wght@300;500&display=swap" rel="stylesheet">
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: black; font-family: 'Montserrat', sans-serif; letter-spacing: 0.5px; }
        #cursor { width: 20px; height: 20px; border: 1px solid white; border-radius: 50%; position: fixed; pointer-events: none; z-index: 999; transform: translate(-50%,-50%); mix-blend-mode: difference; }
        #cursor-dot { width: 4px; height: 4px; background: white; border-radius: 50%; position: fixed; pointer-events: none; z-index: 1000; transform: translate(-50%,-50%); }
        .screen { position: fixed; width: 100%; height: 100%; transition: opacity 1.2s ease, transform 1.2s ease; }
        .left-menu { position: fixed; left: 60px; top: 60px; z-index: 10; transition: opacity 0.5s ease; }
        .left-menu a { display: block; margin: 16px 0; font-size: 13px; color: white; text-decoration: none; letter-spacing: 3px; opacity: 0.8; transition: 0.3s; }
        .left-menu a:hover { opacity: 0.4; transform: translateX(6px); }
        .menu-title { color: white; font-size: 14px; opacity: 0.6; margin-bottom: 25px; letter-spacing: 4px; }
        .main-screen { z-index: 3; }
        .video-bg { width: 100%; height: 100%; object-fit: cover; filter: brightness(0.65) contrast(1.1); }
        .overlay { position: absolute; width: 100%; height: 100%; background: rgba(0,0,0,0.4); backdrop-filter: blur(2px); }
        .center-text { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); color: white; text-align: center; cursor: pointer; }
        .center-text h1 { font-size: 80px; letter-spacing: 14px; font-family: 'Playfair Display'; text-shadow: 0 0 30px rgba(255,255,255,0.25); margin: 0; transition: 0.4s; }
        .center-text:hover h1 { letter-spacing: 18px; }
        .subtitle { font-size: 12px; letter-spacing: 6px; margin-top: 20px; opacity: 0.7; }
        .click-text { font-size: 10px; margin-top: 40px; letter-spacing: 4px; opacity: 0.5; }
        .second-screen { background: #111; z-index: 2; opacity: 0; transform: scale(1.1); }
        .back-area { position: absolute; width: 100%; height: 100%; z-index: 1; }
        .inner-menu { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0.95); z-index: 2; }
        .inner-menu a { display: block; margin: 35px 0; color: white; text-decoration: none; font-size: 24px; letter-spacing: 4px; opacity: 0; transform: translateY(20px); transition: all 0.8s cubic-bezier(0.22, 1, 0.36, 1); position: relative; }
        .inner-menu a.show { opacity: 1; transform: translateY(0); }
        @media (max-width: 768px) {
            #cursor, #cursor-dot { display: none; }
            .left-menu { left: 25px; top: 30px; }
            .center-text h1 { font-size: 42px; letter-spacing: 8px; }
            .inner-menu a { font-size: 18px; }
        }
    </style>
</head>
<body>
    <div id="cursor"></div>
    <div id="cursor-dot"></div>
    <div class="left-menu" id="sns">
        <h2 class="menu-title">MY STUDIO</h2>
        <a href="#">INSTAGRAM</a>
        <a href="https://pf.kakao.com/_bTIEX/friend" target="_blank">KAKAO</a>
        <a href="https://blog.naver.com/rotte123" target="_blank">BLOG</a>
    </div>
    <div class="screen main-screen" id="main">
        <video class="video-bg" autoplay muted loop playsinline>
            <source src="image/kyeol_video_optimized.mp4" type="video/mp4">
        </video>
        <div class="overlay"></div>
        <div class="center-text" onclick="enterSite()">
            <h1>KYEOL</h1>
            <div class="subtitle">ARCHITECTURE & INTERIOR</div>
            <div class="click-text">CLICK TO ENTER</div>
        </div>
    </div>
   div class="screen second-screen" id="second">
    <video class="video-bg" autoplay muted loop playsinline>
        <source src="image/kyeol_video_optimized.mp4" type="video/mp4">
    </video>
    <div class="overlay" style="background: rgba(0,0,0,0.7); backdrop-filter: blur(8px);"></div>

    <nav class="nav-header" style="position: absolute; top: 60px; left: 60px; z-index: 10;">
        <button class="back-btn" onclick="goBack()" style="background: none; border: none; color: white; cursor: pointer; font-size: 10px; letter-spacing: 4px; opacity: 0.5;">← BACK</button>
    </nav>

    <div class="back-area" onclick="goBack()" style="position: absolute; width: 100%; height: 100%; z-index: 1;"></div>
    
    <div class="inner-menu">
        <a href="about.html">ABOUT</a>
        <a href="portfolio.html">PORTFOLIO</a>
        <a href="proposal.html">PROPOSAL</a>
        <a href="contact.html">CONTACT</a>
    </div>

    </div>
    <script>
        const cursor = document.getElementById("cursor");
        const dot = document.getElementById("cursor-dot");
        let mouseX=0, mouseY=0, posX=0, posY=0;
        document.addEventListener("mousemove", e=>{ mouseX=e.clientX; mouseY=e.clientY; });
        function loop(){
            posX += (mouseX - posX) * 0.15; posY += (mouseY - posY) * 0.15;
            if(cursor) { cursor.style.left = posX + "px"; cursor.style.top = posY + "px"; }
            if(dot) { dot.style.left = mouseX + "px"; dot.style.top = mouseY + "px"; }
            requestAnimationFrame(loop);
        }
        loop();
        function enterSite(){
            const main = document.getElementById("main");
            const second = document.getElementById("second");
            const sns = document.getElementById("sns");
            main.style.opacity="0"; main.style.transform="scale(1.1)"; main.style.pointerEvents="none";
            sns.style.opacity="0"; sns.style.pointerEvents="none";
            second.style.opacity="1"; second.style.transform="scale(1)";
            document.querySelectorAll(".inner-menu a").forEach((el,i)=>{ setTimeout(()=>el.classList.add("show"), i*120); });
        }
        function goBack(){
            const main = document.getElementById("main");
            const second = document.getElementById("second");
            const sns = document.getElementById("sns");
            main.style.opacity="1"; main.style.transform="scale(1)"; main.style.pointerEvents="auto";
            sns.style.opacity="1"; sns.style.pointerEvents="auto";
            second.style.opacity="0"; second.style.transform="scale(1.1)";
            document.querySelectorAll(".inner-menu a").forEach(el=>{ el.classList.remove("show"); });
        }
    </script>
</body>
</html>
