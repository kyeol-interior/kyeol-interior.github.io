<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KYEOL</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Montserrat:wght@300;500&display=swap" rel="stylesheet">

<style>
body, html {
  margin: 0;
  padding: 0;
  height: 100%;
  overflow: hidden;
  font-family: 'Montserrat', sans-serif;
}

/* 공통 */
.screen {
  position: fixed;
  width: 100%;
  height: 100%;
  transition: 1s;
}

/* SNS */
.left-menu {
  position: fixed;
  left: 40px;
  top: 40px;
  z-index: 10;
}

.left-menu a {
  display: block;
  margin: 12px 0;
  font-size: 13px;
  color: white;
  text-decoration: none;
  letter-spacing: 2px;
  opacity: 0.8;
}

.left-menu a:hover { opacity: 0.4; }

.menu-title {
  color: white;
  font-size: 14px;
  opacity: 0.6;
  margin-bottom: 20px;
  letter-spacing: 3px;
}

/* 메인 */
.main-screen { z-index: 3; }

.video-bg {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.overlay {
  position: absolute;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.4);
}

.center-text {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  color: white;
  text-align: center;
  cursor: pointer;
}

.center-text h1 {
  font-size: 60px;
  letter-spacing: 8px;
  font-family: 'Playfair Display';
}

.subtitle {
  font-size: 12px;
  letter-spacing: 5px;
  margin-top: 10px;
  opacity: 0.7;
}

.click-text {
  font-size: 11px;
  margin-top: 20px;
  opacity: 0.5;
}

/* 내부 */
.second-screen {
  background: #111;
  color: white;
  z-index: 2;
  opacity: 0;
  transform: scale(1.1);
}

/* 메뉴 */
.inner-menu {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
}

.inner-menu a {
  display: block;
  margin: 20px 0;
  color: white;
  text-decoration: none;
  opacity: 0;
  transform: translateY(20px);
  transition: 0.5s;
}

.inner-menu a.show {
  opacity: 1;
  transform: translateY(0);
}

/* 뒤로 클릭 영역 */
.back-area {
  position: absolute;
  width: 100%;
  height: 100%;
}
</style>
</head>

<body>

<!-- SNS -->
<div class="left-menu" id="sns">
  <h2 class="menu-title">MY STUDIO</h2>
  <a href="#">INSTAGRAM</a>
  <a href="https://pf.kakao.com/_bTIEX/friend" target="_blank">KAKAO</a>
  <a href="https://blog.naver.com/rotte123" target="_blank">BLOG</a>
</div>

<!-- 메인 -->
<div class="screen main-screen" id="main">
  <video class="video-bg" autoplay muted loop>
    <source src="15129223_2160_3840_30fps.mp4">
  </video>
  <div class="overlay"></div>

  <div class="center-text" onclick="enterSite()">
    <h1>KYEOL</h1>
    <h3 class="subtitle">ARCHITECTURE & INTERIOR</h3>
    <p class="click-text">CLICK TO ENTER</p>
  </div>
</div>

<!-- 내부 -->
<div class="screen second-screen" id="second">
  <div class="back-area" onclick="goBack()"></div>

  <div class="inner-menu">
    <a href="about.html">ABOUT</a>
    <a href="portfolio.html">PORTFOLIO</a>
    <a href="proposal.html">PROPOSAL</a>
    <a href="contact.html">CONTACT</a>
  </div>
</div>

<script>
function enterSite() {
  document.getElementById("main").style.opacity = "0";
  document.getElementById("main").style.pointerEvents = "none";
  document.getElementById("sns").style.display = "none";

  const second = document.getElementById("second");
  second.style.opacity = "1";
  second.style.transform = "scale(1)";

  document.querySelectorAll(".inner-menu a").forEach((el,i)=>{
    setTimeout(()=>el.classList.add("show"), i*200);
  });
}

function goBack() {
  document.getElementById("main").style.opacity = "1";
  document.getElementById("main").style.pointerEvents = "auto";
  document.getElementById("sns").style.display = "block";
  document.getElementById("second").style.opacity = "0";
}
</script>

</body>
</html>
