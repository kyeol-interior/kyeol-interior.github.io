<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KYEOL | (주)결</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500&family=Montserrat:wght@300&display=swap" rel="stylesheet">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body, html { width:100%; height:100%; background:#000; overflow:hidden; font-family:'Montserrat', sans-serif; }

        /* [1] 배경 영상: 최하단 고정 (제일 중요) */
        #video-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: -1; /* 다른 어떤 요소보다 뒤에 배치 */
        }

        /* [2] 반투명 덮개: 영상 위에 살짝 어둠을 깔아 글자를 돋보이게 함 */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.3);
            z-index: 0;
        }

        /* [3] 메인 콘텐츠: 영상과 덮개 위로 배치 */
        .container {
            position: relative;
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            z-index: 10;
            cursor: pointer;
            text-decoration: none;
            color: #fff;
        }

        .brand-name { 
            font-family: 'Playfair Display', serif; 
            font-size: 90px; 
            letter-spacing: 30px; 
            margin-right: -30px; 
            margin-bottom: 10px;
            line-height: 1.2;
            text-shadow: 0 0 20px rgba(0,0,0,0.5);
        }
        .sub-title { font-size: 13px; letter-spacing: 12px; opacity: 0.6; margin-bottom: 70px; }
        .click-text { font-size: 10px; letter-spacing: 5px; opacity: 0.4; border-bottom: 1px solid rgba(255,255,255,0.3); padding-bottom: 5px; }

        /* SNS 메뉴 */
        .sns-nav { position: fixed; top: 40px; left: 40px; z-index: 100; }
        .sns-nav h2 { font-size: 12px; color: #fff; letter-spacing: 4px; margin-bottom: 20px; opacity: 0.7; }
        .sns-nav a { display: block; color: #fff; text-decoration: none; font-size: 10px; letter-spacing: 3px; margin-bottom: 12px; opacity: 0.5; }

        @media (max-width:768px) {
            .brand-name { font-size: 42px; letter-spacing: 14px; margin-right: -14px; }
            .sub-title { font-size: 9px; letter-spacing: 7px; }
            .sns-nav { top: 30px; left: 30px; }
        }
    </style>
</head>
<body>

    <video id="video-bg" autoplay muted loop playsinline>
        <source src="./image/kyeol_video_optimized1.mp4" type="video/mp4">
    </video>

    <div class="overlay"></div>

    <div class="sns-nav">
        <h2>MY STUDIO</h2>
        <a href="https://blog.naver.com/rotte123" target="_blank">BLOG</a>
        <a href="https://pf.kakao.com/_bTIEX/friend" target="_blank">KAKAO</a>
    </div>

    <a href="about.html" class="container">
        <div class="brand-name">KYEOL</div>
        <div class="sub-title">ARCHITECTURE & INTERIOR</div>
        <div class="click-text">CLICK TO ENTER</div>
    </a>

    <script>
        // 브라우저 차단 정책으로 영상이 멈출 경우를 대비한 강제 재생 코드
        window.onload = function() {
            var v = document.getElementById('video-bg');
            v.play().catch(function() {
                // 사용자가 화면 아무데나 만지면 바로 재생 시작
                document.body.addEventListener('touchstart', function() { v.play(); }, {once:true});
                document.body.addEventListener('click', function() { v.play(); }, {once:true});
            });
        };
    </script>
</body>
</html>
