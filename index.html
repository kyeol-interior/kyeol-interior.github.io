<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KYEOL | ARCHITECTURE & INTERIOR</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Montserrat:wght@300;500&display=swap" rel="stylesheet">
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: black; font-family: 'Montserrat', sans-serif; }
        
        /* 배경 영상: 어떤 방해도 받지 않고 고정 */
        .video-bg { 
            position: fixed !important; top: 0; left: 0; 
            width: 100vw !important; height: 100vh !important; 
            object-fit: cover !important; z-index: 1; filter: brightness(0.6);
        }
        .overlay { position: fixed; width: 100%; height: 100%; background: rgba(0,0,0,0.3); z-index: 2; }

        /* [1페이지] SNS 메뉴 */
        .left-menu { position: fixed; left: 60px; top: 60px; z-index: 100; transition: 0.5s; }
        .left-menu h2 { color: white; font-size: 14px; opacity: 0.6; margin-bottom: 25px; letter-spacing: 4px; }
        .left-menu a { display: block; margin: 16px 0; font-size: 13px; color: white; text-decoration: none; letter-spacing: 3px; opacity: 0.8; transition: 0.3s; }
        .left-menu a:hover { opacity: 0.4; transform: translateX(6px); }

        /* [1페이지] 중앙 텍스트 */
        #main-page { position: fixed; width: 100%; height: 100%; z-index: 10; display: flex; align-items: center; justify-content: center; transition: 0.8s; }
        .center-text { text-align: center; color: white; cursor: pointer; }
        .center-text h1 { font-size: 80px; letter-spacing: 14px; font-family: 'Playfair Display'; margin: 0; }

        /* [2페이지] 메뉴 화면 (처음엔 아예 숨김 처리) */
        #second-page { 
            position: fixed; width: 100%; height: 100%; z-index: 20; 
            display: none; /* 💡 이 부분이 핵심: 아예 치워버림 */
            align-items: center; justify-content: center; background: rgba(0,0,0,0.6); backdrop-filter: blur(10px);
        }
        .inner-menu a { display: block; margin: 35px 0; color: white; text-decoration: none; font-size: 24px; letter-spacing: 6px; text-align: center; opacity: 0; transform: translateY(20px); transition: 0.5s; }
        .inner-menu a.show { opacity: 1; transform: translateY(0); }

        /* [2페이지] BACK 버튼 */

      /* 🔙 BACK 버튼 규격 통일 (ABOUT, PORTFOLIO와 동일) */
.back {
    position: absolute; /* 2페이지 컨테이너 안에서 고정 */
    top: 30px;
    left: 30px;
    z-index: 1000;
    cursor: pointer;
    opacity: 0.6;
    color: white;
    font-size: 13px;
    letter-spacing: 2px;
    transition: 0.3s;
}

.back:hover {
    opacity: 1;
    transform: translateX(-5px);
}

/* 모바일 대응 */
@media (max-width: 768px) {
    .back {
        top: 20px;
        left: 20px;
        font-size: 12px;
    }
}
    </style>
</head>
<body>

    <video class="video-bg" autoplay muted loop playsinline>
        <source src="image/kyeol_video_optimized.mp4" type="video/mp4">
    </video>

    <div id="sns-menu" class="left-menu">
        <h2>MY STUDIO</h2>
        <a href="https://blog.naver.com/rotte123" target="_blank">BLOG</a>
        <a href="https://pf.kakao.com/_bTIEX/friend" target="_blank">KAKAO</a>
    </div>

    <div id="main-page">
        <div class="center-text" onclick="enterSite()">
            <h1>KYEOL</h1>
            <div style="font-size:12px; letter-spacing:6px; margin-top:20px; opacity:0.7;">ARCHITECTURE & INTERIOR</div>
            <div style="font-size:10px; margin-top:40px; letter-spacing:4px; opacity:0.5;">CLICK TO ENTER</div>
        </div>
    </div>

   <div id="second-page">
    <div class="back" onclick="goBack()">← BACK</div>
    
    <div class="inner-menu">
        <a href="about.html">ABOUT</a>
        <a href="portfolio.html">PORTFOLIO</a>
        <a href="proposal.html">PROPOSAL</a>
        <a href="contact.html">CONTACT</a>
    </div>
</div>

    <script>
        function enterSite() {
            document.getElementById('main-page').style.display = 'none';
            document.getElementById('sns-menu').style.display = 'none';
            
            const second = document.getElementById('second-page');
            second.style.display = 'flex';
            setTimeout(() => {
                second.style.opacity = '1';
                document.querySelectorAll('.inner-menu a').forEach((el, i) => {
                    setTimeout(() => el.classList.add('show'), i * 100);
                });
            }, 10);
        }

        function goBack() {
            const second = document.getElementById('second-page');
            second.style.display = 'none'; // 2페이지를 즉시 치워버림
            
            document.getElementById('main-page').style.display = 'flex';
            document.getElementById('sns-menu').style.display = 'block';
            
            document.querySelectorAll('.inner-menu a').forEach(el => el.classList.remove('show'));
        }
window.onload = function() {
    const urlParams = new URLSearchParams(window.location.search);
    if (urlParams.has('menu')) {
        enterSite(); // ?menu 신호를 받으면 자동으로 메뉴 화면을 보여줌
    }
};
    </script>
</body>
</html>
