<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>결 INTERIOR & DESIGN</title>

<style>
body, html {
  margin: 0;
  padding: 0;
  height: 100%;
  font-family: Arial;
}

/* 🔥 배경 영상 */
.video-bg {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  z-index: -1;
}

/* 🔥 가운데 텍스트 */
.center-text {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  color: white;
  text-align: center;
}

.center-text h1 {
  font-size: 50px;
  letter-spacing: 5px;
}

.center-text p {
  font-size: 14px;
  opacity: 0.8;
}

/* 🔥 왼쪽 메뉴 */
.sidebar {
  position: fixed;
  left: 0;
  top: 0;
  width: 120px;
  height: 100%;
  background: rgba(255,255,255,0.1);
  color: white;
  padding: 20px;
}

.sidebar a {
  display: block;
  color: white;
  margin: 10px 0;
  text-decoration: none;
}

.sidebar a:hover {
  opacity: 0.6;
}
</style>
</head>

<body>

<!-- 🎬 배경 영상 -->
<video class="video-bg" autoplay muted loop>
  <source src="https://www.pexels.com/ko-kr/video/35697955/" type="video/mp4">
</video>

<!-- 📌 왼쪽 메뉴 -->
<div class="sidebar">
  <h3>MY STUDIO</h3>
  <a href="#">INSTAGRAM</a>
  <a href="https://pf.kakao.com/_bTIEX/friend" target="_blank">KAKAO</a>
  <a href="https://blog.naver.com/rotte123" target="_blank">BLOG</a>
</div>

<!-- 🎯 중앙 콘텐츠 -->
<div class="center-text">
  <h1>KYEOL</h1>
  <p>ARCHITECTURE & INTERIOR</p>
</div>

</body>
</html>
