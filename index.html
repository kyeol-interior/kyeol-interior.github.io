<style>
body, html {
  margin: 0;
  padding: 0;
  height: 100%;
  font-family: Arial;
}

/* 🎬 배경 영상 */
.video-bg {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  z-index: -1;
}

/* 어둡게 + 블러 */
.overlay {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.4);
  backdrop-filter: blur(4px);
}

/* 중앙 텍스트 */
.center-text {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  color: white;
  text-align: center;
}

.center-text h1 {
  font-size: 60px;
  letter-spacing: 8px;
  font-family: 'Playfair Display', serif;
}

.center-text p {
  font-size: 14px;
  opacity: 0.8;
}

/* 사이드바 */
.sidebar {
  position: fixed;
  left: 0;
  top: 0;
  width: 140px;
  height: 100%;
  background: rgba(255,255,255,0.1);
  backdrop-filter: blur(5px);
  color: white;
  padding: 20px;
}

.sidebar a {
  display: block;
  color: white;
  margin: 20px 0;
  text-decoration: none;
  letter-spacing: 1px;
}

.sidebar a:hover {
  opacity: 0.6;
}

/* 🔥 3줄 */
.menu-lines {
  margin: 40px 0;
  display: flex;
  flex-direction: column;
  align-items: center;
}

.menu-lines span {
  width: 40px;
  height: 2px;
  background: white;
  margin: 5px 0;
  opacity: 0.7;
  transition: 0.3s;
}

.menu-lines:hover span {
  width: 50px;
  opacity: 1;
}

/* 하단 */
footer {
  position: fixed;
  bottom: 0;
  width: 100%;
  text-align: center;
  color: white;
  padding: 15px;
  font-size: 12px;
  background: rgba(0,0,0,0.4);
  backdrop-filter: blur(5px);
}
</style>
</head>
