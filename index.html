<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>(주)결 | KYEOL</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body, html { width:100%; height:100%; background:#000; overflow:hidden; font-family: 'Apple SD Gothic Neo', sans-serif; }
        
        /* 영상 배경 */
        #video-wall { position:fixed; top:0; left:0; width:100%; height:100%; z-index:-1; }
        video { width:100%; height:100%; object-fit:cover; display:block; opacity: 0.6; }

        .main-frame { 
            width:100%; height:100vh; display:flex; flex-direction:column; 
            align-items:center; justify-content:center; text-decoration:none;
        }
        .brand-logo { font-size: 70px; color:#fff; letter-spacing: 15px; font-weight:800; text-shadow: 0 0 20px rgba(0,0,0,0.5); }
        .sub-desc { color: #fff; font-size: 14px; letter-spacing: 8px; margin-top: 10px; opacity: 0.7; }
        .enter-hint { margin-top:60px; color:#fff; font-size:11px; letter-spacing:4px; border-bottom:1px solid #fff; padding-bottom:5px; }

        @media (max-width:768px) { .brand-logo { font-size: 40px; letter-spacing: 8px; } }
    </style>
</head>
<body onclick="document.getElementById('kyeol-v').play()">
    <div id="video-wall">
        <video id="kyeol-v" autoplay muted loop playsinline poster="./image/8-4.jpg">
            <source src="./image/kyeol_video_optimized1.mp4" type="video/mp4">
        </video>
    </div>
    <a href="about.html" class="main-frame">
        <div class="brand-logo">KYEOL</div>
        <div class="sub-text" style="color:#fff; letter-spacing:5px; font-size:12px; margin-top:10px;">ARCHITECTURE & INTERIOR</div>
        <div class="enter-hint">CLICK TO ENTER</div>
    </a>
</body>
</html>
