<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KYEOL | ARCHITECTURE & INTERIOR</title>

    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;500&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="index-style.css">
    
    <style>
        /* [1] 중앙 정렬 레이아웃 */
        .center-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            width: 100%;
        }

        /* [2] 메인 로고 이미지 스타일 */
        .main-logo-img {
            width: 480px; /* PC에서 웅장한 크기 */
            height: auto;
            margin-bottom: 20px;
            filter: brightness(1.1); /* 영상 위에서 선명도 확보 */
            transition: all 0.6s cubic-bezier(0.2, 1, 0.3, 1);
            pointer-events: none; /* 클릭 간섭 방지 */
        }

        /* [3] 서브 타이틀 */
        .sub-title {
            font-size: 15px;
            letter-spacing: 14px;
            opacity: 0.4;
            margin-bottom: 120px; /* 💡 추후 인증 로고가 들어갈 넉넉한 공간 */
            text-transform: uppercase;
            font-weight: 300;
            color: #fff;
            margin-right: -14px; /* 자간 쏠림 방지 */
        }

        /* [4] 입장 텍스트 버튼 */
        .enter-text {
            font-size: 11px;
            letter-spacing: 7px;
            opacity: 0.4;
            border-bottom: 1px solid rgba(255,255,255,0.2);
            padding-bottom: 8px;
            transition: 0.4s ease;
            color: #fff;
        }

        /* 호버 애니메이션 */
        .center-text:hover .main-logo-img {
            transform: scale(1.03);
            filter: brightness(1.3);
        }

        .center-text:hover .enter-text {
            opacity: 1;
            letter-spacing: 9px;
            border-bottom: 1px solid rgba(255,255,255,0.7);
        }

        /* [5] 모바일 가독성 해결 (금색 로고 -> 화이트 변환) */
        @media (max-width: 768px) {
            .main-logo-img {
                width: 240px; /* 모바일 적정 크기 */
                /* 💡 금색 로고를 강제로 화이트로 반전시켜 배경과 분리 */
                filter: brightness(0) invert(1) drop-shadow(0 0 10px rgba(0,0,0,0.5));
                margin-bottom: 15px;
            }
            
            .sub-title {
                font-size: 10px;
                letter-spacing: 6px;
                margin-bottom: 80px;
                margin-right: -6px;
            }

            .enter-text {
                font-size: 10px;
                letter-spacing: 5px;
            }
        }
    </style>
</head>

<body>

    <video class="video-bg" autoplay muted loop playsinline preload="none">
        <source src="image/kyeol_video_optimized1.mp4" type="video/mp4">
    </video>

    <div class="overlay" style="background: rgba(0,0,0,0.3);"></div>

    <div id="sns-menu" class="left-menu">
        <h2>MY STUDIO</h2>
        <a href="https://blog.naver.com/rotte123" target="_blank">BLOG</a>
        <a href="https://pf.kakao.com/_bTIEX/friend" target="_blank">KAKAO</a>
    </div>

    <div id="main-page">
        <div class="center-content">
            <button class="center-text" onclick="enterSite()" style="background:none; border:none; cursor:pointer;">
                <img src="image/logo.png" alt="KYEOL" class="main-logo-img">
                
                <div class="sub-title">ARCHITECTURE & INTERIOR</div>
                
                <div class="enter-text">CLICK TO ENTER</div>
            </button>
        </div>
    </div>

    <div id="second-page">
        <div class="back" onclick="goBack()">← BACK</div>
        <div class="inner-menu">
            <a href="about.html">ABOUT</a>
            <a href="portfolio.html">PORTFOLIO</a>
            <a href="proposal.html">PROPOSAL</a>
            <a href="contact.html">CONTACT</a>
        </div>
    </div>

    <script>
        function enterSite() {
            document.getElementById('main-page').style.display = 'none';
            document.getElementById('sns-menu').style.display = 'none';
            const second = document.getElementById('second-page');
            second.style.display = 'flex';
            setTimeout(() => {
                second.style.opacity = '1';
                document.querySelectorAll('.inner-menu a').forEach((el, i) => {
                    setTimeout(() => el.classList.add('show'), i * 100);
                });
            }, 10);
        }

        function goBack() {
            const second = document.getElementById('second-page');
            second.style.opacity = '0';
            setTimeout(() => {
                second.style.display = 'none';
                document.getElementById('main-page').style.display = 'flex';
                document.getElementById('sns-menu').style.display = 'block';
            }, 300);
        }
    </script>

</body>
</html>
