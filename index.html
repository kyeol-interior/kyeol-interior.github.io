<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KYEOL</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Montserrat:wght@300;500&display=swap" rel="stylesheet">

<style>
body, html {
  margin:0;
  padding:0;
  height:100%;
  overflow:hidden;
  background:black;
  font-family:'Montserrat', sans-serif;
}

/* ===== 커서 ===== */
#cursor {
  width:20px;
  height:20px;
  border:1px solid white;
  border-radius:50%;
  position:fixed;
  pointer-events:none;
  z-index:999;
  transform:translate(-50%, -50%);
  mix-blend-mode: difference;
}

#cursor-dot {
  width:4px;
  height:4px;
  background:white;
  border-radius:50%;
  position:fixed;
  pointer-events:none;
  z-index:1000;
  transform:translate(-50%, -50%);
}

/* ===== 공통 ===== */
.screen {
  position:fixed;
  width:100%;
  height:100%;
  transition: opacity 1.2s ease, transform 1.2s ease;
}

/* ===== SNS ===== */
.left-menu {
  position:fixed;
  left:40px;
  top:40px;
  z-index:10;
}

.left-menu a {
  display:block;
  margin:12px 0;
  font-size:13px;
  color:white;
  text-decoration:none;
  letter-spacing:2px;
  opacity:0.8;
  transition:0.3s;
}

.left-menu a:hover {
  opacity:0.4;
  transform:translateX(5px);
}

.menu-title {
  color:white;
  font-size:14px;
  opacity:0.6;
  margin-bottom:20px;
  letter-spacing:3px;
}

/* ===== 메인 ===== */
.main-screen { z-index:3; }

.video-bg {
  width:100%;
  height:100%;
  object-fit:cover;
}

.overlay {
  position:absolute;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.4);
  backdrop-filter:blur(2px);
}

.center-text {
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  color:white;
  text-align:center;
  cursor:pointer;
}

.center-text h1 {
  font-size:70px;
  letter-spacing:10px;
  font-family:'Playfair Display';
  text-shadow:0 0 30px rgba(255,255,255,0.25);
  transition:0.4s;
}

.center-text:hover h1 {
  letter-spacing:14px;
}

/* ===== 내부 ===== */
.second-screen {
  background:#111;
  z-index:2;
  opacity:0;
  transform:scale(1.1);
}

/* 뒤로가기 */
.back-area {
  position:absolute;
  width:100%;
  height:100%;
  z-index:1;
}

/* 메뉴 */
.inner-menu {
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  z-index:2;
}

.inner-menu a {
  display:block;
  margin:25px 0;
  color:white;
  text-decoration:none;
  font-size:22px;
  letter-spacing:3px;
  opacity:0;
  transform:translateY(20px);
  transition:all 0.8s cubic-bezier(0.22,1,0.36,1);
  position:relative;
}

/* underline */
.inner-menu a::after {
  content:'';
  position:absolute;
  left:0;
  bottom:-5px;
  width:0;
  height:1px;
  background:white;
  transition:0.4s;
}

.inner-menu a:hover::after {
  width:100%;
}

.inner-menu a.show {
  opacity:1;
  transform:translateY(0);
}

/* ===== 모바일 ===== */
@media (max-width:768px){
  .left-menu { display:none; }
  .center-text h1 { font-size:40px; }
}
</style>
</head>

<body>

<div id="cursor"></div>
<div id="cursor-dot"></div>

<!-- SNS -->
<div class="left-menu" id="sns">
  <h2 class="menu-title">MY STUDIO</h2>
  <a href="#">INSTAGRAM</a>
  <a href="https://pf.kakao.com/_bTIEX/friend" target="_blank">KAKAO</a>
  <a href="https://blog.naver.com/rotte123" target="_blank">BLOG</a>
</div>

<!-- 메인 -->
<div class="screen main-screen" id="main">
  <video class="video-bg" autoplay muted loop playsinline>
    <source src="15129223_2160_3840_30fps.mp4">
  </video>

  <div class="overlay"></div>

  <div class="center-text" onclick="enterSite()">
    <h1>KYEOL</h1>
    <p>CLICK TO ENTER</p>
  </div>
</div>

<!-- 내부 -->
<div class="screen second-screen" id="second">
  <div class="back-area" onclick="goBack()"></div>

  <div class="inner-menu">
    <a href="about.html">ABOUT</a>
    <a href="portfolio.html">PORTFOLIO</a>
    <a href="proposal.html">PROPOSAL</a>
    <a href="contact.html">CONTACT</a>
  </div>
</div>

<script>
/* ===== 커서 ===== */
const cursor = document.getElementById("cursor");
const dot = document.getElementById("cursor-dot");

let mouseX=0, mouseY=0;
let posX=0, posY=0;

document.addEventListener("mousemove", e=>{
  mouseX=e.clientX;
  mouseY=e.clientY;
});

function loop(){
  posX += (mouseX - posX) * 0.15;
  posY += (mouseY - posY) * 0.15;

  cursor.style.left = posX + "px";
  cursor.style.top = posY + "px";

  dot.style.left = mouseX + "px";
  dot.style.top = mouseY + "px";

  requestAnimationFrame(loop);
}
loop();

/* ===== 패럴랙스 ===== */
document.addEventListener("mousemove", e=>{
  const x = (e.clientX / window.innerWidth - 0.5) * 10;
  const y = (e.clientY / window.innerHeight - 0.5) * 10;

  document.getElementById("main").style.transform =
    `scale(1.05) translate(${x}px, ${y}px)`;
});

/* ===== enter ===== */
function enterSite(){
  const main = document.getElementById("main");
  const second = document.getElementById("second");
  const sns = document.getElementById("sns");

  main.style.opacity="0";
  main.style.transform="scale(1.1)";
  main.style.pointerEvents="none";

  sns.style.opacity="0";

  second.style.opacity="1";
  second.style.transform="scale(1)";

  document.querySelectorAll(".inner-menu a").forEach((el,i)=>{
    setTimeout(()=>el.classList.add("show"), i*120);
  });
}

/* ===== back ===== */
function goBack(){
  const main = document.getElementById("main");
  const second = document.getElementById("second");
  const sns = document.getElementById("sns");

  main.style.opacity="1";
  main.style.transform="scale(1)";
  main.style.pointerEvents="auto";

  sns.style.opacity="1";

  second.style.opacity="0";
  second.style.transform="scale(1.1)";

  document.querySelectorAll(".inner-menu a").forEach(el=>{
    el.classList.remove("show");
  });
}
</script>

</body>
</html>
