<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KYEOL | INTERIOR DESIGN</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;700&family=Noto+Sans+KR:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        /* 차장님의 기존 CSS 코드를 여기에 그대로 두세요 (생략된 부분은 기존 것 사용) */
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background-color: #0a0a0a; color: white; }
        
        /* 영상 경로만 image 폴더 내부로 연결 */
        .video-background { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; }
        .video-background video { width: 100%; height: 100%; object-fit: cover; opacity: 0.5; }

        /* 기존 왼쪽 메뉴 디자인 유지 */
        .header { position: absolute; top: 0; left: 0; width: 400px; height: 100%; display: flex; flex-direction: column; justify-content: center; padding-left: 60px; box-sizing: border-box; }
        .logo { font-size: 32px; font-weight: 700; letter-spacing: 12px; text-decoration: none; color: white; margin-bottom: 5px; }
        .sub-title { font-size: 12px; letter-spacing: 4px; color: #888; margin-bottom: 40px; }
        .nav-link { display: block; font-size: 14px; letter-spacing: 3px; text-decoration: none; color: rgba(255,255,255,0.4); margin-bottom: 15px; transition: 0.3s; }
        .nav-link:hover { color: white; padding-left: 10px; }
    </style>
</head>
<body>

    <div class="video-background">
        <video autoplay muted loop playsinline>
            <source src="image/kyeol_video_optimized.mp4" type="video/mp4">
        </video>
    </div>

    <div class="header">
        <a href="index.html" class="logo">KYEOL</a>
        <div class="sub-title">INTERIOR DESIGN STUDIO</div>
        <a href="portfolio.html" class="nav-link">VIEW PORTFOLIO</a>
        <a href="about.html" class="nav-link">ABOUT</a>
        <a href="contact.html" class="nav-link">CONTACT</a>
    </div>

</body>
</html>
