<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KYEOL | 인테리어 디자인 스튜디오</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;700&family=Noto+Sans+KR:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #0a0a0a; font-family: 'Montserrat', 'Noto Sans KR', sans-serif; }
        
        /* 배경 영상 설정: image 폴더 내 최적화된 영상 경로로 수정 */
        .video-background { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; overflow: hidden; }
        .video-background video { width: 100%; height: 100%; object-fit: cover; opacity: 0.6; }

        .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle, transparent 20%, rgba(0,0,0,0.8) 100%); z-index: 0; }

        .content { position: relative; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; color: white; z-index: 1; }
        
        /* 로고: 클릭 시 메인으로 (현재 파일) */
        .logo { font-size: 32px; font-weight: 700; letter-spacing: 12px; margin-bottom: 20px; text-decoration: none; color: white; }
        
        .main-title { font-size: 14px; letter-spacing: 5px; color: #aaa; margin-bottom: 60px; font-weight: 300; }

        /* 포트폴리오 버튼: portfolio.html로 연결 (같은 폴더에 있음) */
        .btn-portfolio {
            padding: 15px 40px;
            border: 1px solid rgba(255,255,255,0.3);
            text-decoration: none;
            color: white;
            font-size: 12px;
            letter-spacing: 4px;
            transition: all 0.5s ease;
            background: transparent;
        }
        .btn-portfolio:hover { background: white; color: black; border-color: white; }

        footer { position: absolute; bottom: 40px; width: 100%; font-size: 10px; letter-spacing: 2px; color: #666; }
    </style>
</head>
<body>

    <div class="video-background">
        <video autoplay muted loop playsinline>
            <source src="image/kyeol_video_optimized.mp4" type="video/mp4">
        </video>
    </div>
    <div class="overlay"></div>

    <div class="content">
        <a href="index.html" class="logo">KYEOL</a>
        <div class="main-title">INTERIOR DESIGN STUDIO</div>
        <a href="portfolio.html" class="btn-portfolio">VIEW PORTFOLIO</a>
    </div>

    <footer>
        &copy; 2026 KYEOL. ALL RIGHTS RESERVED.
    </footer>

</body>
</html>
