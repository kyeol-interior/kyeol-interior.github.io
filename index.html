<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>(주)결 | KYEOL</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Noto+Serif+KR:wght@300&display=swap" rel="stylesheet">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body, html { width:100%; height:100%; background:#000; overflow:hidden; font-family: 'Noto Serif KR', serif; }
        
        /* 영상 배경 */
        .v-bg { position:fixed; top:0; left:0; width:100%; height:100%; z-index:-1; background:#000; }
        video { width:100%; height:100%; object-fit:cover; display:block; opacity: 0.6; }

        /* 중앙 콘텐츠 */
        .main-frame { 
            width:100%; height:100vh; display:flex; flex-direction:column; 
            align-items:center; justify-content:center; text-decoration:none;
        }
        .brand-name { 
            font-family: 'Playfair Display', serif; font-size: clamp(50px, 15vw, 90px); 
            color:#fff; letter-spacing: 25px; font-weight:600; margin-right: -25px;
        }
        .brand-meaning { 
            font-size: 13px; color: #fff; letter-spacing: 12px; margin-top: 15px; 
            opacity: 0.8; font-weight: 300; 
        }
        .enter-hint { 
            margin-top:70px; color:#fff; font-size:10px; letter-spacing:5px; 
            border-bottom:1px solid rgba(255,255,255,0.4); padding-bottom:5px; opacity: 0.5;
        }

        @media (max-width:768px) { 
            .brand-name { font-size: 42px; letter-spacing: 12px; margin-right: -12px; }
            .brand-meaning { font-size: 10px; letter-spacing: 6px; }
        }
    </style>
</head>
<body onclick="document.getElementById('main-v').play()">
    <div class="v-bg">
        <video id="main-v" autoplay muted loop playsinline poster="./image/8-4.jpg">
            <source src="./image/kyeol_video_optimized1.mp4" type="video/mp4">
        </video>
    </div>
    <a href="about.html" class="main-frame">
        <div class="brand-name">KYEOL</div>
        <div class="brand-meaning">공간과 사람을 맺다 : 結</div>
        <div class="enter-hint">CLICK TO ENTER</div>
    </a>
</body>
</html>
