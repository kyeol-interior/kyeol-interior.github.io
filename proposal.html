<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PROPOSAL | (주)결</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Noto+Sans+KR:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        /* [1] 네비게이션 스타일 (디자인 통일) */
        * { margin:0; padding:0; box-sizing:border-box; -webkit-font-smoothing: antialiased; }
        body { background:#000; font-family: 'Noto Sans KR', sans-serif; }
        
        nav { 
            position:fixed; top:0; width:100%; height:80px; 
            display:flex; justify-content:space-between; align-items:center; 
            padding:0 50px; background:rgba(0,0,0,0.85); z-index:1000; 
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .logo { font-family: 'Playfair Display', serif; font-size:24px; font-weight:700; text-decoration:none; color:#fff; letter-spacing:4px; }
        
        /* PC 메뉴 */
        .nav-links { display:flex; gap:35px; }
        .nav-links a { text-decoration:none; color:rgba(255,255,255,0.5); font-size:13px; letter-spacing:2px; font-weight:400; transition: 0.3s; }
        .nav-links a.active { color:#fff; font-weight:700; }

        /* 모바일 햄버거 버튼 */
        .menu-btn { display: none; cursor: pointer; flex-direction: column; gap: 6px; z-index: 1002; }
        .menu-btn span { width: 22px; height: 2px; background: #fff; transition: 0.3s; }

        /* 모바일 드롭다운 메뉴 */
        .mobile-nav {
            position: fixed; top: 70px; left: 0; width: 100%; 
            background: #fff; border-bottom: 1px solid #eee;
            display: none; flex-direction: column; padding: 15px 0;
            z-index: 999; box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }
        .mobile-nav a { padding: 15px 30px; text-decoration: none; color: #111; font-size: 14px; font-weight: 500; border-bottom: 1px solid #f9f9f9; }

        /* [2] 상하 스크롤 제안서 영역 */
        .proposal-container {
            padding-top: 100px; /* 네비게이션 공간 */
            padding-bottom: 100px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0px; /* 이미지 사이 간격 (취향에 따라 조정 가능) */
        }
        
        .proposal-page {
            width: 100%;
            max-width: 1100px; /* PC에서 너무 퍼지지 않게 조절 */
            display: flex;
            justify-content: center;
            background: #000;
        }

        .proposal-page img {
            width: 100%;
            height: auto;
            display: block;
            /* 스크롤 시 부드럽게 나타나는 효과 */
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.8s ease-out;
        }
        
        .proposal-page img.visible {
            opacity: 1;
            transform: translateY(0);
        }

        /* 📱 모바일 최적화 */
        @media (max-width: 1024px) {
            nav { padding: 0 25px; height: 70px; }
            .logo { font-size: 20px; }
            .nav-links { display: none; } 
            .menu-btn { display: flex; } 
            
            .proposal-container { padding-top: 80px; }
            .proposal-page { max-width: 100%; }
        }
    </style>
</head>
<body>

    <nav>
        <a href="index.html" class="logo">KYEOL</a>
        <div class="nav-links">
            <a href="about.html">ABOUT</a>
            <a href="portfolio.html">PORTFOLIO</a>
            <a href="proposal.html" class="active">PROPOSAL</a>
            <a href="contact.html">CONTACT</a>
        </div>
        <div class="menu-btn" id="menuToggle">
            <span></span><span></span><span></span>
        </div>
    </nav>

    <div class="mobile-nav" id="dropdown">
        <a href="about.html">ABOUT</a>
        <a href="portfolio.html">PORTFOLIO</a>
        <a href="proposal.html">PROPOSAL</a>
        <a href="contact.html">CONTACT</a>
    </div>

    <div class="proposal-container">
        <div class="proposal-page"><img src="page/page1.jpg" class="lazy"></div>
        <div class="proposal-page"><img src="page/page2.jpg" class="lazy"></div>
        <div class="proposal-page"><img src="page/page3.jpg" class="lazy"></div>
        <div class="proposal-page"><img src="page/page4.jpg" class="lazy"></div>
        <div class="proposal-page"><img src="page/page5.jpg" class="lazy"></div>
        <div class="proposal-page"><img src="page/page6.jpg" class="lazy"></div>
        <div class="proposal-page"><img src="page/page7.jpg" class="lazy"></div>
        <div class="proposal-page"><img src="page/page8.jpg" class="lazy"></div>
        <div class="proposal-page"><img src="page/page9.jpg" class="lazy"></div>
        <div class="proposal-page"><img src="page/page10.jpg" class="lazy"></div>
        <div class="proposal-page"><img src="page/page11.jpg" class="lazy"></div>
        <div class="proposal-page"><img src="page/page12.jpg" class="lazy"></div>
        <div class="proposal-page"><img src="page/page13.jpg" class="lazy"></div>
        <div class="proposal-page"><img src="page/page14.jpg" class="lazy"></div>
    </div>

    <script>
        // 메뉴 토글 로직
        const menuToggle = document.getElementById('menuToggle');
        const dropdown = document.getElementById('dropdown');
        menuToggle.onclick = (e) => { 
            e.stopPropagation();
            dropdown.style.display = (dropdown.style.display === 'flex') ? 'none' : 'flex'; 
        };

        // 스크롤 시 이미지가 부드럽게 나타나는 효과 (Intersection Observer)
        const images = document.querySelectorAll('.lazy');
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('visible');
                }
            });
        }, { threshold: 0.1 });

        images.forEach(img => observer.observe(img));

        // 외부 클릭 시 메뉴 닫기
        window.onclick = () => { dropdown.style.display = 'none'; }
    </script>
</body>
</html>
