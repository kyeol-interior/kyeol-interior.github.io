<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PROPOSAL | (주)결</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Noto+Sans+KR:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        /* [1] 네비게이션 스타일 (고정) */
        * { margin:0; padding:0; box-sizing:border-box; -webkit-font-smoothing: antialiased; }
        body { background:#000; font-family: 'Noto Sans KR', sans-serif; }
        
        nav { 
            position:fixed; top:0; width:100%; height:80px; 
            display:flex; justify-content:space-between; align-items:center; 
            padding:0 50px; background:rgba(0,0,0,0.9); z-index:1000; 
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .logo { font-family: 'Playfair Display', serif; font-size:24px; font-weight:700; text-decoration:none; color:#fff; letter-spacing:4px; }
        
        .nav-links { display:flex; gap:35px; }
        .nav-links a { text-decoration:none; color:rgba(255,255,255,0.5); font-size:13px; letter-spacing:2px; font-weight:400; }
        .nav-links a.active { color:#fff; font-weight:700; }

        .menu-btn { display: none; cursor: pointer; flex-direction: column; gap: 6px; z-index: 1002; }
        .menu-btn span { width: 22px; height: 2px; background: #fff; }

        .mobile-nav {
            position: fixed; top: 70px; left: 0; width: 100%; 
            background: #fff; display: none; flex-direction: column; padding: 15px 0;
            z-index: 999;
        }
        .mobile-nav a { padding: 15px 30px; text-decoration: none; color: #111; font-size: 14px; border-bottom: 1px solid #f9f9f9; }

        /* [2] 제안서 컨테이너: 여백 시공 */
        .proposal-container {
            padding-top: 120px; /* 상단바와의 첫 간격 */
            padding-bottom: 150px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 60px; /* 💡 페이지와 페이지 사이의 시원한 간격 */
        }
        
        .proposal-page {
            width: 100%;
            max-width: 1000px; /* 읽기 편한 최적 너비 */
            display: flex;
            justify-content: center;
            padding: 0 20px;
        }

        .proposal-page img {
            width: 100%;
            height: auto;
            display: block;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5); /* 입체감 부여 */
            opacity: 0;
            transform: translateY(30px);
            transition: all 1s ease-out;
        }
        
        .proposal-page img.visible {
            opacity: 1;
            transform: translateY(0);
        }

        /* 📱 모바일 최적화 */
        @media (max-width: 1024px) {
            nav { padding: 0 25px; height: 70px; }
            .logo { font-size: 20px; }
            .nav-links { display: none; } 
            .menu-btn { display: flex; } 
            
            .proposal-container { padding-top: 100px; gap: 40px; } /* 모바일은 간격을 살짝 조절 */
        }
    </style>
</head>
<body>

    <nav>
        <a href="index.html" class="logo">KYEOL</a>
        <div class="nav-links">
            <a href="about.html">ABOUT</a>
            <a href="portfolio.html">PORTFOLIO</a>
            <a href="proposal.html" class="active">PROPOSAL</a>
            <a href="contact.html">CONTACT</a>
        </div>
        <div class="menu-btn" id="menuToggle">
            <span></span><span></span><span></span>
        </div>
    </nav>

    <div class="mobile-nav" id="dropdown">
        <a href="about.html">ABOUT</a>
        <a href="portfolio.html">PORTFOLIO</a>
        <a href="proposal.html">PROPOSAL</a>
        <a href="contact.html">CONTACT</a>
    </div>

    <div class="proposal-container">
        <div class="proposal-page"><img src="page/page1.jpg" class="lazy"></div>
        <div class="proposal-page"><img src="page/page2.jpg" class="lazy"></div>
        <div class="proposal-page"><img src="page/page3.jpg" class="lazy"></div>
        <div class="proposal-page"><img src="page/page4.jpg" class="lazy"></div>
        <div class="proposal-page"><img src="page/page5.jpg" class="lazy"></div>
        <div class="proposal-page"><img src="page/page6.jpg" class="lazy"></div>
        <div class="proposal-page"><img src="page/page7.jpg" class="lazy"></div>
        <div class="proposal-page"><img src="page/page8.jpg" class="lazy"></div>
        <div class="proposal-page"><img src="page/page9.jpg" class="lazy"></div>
        <div class="proposal-page"><img src="page/page10.jpg" class="lazy"></div>
        <div class="proposal-page"><img src="page/page11.jpg" class="lazy"></div>
        <div class="proposal-page"><img src="page/page12.jpg" class="lazy"></div>
        <div class="proposal-page"><img src="page/page13.jpg" class="lazy"></div>
        <div class="proposal-page"><img src="page/page14.jpg" class="lazy"></div>
    </div>

    <script>
        const menuToggle = document.getElementById('menuToggle');
        const dropdown = document.getElementById('dropdown');
        menuToggle.onclick = (e) => { 
            e.stopPropagation();
            dropdown.style.display = (dropdown.style.display === 'flex') ? 'none' : 'flex'; 
        };

        const images = document.querySelectorAll('.lazy');
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('visible');
                }
            });
        }, { threshold: 0.1 });

        images.forEach(img => observer.observe(img));
        window.onclick = () => { dropdown.style.display = 'none'; }
    </script>
</body>
</html>
