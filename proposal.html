<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Proposal</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  background: black;
  font-family: Arial;
}

/* 슬라이드 전체 */
.slider {
  display: flex;
  width: 1400%;
  height: 100vh;
}

/* 한 장 */
.slide {
  width: 100vw;
  height: 100vh;

  display: flex;
  justify-content: center;
  align-items: center;

  transition: transform 0.5s ease;
}

/* 이미지 */
.slide img {
  width: 100vw;
  height: 100vh;
  object-fit: contain;
  background: black;
  max-width: 900px;
  border-radius: 12px;
  box-shadow: 0 20px 50px rgba(0,0,0,0.7);
}

/* 모바일 */
@media (max-width: 768px) {
  .slide img {
    width: 95%;
  }
}

/* 페이지 번호 */
.page-number {
  position: fixed;
  bottom: 30px;
  right: 30px;
  color: rgba(255,255,255,0.7);
  font-size: 13px;
  letter-spacing: 2px;
}
</style>
</head>

<body>

<div class="slider" id="slider">

  <div class="slide active"><img src="page1.jpg"></div>
  <div class="slide"><img src="page2.jpg"></div>
  <div class="slide"><img src="page3.jpg"></div>
  <div class="slide"><img src="page4.jpg"></div>
  <div class="slide"><img src="page5.jpg"></div>
  <div class="slide"><img src="page6.jpg"></div>
  <div class="slide"><img src="page7.jpg"></div>
  <div class="slide"><img src="page8.jpg"></div>
  <div class="slide"><img src="page9.jpg"></div>
  <div class="slide"><img src="page10.jpg"></div>
  <div class="slide"><img src="page11.jpg"></div>
  <div class="slide"><img src="page12.jpg"></div>
  <div class="slide"><img src="page13.jpg"></div>
  <div class="slide"><img src="page14.jpg"></div>

</div>

<div class="page-number" id="pageNumber">01 / 14</div>

<script>
let current = 0;
const total = 14;
const slider = document.getElementById("slider");
const slides = document.querySelectorAll(".slide");
const pageNumber = document.getElementById("pageNumber");

/* 업데이트 */
function updateSlide() {
  slider.style.transform = `translateX(-${current * 100}vw)`;

  slides.forEach((slide, i) => {
    slide.classList.toggle("active", i === current);
  });

  let num = (current + 1).toString().padStart(2, "0");
  pageNumber.innerText = `${num} / ${total}`;
}

/* 휠 */
window.addEventListener("wheel", (e) => {
  if (e.deltaY > 0) current = Math.min(current + 1, total - 1);
  else current = Math.max(current - 1, 0);
  updateSlide();
});

/* 키보드 */
window.addEventListener("keydown", (e) => {
  if (e.key === "ArrowRight") current = Math.min(current + 1, total - 1);
  if (e.key === "ArrowLeft") current = Math.max(current - 1, 0);
  updateSlide();
});

/* 모바일 스와이프 */
let startX = 0;

window.addEventListener("touchstart", (e) => {
  startX = e.touches[0].clientX;
});

window.addEventListener("touchend", (e) => {
  let endX = e.changedTouches[0].clientX;

  if (startX - endX > 50) current = Math.min(current + 1, total - 1);
  if (endX - startX > 50) current = Math.max(current - 1, 0);

  updateSlide();
});
</script>

</body>
</html>
