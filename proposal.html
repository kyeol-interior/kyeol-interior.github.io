<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Proposal</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  font-family: Arial;
  background: black;
}

/* 슬라이드 */
.slider {
  display: flex;
  width: 1400%;
  height: 100vh;
  transition: transform 0.6s ease;
}

/* 한 장 */
.slide {
  width: 100vw;
  height: 100vh;
  flex-shrink: 0;

  display: flex;
  justify-content: center;
  align-items: center;
}

/* 이미지 */
.slide img {
  width: 80%;
  max-width: 900px;
  border-radius: 10px;
}

/* 모바일 */
@media (max-width: 768px) {
  .slide img {
    width: 95%;
  }
}

/* 페이지 번호 */
.page-number {
  position: fixed;
  bottom: 20px;
  right: 20px;
  color: white;
  font-size: 14px;
}
</style>
</head>

<body>

<div class="slider" id="slider">

  <div class="slide"><img src="page1.jpg"></div>
  <div class="slide"><img src="page2.jpg"></div>
  <div class="slide"><img src="page3.jpg"></div>
  <div class="slide"><img src="page4.jpg"></div>
  <div class="slide"><img src="page5.jpg"></div>
  <div class="slide"><img src="page6.jpg"></div>
  <div class="slide"><img src="page7.jpg"></div>
  <div class="slide"><img src="page8.jpg"></div>
  <div class="slide"><img src="page9.jpg"></div>
  <div class="slide"><img src="page10.jpg"></div>
  <div class="slide"><img src="page11.jpg"></div>
  <div class="slide"><img src="page12.jpg"></div>
  <div class="slide"><img src="page13.jpg"></div>
  <div class="slide"><img src="page14.jpg"></div>

</div>

<div class="page-number" id="pageNumber">1 / 14</div>

<script>
let current = 0;
const total = 14;
const slider = document.getElementById("slider");
const pageNumber = document.getElementById("pageNumber");

/* 공통 */
function updateSlide() {
  slider.style.transform = `translateX(-${current * 100}vw)`;
  pageNumber.innerText = `${current + 1} / ${total}`;
}

/* 마우스 */
window.addEventListener("wheel", (e) => {
  if (e.deltaY > 0) {
    current = Math.min(current + 1, total - 1);
  } else {
    current = Math.max(current - 1, 0);
  }
  updateSlide();
});

/* 키보드 */
window.addEventListener("keydown", (e) => {
  if (e.key === "ArrowRight") {
    current = Math.min(current + 1, total - 1);
  } else if (e.key === "ArrowLeft") {
    current = Math.max(current - 1, 0);
  }
  updateSlide();
});

/* 🔥 모바일 좌우 스와이프 */
let startX = 0;

window.addEventListener("touchstart", (e) => {
  startX = e.touches[0].clientX;
});

window.addEventListener("touchend", (e) => {
  let endX = e.changedTouches[0].clientX;

  if (startX - endX > 50) {
    current = Math.min(current + 1, total - 1);
  } else if (endX - startX > 50) {
    current = Math.max(current - 1, 0);
  }

  updateSlide();
});
</script>

</body>
</html>
