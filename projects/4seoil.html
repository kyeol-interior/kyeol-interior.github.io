<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KYEOL | SEOIL ART GALLERY</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">
<style>
/* 기본 설정 */
body { margin: 0; font-family: 'Montserrat', sans-serif; background: #0a0a0a; color: white; overflow-x: hidden; }

/* 1. 뒤로가기 버튼 위치 및 스타일 */
.nav-header { position: fixed; top: 40px; left: 40px; z-index: 1001; }
.back-btn { color: white; text-decoration: none; font-size: 10px; letter-spacing: 4px; opacity: 0.5; cursor: pointer; background: none; border: none; text-transform: uppercase; transition: 0.3s; }
.back-btn:hover { opacity: 1; }

.container { display: flex; min-height: 100vh; }

/* 2. 왼쪽 설명창: 가운데 스크롤바 숨기기 핵심 코드 */
.left { 
    width: 40%; 
    height: 100vh; 
    position: fixed; 
    left: 0; 
    top: 0; 
    padding: 150px 60px 80px; 
    box-sizing: border-box; 
    overflow-y: auto; /* 내용은 스크롤 가능하게 */
    background: #0a0a0a; 
    -ms-overflow-style: none; /* 인터넷 익스플로러, 엣지용 */
    scrollbar-width: none;  /* 파이어폭스용 */
}
.left::-webkit-scrollbar { display: none; } /* 크롬, 사파리, 웨일용 스크롤바 완전 숨김 */

.title-area h2 { font-size: 24px; letter-spacing: 6px; margin-bottom: 10px; font-weight: 500; }
.project-subtitle { font-size: 12px; color: #666; margin-bottom: 50px; letter-spacing: 2px; }

.desc-section { margin-bottom: 40px; }
.desc-section h3 { font-size: 11px; letter-spacing: 3px; color: #444; margin-bottom: 15px; }
.desc-section p { line-height: 2.2; font-size: 13px; font-weight: 300; opacity: 0.7; margin: 5px 0; }
.desc-section p b { color: white; font-weight: 400; }

.desc-footer { font-size: 11px; line-height: 2; opacity: 0.4; margin-top: 60px; border-top: 1px solid #222; padding-top: 30px; }

/* 3. 오른쪽 사진창 */
.right { 
    width: 60%; 
    margin-left: 40%; 
    background: #0d0d0d; 
    padding: 100px 0; 
}

.image-box { 
    width: 80%; 
    max-width: 700px; 
    margin: 0 auto 80px; 
}

.image-box img { 
    width: 100%; 
    height: auto; 
    display: block; 
    filter: brightness(0.9); 
    transition: 0.5s;
    border-radius: 2px;
}
.image-box img:hover { filter: brightness(1); }

/* 모바일 대응 */
@media (max-width: 1024px) {
    .container { flex-direction: column; }
    .left { position: relative; width: 100%; height: auto; padding: 100px 30px 40px; overflow-y: visible; }
    .right { width: 100%; margin-left: 0; padding: 20px 0; }
    .image-box { width: 90%; margin-bottom: 40px; }
}
</style>
</head>
<body>

<nav class="nav-header">
    <button class="back-btn" onclick="location.href='../portfolio.html'">← BACK TO LIST</button>
</nav>

<div class="container">
    <aside class="left">
        <div class="title-area">
            <h2>학교 안 작은미술관</h2>
            <p class="project-subtitle">"서일 초등학교"</p>
        </div>
        
        <div class="desc-section">
            <h3>CONCEPT</h3>
            <p><b>"Artful Corridor"</b><br>(복도가 갤러리가 되는 일상의 예술화)</p>
        </div>

        <div class="desc-section">
            <h3>DETAIL</h3>
            <p>• Frame Effect: 단순한 이동 통로를 작품이 돋보이는 화이트 큐브 형식의 갤러리로 전환.</p>
            <p>• Spotlight: 각 작품의 질감을 살리는 정교한 스포트라이트 배치로 몰입도 극대화.</p>
            <p>• Eco-Friendly: 아이들의 건강을 고려한 친환경 자재와 안전한 동선 설계.</p>
        </div>

        <div class="desc-footer">
            결(KYEOL)은 학교 복도 끝에 깊은 숲을 닮은 갤러리의 문을 열었습니다.
        </div>
    </aside>

    <main class="right">
        <div class="image-box"><img src="../image/4-1.jpg"></div>
        <div class="image-box"><img src="../image/4-2.jpg"></div>
        <div class="image-box"><img src="../image/4-3.jpg"></div>
        <div class="image-box"><img src="../image/4-4.jpg"></div>
        <div class="image-box"><img src="../image/4-5.jpg"></div>
        <div class="image-box"><img src="../image/4-6.jpg"></div>
    </main>
</div>

</body>
</html>
