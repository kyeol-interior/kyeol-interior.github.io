<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KYEOL | IN THE MAKE UP</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">
<style>
body { margin: 0; font-family: 'Montserrat', sans-serif; background: #0a0a0a; color: white; overflow-x: hidden; }
.nav-header { position: fixed; top: 50px; left: 50px; z-index: 1000; }
.back-btn { color: white; text-decoration: none; font-size: 10px; letter-spacing: 4px; opacity: 0.5; cursor: pointer; background: none; border: none; text-transform: uppercase; }

.container { display: flex; min-height: 100vh; }

/* 왼쪽 설명창: 고정 */
.left { 
  width: 40%; 
  height: 100vh; 
  position: fixed; 
  left: 0; 
  top: 0; 
  padding: 180px 80px 80px; 
  box-sizing: border-box; 
  overflow-y: auto; 
  background: #0a0a0a; 
}
.title { font-size: 26px; letter-spacing: 5px; margin-bottom: 50px; font-weight: 500; }
.meta { display: flex; flex-direction: column; gap: 25px; margin-bottom: 50px; }
.meta-item span { display: block; font-size: 9px; letter-spacing: 3px; opacity: 0.3; text-transform: uppercase; margin-bottom: 8px; }
.meta-item p { margin: 0; font-size: 13px; opacity: 0.8; }
.desc { line-height: 2.2; font-size: 13px; font-weight: 300; opacity: 0.6; }

/* 오른쪽 사진창 */
.right { 
  width: 60%; 
  margin-left: 40%; 
  background: #0d0d0d; 
  padding: 80px 0; /* 상하 여백으로 시작과 끝을 여유있게 */
}

/* 🔥 핵심: 가로폭을 90%로 살짝 줄여서 세로 길이를 압축 */
.image-box { 
  width: 90%;       /* 오른쪽 영역의 90%만 사용 (좌우 여백 생성) */
  max-width: 1000px; /* 너무 큰 모니터에서 무한정 커지는 것 방지 */
  margin: 0 auto 60px; /* 중앙 정렬 + 사진 간 간격 */
}

.image-box img { 
  width: 100%;      
  height: auto;     /* 비율 유지 (절대 안 잘림) */
  display: block;   
  filter: brightness(0.9); 
  border-radius: 2px; /* 미세한 곡선으로 고급스러움 추가 */
}

/* 모바일 대응 */
@media (max-width: 768px) {
  .container { flex-direction: column; }
  .left { position: relative; width: 100%; height: auto; padding: 120px 30px 40px; }
  .right { width: 100%; margin-left: 0; padding: 40px 0; }
  .image-box { width: 92%; margin-bottom: 30px; }
}
</style>
</head>
<body>
<nav class="nav-header"><button class="back-btn" onclick="location.href='portfolio.html'">← BACK TO LIST</button></nav>
<div class="container">
  <aside class="left">
    <div class="title">IN THE MAKE UP</div>
    <div class="meta">
      <div class="meta-item"><span>Project</span><p>🏛️ 공간 컨셉: "Modern Minimalist & Warm Serenity"</p></div>
      <div class="meta-item"><span>Interior Surface</span><p>132㎡</p></div>
      <div class="meta-item"><span>Location</span><p>전주</p></div>
    </div>
    <div class="desc">
      "나를 마주하는 가장 아름다운 시간"<br><br>
      차분한 그레이와 따뜻한 베이지가 어우러진 공간에서<br>나만의 고유한 아름다움이 피어납니다.<br><br>
      간결한 선과 절제된 조명 아래,<br>프라이빗한 메이크업 존은 온전한 집중을 선사하며<br>방문하는 모든 이들에게 품격 있는 쉼표가 되어줍니다.
    </div>
  </aside>
  <main class="right">
    <div class="image-box"><img src="3-1.jpg"></div>
    <div class="image-box"><img src="3-2.jpg"></div>
    <div class="image-box"><img src="3-3.jpg"></div>
    <div class="image-box"><img src="3-4.jpg"></div>
    <div class="image-box"><img src="3-5.jpg"></div>
    <div class="image-box"><img src="3-6.jpg"></div>
    <div class="image-box"><img src="3-7.jpg"></div>
    <div class="image-box"><img src="3-8.jpg"></div>
    <div class="image-box"><img src="3-9.jpg"></div>
  </main>
</div>
</body>
</html>
