<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KYEOL | IN THE MAKE UP</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">
<style>
body { margin: 0; font-family: 'Montserrat', sans-serif; background: #0a0a0a; color: white; overflow-x: hidden; -webkit-font-smoothing: antialiased; }
.nav-header { position: fixed; top: 50px; left: 50px; z-index: 1000; display: flex; align-items: center; gap: 25px; }
.back-btn { color: white; text-decoration: none; font-size: 10px; letter-spacing: 4px; opacity: 0.5; cursor: pointer; transition: 0.4s; background: none; border: none; padding: 0; text-transform: uppercase; }
.back-btn:hover { opacity: 1; transform: translateX(-3px); }
.container { display: flex; min-height: 100vh; }
.left { width: 40%; height: 100vh; position: fixed; left: 0; top: 0; padding: 180px 80px 80px; box-sizing: border-box; display: flex; flex-direction: column; }
.title { font-size: 26px; letter-spacing: 5px; margin-bottom: 50px; font-weight: 500; text-transform: uppercase; line-height: 1.4; }
.meta { display: flex; flex-direction: column; gap: 25px; margin-bottom: 50px; }
.meta-item span { display: block; font-size: 9px; letter-spacing: 3px; opacity: 0.3; text-transform: uppercase; margin-bottom: 8px; }
.meta-item p { margin: 0; font-size: 13px; letter-spacing: 1px; font-weight: 400; opacity: 0.8; }
.desc { line-height: 2.2; font-size: 13px; font-weight: 300; opacity: 0.6; max-width: 400px; }
.right { width: 60%; margin-left: 40%; background: #0d0d0d; }
.image-box {
  padding: 40px 60px; /* 좌우 여백 유지 */
  display: flex;
  justify-content: center;
}

.image-box img {
  width: 100%;          /* 가로폭은 부모 박스에 꽉 채움 */
  max-width: 900px;     /* 너무 커지는 것 방지 */
  height: 70vh;         /* 🔥 핵심: 세로 높이를 화면의 70%로 고정 */
  object-fit: cover;    /* 🔥 중요: 설정한 높이에 맞춰 이미지를 가득 채움 (비율 유지하며 외곽 커팅) */
  filter: brightness(0.9);
  transition: 0.8s;
  border-radius: 8px;
}

/* 모바일에서는 세로로 길게 보는 것이 자연스러우므로 제한 해제 */
@media (max-width: 768px) {
  .image-box { padding: 20px 15px; }
  .image-box img { 
    height: auto;       /* 모바일은 높이 제한 없음 */
    max-height: none;
    object-fit: contain;
  }
}
</style>
</head>
<body>
<nav class="nav-header"><button class="back-btn" onclick="location.href='portfolio.html'">← BACK TO LIST</button></nav>
<div class="container">
  <aside class="left">
    <div class="title">IN THE MAKE UP</div>
    <div class="meta">
      <div class="meta-item"><span>Concept</span><p>🏛️ Modern Minimalist & Warm Serenity</p></div>
      <div class="meta-item"><span>Interior Surface</span><p>132㎡</p></div>
      <div class="meta-item"><span>Location</span><p>JEONJU, KOREA</p></div>
    </div>
    <div class="desc">차분한 그레이와 따뜻한 베이지가 어우러진 공간에서 나만의 고유한 아름다움이 피어납니다. 프라이빗한 메이크업 존에서 온전한 집중을 선사합니다.</div>
  </aside>
  <main class="right">
    <div class="image-box"><img src="3-1.jpg"></div>
    <div class="image-box"><img src="3-2.jpg"></div>
    <div class="image-box"><img src="3-3.jpg"></div>
    <div class="image-box"><img src="3-4.jpg"></div>
    <div class="image-box"><img src="3-5.jpg"></div>
    <div class="image-box"><img src="3-6.jpg"></div>
    <div class="image-box"><img src="3-7.jpg"></div>
    <div class="image-box"><img src="3-8.jpg"></div>
    <div class="image-box"><img src="3-9.jpg"></div>
  </main>
</div>
</body>
</html>
