<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KYEOL | SONGJEONG SUMMIT APARTMENT</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Montserrat', sans-serif;
  background: #0a0a0a;
  color: white;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
}

/* 🔙 상단 네비게이션 */
.nav-header {
  position: fixed;
  top: 50px;
  left: 50px;
  z-index: 1000;
  display: flex;
  align-items: center;
  gap: 25px;
}

.back-btn {
  color: white;
  text-decoration: none;
  font-size: 10px;
  letter-spacing: 4px;
  opacity: 0.5;
  cursor: pointer;
  transition: 0.4s;
  background: none;
  border: none;
  padding: 0;
  text-transform: uppercase;
}

.back-btn:hover {
  opacity: 1;
  transform: translateX(-3px);
}

/* 전체 컨테이너 */
.container {
  display: flex;
  min-height: 100vh;
}

/* 왼쪽 설명 섹션 (PC 고정) */
.left {
  width: 40%;
  height: 100vh;
  position: fixed;
  left: 0;
  top: 0;
  padding: 180px 80px 80px;
  box-sizing: border-box;
  display: flex;
  flex-direction: column;
}

.title {
  font-size: 26px;
  letter-spacing: 5px;
  margin-bottom: 50px;
  font-weight: 500;
  text-transform: uppercase;
  line-height: 1.4;
}

.meta {
  display: flex;
  flex-direction: column;
  gap: 25px;
  margin-bottom: 50px;
}

.meta-item span {
  display: block;
  font-size: 9px;
  letter-spacing: 3px;
  opacity: 0.3;
  text-transform: uppercase;
  margin-bottom: 8px;
}

.meta-item p {
  margin: 0;
  font-size: 13px;
  letter-spacing: 1px;
  font-weight: 400;
  opacity: 0.8;
}

.desc {
  line-height: 2.2;
  font-size: 13px;
  font-weight: 300;
  opacity: 0.6;
  max-width: 400px;
}

/* 오른쪽 이미지 섹션 */
.right {
  width: 60%;
  margin-left: 40%;
  background: #0d0d0d;
}

.image-box {
  padding: 100px 60px;
  opacity: 0;
  transform: translateY(30px);
  transition: 1.5s ease;
}

.image-box.show {
  opacity: 1;
  transform: translateY(0);
}

.image-box img {
  width: 100%;
  display: block;
  filter: brightness(0.9);
  transition: 0.8s;
}

.image-box:hover img {
  filter: brightness(1.1);
}

/* 모바일 최적화 */
@media (max-width: 1024px) {
  .left { padding: 150px 40px 40px; }
}

@media (max-width: 768px) {
  .container { flex-direction: column; }
  .nav-header { top: 30px; left: 30px; }
  
  .left {
    position: relative;
    width: 100%;
    height: auto;
    padding: 140px
