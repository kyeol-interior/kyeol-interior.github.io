<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KYEOL | PORTFOLIO</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  body { margin: 0; font-family: 'Montserrat', sans-serif; background: #0a0a0a; color: white; overflow-x: hidden; }
  
  header { padding: 80px 50px 40px; text-align: center; }
  .logo { font-size: 32px; letter-spacing: 12px; font-weight: 500; margin-bottom: 10px; cursor: pointer; text-decoration: none; color: white; display: block; }
  .sub-title { font-size: 10px; letter-spacing: 5px; opacity: 0.4; text-transform: uppercase; }

  .filter-nav { margin: 40px 0; text-align: center; font-size: 11px; letter-spacing: 2px; opacity: 0.6; }

  .grid-container { 
    display: grid; 
    grid-template-columns: repeat(3, 1fr); 
    gap: 30px; 
    padding: 0 50px 100px; 
    max-width: 1400px; 
    margin: 0 auto; 
  }

  .grid-item { 
    position: relative; 
    overflow: hidden; 
    aspect-ratio: 4 / 3; 
    background: #1a1a1a;
    cursor: pointer;
    text-decoration: none;
    display: block;
  }

  /* 🎯 기본 상태: 항상 흑백 */
  .grid-item img { 
    width: 100%; 
    height: 100%; 
    object-fit: cover; 
    filter: grayscale(100%) brightness(0.5); 
    transition: all 0.7s ease-out; /* 전환 속도를 조금 더 탄력 있게 조절 */
    transform: scale(1.05);
  }

  /* 🎯 활성화 상태(화면 중앙 감지): 컬러로 부활 */
  .grid-item.is-active img {
    filter: grayscale(0%) brightness(1);
    transform: scale(1);
  }

  /* 오버레이 텍스트도 중앙에서만 보이게 설정 */
  .item-overlay {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.1);
    display: flex; flex-direction: column; justify-content: center; align-items: center;
    opacity: 0; transition: opacity 0.5s;
  }

  .grid-item.is-active .item-overlay { opacity: 1; }

  .item-title { font-size: 16px; letter-spacing: 3px; margin-bottom: 10px; font-weight: 400; color: white; text-align: center; }
  .item-category { font-size: 9px; letter-spacing: 2px; opacity: 0.7; text-transform: uppercase; color: white; }

  @media (max-width: 1024px) { .grid-container { grid-template-columns: repeat(2, 1fr); } }
  @media (max-width: 768px) { 
    header { padding: 60px 20px 30px; }
    .grid-container { grid-template-columns: 1fr; padding: 0 20px 60px; gap: 40px; } /* 간격을 조금 더 넓혀 효과를 강조 */
  }
</style>
</head>
<body>

<header>
  <a href="index.html" class="logo">KYEOL</a>
  <div class="sub-title">Interior Design & Construction</div>
</header>

<div class="filter-nav">SELECTED PROJECTS</div>

<section class="grid-container">
  <a href="project1.html" class="grid-item">
    <img src="01.jpg" alt="수지초등학교">
    <div class="item-overlay">
      <div class="item-title">남원 수지초 도서관</div>
      <div class="item-category">Educational Space</div>
    </div>
  </a>

  <a href="project2.html" class="grid-item">
    <img src="07.jpg" alt="덕암정보고">
    <div class="item-overlay">
      <div class="item-title">덕암정보고 행정실</div>
      <div class="item-category">Office Space</div>
    </div>
  </a>

  <a href="project3.html" class="grid-item">
    <img src="3-1.jpg" alt="인더메이크업">
    <div class="item-overlay">
      <div class="item-title">IN THE MAKE UP</div>
      <div class="item-category">Beauty Salon</div>
    </div>
  </a>

  <a href="project4.html" class="grid-item">
    <img src="22.jpg" alt="서일초등학교">
    <div class="item-overlay">
      <div class="item-title">서일초 작은미술관</div>
      <div class="item-category">Gallery Space</div>
    </div>
  </a>

  <a href="project5.html" class="grid-item">
    <img src="29.jpg" alt="파벽돌시공">
    <div class="item-overlay">
      <div class="item-title">농소마을 주택</div>
      <div class="item-category">Exterior Work</div>
    </div>
  </a>

  <a href="project6.html" class="grid-item">
    <img src="6-1.jpg" alt="송정써미트">
    <div class="item-overlay">
      <div class="item-title">송정써미트 아파트</div>
      <div class="item-category">Residential</div>
    </div>
  </a>
</section>

<script>
  // 🎯 핵심 로직: 들어올 때 클래스 추가, 나갈 때 클래스 제거
  const observerOptions = {
    root: null,
    // rootMargin을 조절하여 컬러로 변하는 '중앙 영역'의 범위를 설정합니다.
    // 현재는 상하단 25% 지점을 지날 때만 컬러로 보이게 설정되었습니다.
    rootMargin: '-25% 0px -25% 0px', 
    threshold: 0.2
  };

  const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        entry.target.classList.add('is-active');
      } else {
        // 이 부분이 추가되어 화면 밖(중앙 영역 밖)으로 나가면 다시 흑백이 됩니다.
        entry.target.classList.remove('is-active'); 
      }
    });
  }, observerOptions);

  document.querySelectorAll('.grid-item').forEach(item => {
    observer.observe(item);
  });
</script>

</body>
</html>
