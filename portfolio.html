<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KYEOL | PORTFOLIO</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  body { margin: 0; font-family: 'Montserrat', sans-serif; background: #0a0a0a; color: white; }
  
  header { padding: 80px 50px 40px; text-align: center; }
  .logo { font-size: 32px; letter-spacing: 12px; font-weight: 500; margin-bottom: 10px; cursor: pointer; text-decoration: none; color: white; display: block; }
  .sub-title { font-size: 10px; letter-spacing: 5px; opacity: 0.4; text-transform: uppercase; }

  .filter-nav { margin: 40px 0; text-align: center; font-size: 11px; letter-spacing: 2px; opacity: 0.6; }

  .grid-container { 
    display: grid; 
    grid-template-columns: repeat(3, 1fr); 
    gap: 30px; 
    padding: 0 50px 100px; 
    max-width: 1400px; 
    margin: 0 auto; 
  }

  .grid-item { 
    position: relative; 
    overflow: hidden; 
    aspect-ratio: 4 / 3; 
    background: #1a1a1a;
    cursor: pointer;
    text-decoration: none; /* 링크 밑줄 방지 */
    display: block;
  }

  /* 🔥 핵심: 기본은 흑백(Grayscale), 마우스 올리면 컬러 */
  .grid-item img { 
    width: 100%; 
    height: 100%; 
    object-fit: cover; 
    transition: all 0.8s cubic-bezier(0.25, 1, 0.5, 1);
    filter: grayscale(100%) brightness(0.6); /* 기본 흑백 + 약간 어둡게 */
  }

  /* 마우스 오버 시 컬러로 변경 */
  .grid-item:hover img { 
    transform: scale(1.08); 
    filter: grayscale(0%) brightness(1); /* 컬러 부활 */
  }

  .item-overlay {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.2);
    display: flex; flex-direction: column; justify-content: center; align-items: center;
    opacity: 0; transition: opacity 0.5s;
  }

  .grid-item:hover .item-overlay { opacity: 1; }

  .item-title { font-size: 16px; letter-spacing: 3px; margin-bottom: 10px; font-weight: 400; color: white; }
  .item-category { font-size: 9px; letter-spacing: 2px; opacity: 0.7; text-transform: uppercase; color: white; }

  @media (max-width: 1024px) { .grid-container { grid-template-columns: repeat(2, 1fr); } }
  @media (max-width: 768px) { 
    header { padding: 60px 20px 30px; }
    .grid-container { grid-template-columns: 1fr; padding: 0 20px 60px; gap: 20px; } 
  }
</style>
</head>
<body>

<header>
  <a href="index.html" class="logo">KYEOL</a>
  <div class="sub-title">Interior Design & Construction</div>
</header>

<div class="filter-nav">SELECTED PROJECTS</div>

<section class="grid-container">
  <a href="Project_Suji.html" class="grid-item">
    <img src="01.jpg" alt="수지초등학교">
    <div class="item-overlay">
      <div class="item-title">남원 수지초 도서관</div>
      <div class="item-category">Educational Space</div>
    </div>
  </a>

  <a href="Project_Deokam.html" class="grid-item">
    <img src="07.jpg" alt="덕암정보고">
    <div class="item-overlay">
      <div class="item-title">덕암정보고 행정실</div>
      <div class="item-category">Office Space</div>
    </div>
  </a>

  <a href="Project_InTheMakeup.html" class="grid-item">
    <img src="3-1.jpg" alt="인더메이크업">
    <div class="item-overlay">
      <div class="item-title">IN THE MAKE UP</div>
      <div class="item-category">Beauty Salon</div>
    </div>
  </a>

  <a href="Project_SeoilGallery.html" class="grid-item">
    <img src="22.jpg" alt="서일초등학교">
    <div class="item-overlay">
      <div class="item-title">서일초 작은미술관</div>
      <div class="item-category">Gallery Space</div>
    </div>
  </a>

  <a href="Project_StoneWork.html" class="grid-item">
    <img src="29.jpg" alt="파벽돌시공">
    <div class="item-overlay">
      <div class="item-title">파벽돌 조적 시공</div>
      <div class="item-category">Exterior Work</div>
    </div>
  </a>

  <a href="Project_Summit.html" class="grid-item">
    <img src="6-1.jpg" alt="송정써미트">
    <div class="item-overlay">
      <div class="item-title">송정써미트 아파트</div>
      <div class="item-category">Residential</div>
    </div>
  </a>
</section>

</body>
</html>
