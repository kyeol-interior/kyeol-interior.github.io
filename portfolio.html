<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KYEOL | PORTFOLIO</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Montserrat', sans-serif; /* 전체 폰트 통일 */
  background: #0d0d0d; /* 더 깊은 블랙 */
  color: white;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
  letter-spacing: 0.02em; /* 미세한 자간 조정으로 고급스럽게 */
}

/* 🔙 상단 네비게이션 (더 가늘고 미니멀하게, 대문자화) */
.nav-header {
  position: fixed;
  top: 50px;
  left: 50px;
  z-index: 100;
  display: flex;
  align-items: center;
  gap: 25px;
}

.back-btn {
  color: white;
  text-decoration: none;
  font-size: 10px; /* 더 축소 */
  letter-spacing: 4px; /* 자간 확대 */
  opacity: 0.5;
  cursor: pointer;
  transition: 0.4s;
  background: none;
  border: none;
  padding: 0;
  text-transform: uppercase; /* 대문자화 */
}

.back-btn:hover {
  opacity: 1;
  transform: translateX(-3px);
}

.nav-title {
  font-size: 10px;
  letter-spacing: 5px;
  opacity: 0.1; /* 더 흐리게 */
  font-weight: 400;
  text-transform: uppercase;
}

/* 타이틀 섹션 (여백 대폭 추가, 폰트 통일 및 축소) */
.header-section {
  padding: 180px 10% 80px;
  text-align: left;
}

.header-section h1 {
  font-size: 28px; /* 크기 축소 */
  letter-spacing: 8px; /* 자간 대폭 확대 */
  margin: 0;
  font-weight: 500; /* 너무 굵지 않게 */
  opacity: 0.8;
  text-transform: uppercase; /* 대문자화 */
}

/* 그리드 시스템 (간격 및 여백 유지) */
.grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  column-gap: 80px;
  row-gap: 100px;
  padding: 0 10% 150px;
}

/* 카드 아이템 (애니메이션 유지) */
.item {
  position: relative;
  opacity: 0;
  transform: translateY(20px);
  transition: transform 1.2s cubic-bezier(0.16, 1, 0.3, 1), opacity 1.2s ease;
}

.item.show {
  opacity: 1;
  transform: translateY(0);
}

.img-box {
  width: 100%;
  aspect-ratio: 4 / 3;
  overflow: hidden;
  background: #1a1a1a;
  position: relative;
}

/* 이미지 스타일 (핵심: 흑백 필터) */
.item img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  filter: grayscale(100%) brightness(0.6) contrast(1.1); /* 기본: 완전 흑백, 어둡게 */
  transition: filter 1.2s cubic-bezier(0.16, 1, 0.3, 1), transform 1.5s cubic-bezier(0.16, 1, 0.3, 1);
  will-change: filter, transform;
}

/* 호버 시 컬러 전환 및 확대 */
.item:hover img {
  filter: grayscale(0%) brightness(0.9) contrast(1); /* 호버: 컬러, 밝게 */
  transform: scale(1.03);
}

/* 오버레이 (호버 시 질감 강조용, 선택 사항) */
.img-box::after {
  content: '';
  position: absolute;
  top: 0; left: 0; width: 100%; height: 100%;
  background: rgba(0,0,0,0.2);
  opacity: 1;
  transition: 0.8s;
  pointer-events: none;
}

.item:hover .img-box::after {
  opacity: 0;
}


/* 텍스트 정보 (미니멀화, 폰트 통일) */
.item .text {
  margin-top: 25px;
  transition: 0.4s;
}

.item .title {
  font-size: 15px; /* 크기 축소 */
  letter-spacing: 1px;
  margin-bottom: 6px;
  font-weight: 500;
  text-transform: uppercase; /* 대문자화 */
}

.item .sub {
  font-size: 9px; /* 더 미니멀하게 */
  letter-spacing: 2px;
  opacity: 0.3; /* 더 흐리게 */
  text-transform: uppercase;
}

/* 호버 시 텍스트 변화 (살짝 움직임 제거, 깔끔하게 여백만) */
.item:hover .text {
  /* transform: translateX(5px); */ /* 움직임 제거 */
}

/* 모바일 모드 (유지) */
@media (max-width: 1024px) {
  .grid { column-gap: 40px; padding: 0 5%; }
}

@media (max-width: 768px) {
  .nav-header { top: 30px; left: 30px; }
  .header-section { padding: 140px 30px 50px; }
  .header-section h1 { font-size: 22px; letter-spacing: 6px; }

  .grid {
    grid-template-columns: 1fr;
    padding: 0 30px 80px;
    row-gap: 60px;
  }

  .img-box { aspect-ratio: 3 / 2; }
}
</style>
</head>

<body>

<nav class="nav-header">
  <button class="back-btn" onclick="goBack()">← BACK</button>
  <span class="nav-title">KYEOL ARCHITECTURE</span>
</nav>

<header class="header-section">
  <h1>PORTFOLIO</h1>
</header>

<main class="grid">
  <div class="item" onclick="goDetail('project1.html')">
    <div class="img-box"><img src="01.jpg" alt="수지초등학교"></div>
    <div class="text">
      <div class="title">수지초등학교 생각나무 숲 도서관</div>
      <div class="sub">NAMWON · 115㎡ · EDUCATION</div>
    </div>
  </div>

  <div class="item" onclick="goDetail('project2.html')">
    <div class="img-box"><img src="10.jpg" alt="덕암정보고"></div>
    <div class="text">
      <div class="title">덕암정보고등학교 행정실</div>
      <div class="sub">GIMJE · 75㎡ · OFFICE</div>
    </div>
  </div>

  <div class="item" onclick="goDetail('project3.html')">
    <div class="img-box"><img src="3-8.jpg" alt="인더메이크업"></div>
    <div class="text">
      <div class="title">IN THE MAKE UP</div>
      <div class="sub">JEONJU · 132㎡ · COMMERCIAL</div>
    </div>
  </div>

  <div class="item" onclick="goDetail('project4.html')">
    <div class="img-box"><img src="22.jpg" alt="작은미술관"></div>
    <div class="text">
      <div class="title">학교 안 작은미술관</div>
      <div class="sub">JEONJU · 24㎡ · GALLERY</div>
    </div>
  </div>

  <div class="item" onclick="goDetail('project5.html')">
    <div class="img-box"><img src="29.jpg" alt="농소마을"></div>
    <div class="text">
      <div class="title">농소마을 주택</div>
      <div class="sub">JEONJU · 400㎡ · RESIDENTIAL</div>
    </div>
  </div>

  <div class="item" onclick="goDetail('project6.html')">
    <div class="img-box"><img src="6-1.jpg" alt="송정써미트"></div>
    <div class="text">
      <div class="title">송정써미트아파트</div>
      <div class="sub">JEONJU · 112㎡ · APARTMENT</div>
    </div>
  </div>
</main>

<script>
window.onload = () => {
  const items = document.querySelectorAll('.item');
  items.forEach((item, i) => {
    setTimeout(() => {
      item.classList.add('show');
    }, 200 * i); // 등장 속도 살짝 느리게
  });
};

function goDetail(page) {
  // 페이드 아웃 효과 강화
  document.body.style.opacity = "0";
  document.body.style.transform = "scale(0.98)";
  document.body.style.transition = "1s cubic-bezier(0.16, 1, 0.3, 1)";
  setTimeout(() => { window.location.href = page; }, 1000);
}

function goBack() {
  window.location.href = 'index.html'; 
}
</script>

</body>
</html>
