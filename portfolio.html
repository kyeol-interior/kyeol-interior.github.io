<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portfolio</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display&family=Montserrat:wght@300;500&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Montserrat', sans-serif;
  background: #f5f5f5;
  color: #111;
}

/* 🔥 전체 레이아웃 */
.section {
  display: flex;
  min-height: 100vh;
}

/* 🔥 왼쪽 텍스트 */
.left {
  width: 40%;
  padding: 80px;
  position: sticky;
  top: 0;
  height: 100vh;
  background: #f5f5f5;
}

/* 제목 */
.title {
  font-family: 'Playfair Display';
  font-size: 36px;
  margin-bottom: 40px;
}

/* 정보 */
.meta {
  display: flex;
  gap: 40px;
  font-size: 13px;
  margin-bottom: 40px;
}

.meta div span {
  display: block;
  opacity: 0.5;
}

/* 설명 */
.desc {
  line-height: 1.8;
  font-size: 14px;
}

/* 🔥 오른쪽 이미지 */
.right {
  width: 60%;
}

.right img {
  width: 100%;
  display: block;
}

/* 🔥 모바일 */
@media (max-width: 768px) {
  .section {
    flex-direction: column;
  }

  .left {
    position: relative;
    width: 100%;
    height: auto;
    padding: 40px 20px;
  }

  .right {
    width: 100%;
  }
}
</style>
</head>

<body>

<!-- 🔥 SECTION 1 -->
<div class="section">

  <!-- 왼쪽 -->
  <div class="left">
    <div class="title">수지초등학교 도서관</div>

    <div class="meta">
      <div>
        <span>Project</span>
        🌿 상상력이 뿌리 내리는, 책 읽는 놀이터
      </div>
      <div>
        <span>Interior Surface</span>
        115㎡
      </div>
      <div>
        <span>Location</span>
        남원
      </div>
    </div>

    <div class="desc">
      숲의 품을 담은 공간입니다.<br><br>
      천장에는 초록빛 생명력을 머금은 둥근 빛들이 떠 있고<br>
      공간 한가운데는 든든한 나무 한 그루가 서 있습니다<br>
      이 나무는 아이들에게 책이라는 열매를 나누어주는 수호신 같아요.<br><br>
      나무 아래 둥글게 둘러앉아 책을 읽다 보면<br>
      마치 숲속 비밀 기지에 들어온 듯한 아늑함을 느낄 수 있습니다.
    </div>
  </div>

  <!-- 오른쪽 -->
  <div class="right">
    <img src="01.jpg">
  </div>

</div>

<!-- 🔥 SECTION 2 (이미지만 계속 추가 가능) -->
<div class="section">
  <div class="left"></div>
  <div class="right">
    <img src="02.jpg">
  </div>
</div>

<div class="section">
  <div class="left"></div>
  <div class="right">
    <img src="03.jpg">    
  </div>
</div>

<div class="section">
  <div class="left"></div>
  <div class="right">
    <img src="04.jpg">    
  </div>
</div>

<div class="section">
  <div class="left"></div>
  <div class="right">
    <img src="05.jpg">    
  </div>
</div>  

<!-- 🔙 뒤로 -->
<div style="position:fixed;top:20px;left:20px;cursor:pointer;" onclick="goBack()">
  ← BACK
</div>

<script>
function goBack() {
  window.history.back();
}
</script>

</body>
</html>
