<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KYEOL | Portfolio</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Montserrat', sans-serif;
  background: #0d0d0d;
  color: white;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
}

/* 🔙 상단 네비게이션 (더 가늘고 미니멀하게) */
.nav-header {
  position: fixed;
  top: 50px;
  left: 50px;
  z-index: 100;
  display: flex;
  align-items: center;
  gap: 25px;
}

.back-btn {
  color: white;
  text-decoration: none;
  font-size: 11px;
  letter-spacing: 3px;
  opacity: 0.5;
  cursor: pointer;
  transition: 0.4s;
  background: none;
  border: none;
  padding: 0;
}

.back-btn:hover {
  opacity: 1;
  transform: translateX(-3px);
}

.nav-title {
  font-size: 11px;
  letter-spacing: 4px;
  opacity: 0.15;
  font-weight: 400;
}

/* 타이틀 섹션 (여백 대폭 추가) */
.header-section {
  padding: 180px 10% 80px; /* 좌우 여백을 %로 주어 유연하게 대응 */
  text-align: left;
}

.header-section h1 {
  font-family: 'Playfair Display';
  font-size: 32px; /* 크기 축소 */
  letter-spacing: 6px;
  margin: 0;
  font-weight: 500;
  opacity: 0.9;
}

/* 그리드 시스템 (간격 및 여백 조정) */
.grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  column-gap: 80px; /* 좌우 간격 확대 */
  row-gap: 100px;   /* 상하 간격 확대 */
  padding: 0 10% 150px;
}

/* 카드 아이템 */
.item {
  position: relative;
  opacity: 0;
  transform: translateY(20px);
  transition: transform 1.2s cubic-bezier(0.16, 1, 0.3, 1), opacity 1.2s ease;
}

.item.show {
  opacity: 1;
  transform: translateY(0);
}

.img-box {
  width: 100%;
  aspect-ratio: 4 / 3; /* 이미지 비율 고정으로 답답함 해소 */
  overflow: hidden;
  background: #1a1a1a;
}

.item img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  filter: brightness(0.7);
  transition: 1.5s cubic-bezier(0.16, 1, 0.3, 1);
}

.item:hover img {
  transform: scale(1.03);
  filter: brightness(0.9);
}

/* 텍스트 정보 (미니멀화) */
.item .text {
  margin-top: 25px;
}

.item .title {
  font-family: 'Playfair Display', serif;
  font-size: 17px;
  letter-spacing: 0.5px;
  margin-bottom: 6px;
  font-weight: 500;
}

.item .sub {
  font-size: 10px;
  letter-spacing: 1.5px;
  opacity: 0.4;
  text-transform: uppercase;
}

/* 모바일 모드 */
@media (max-width: 1024px) {
  .grid { column-gap: 40px; padding: 0 5%; }
}

@media (max-width: 768px) {
  .nav-header { top: 30px; left: 30px; }
  .header-section { padding: 140px 30px 50px; }
  .header-section h1 { font-size: 26px; }

  .grid {
    grid-template-columns: 1fr; /* 모바일은 1열 */
    padding: 0 30px 80px;
    row-gap: 60px;
  }

  .img-box { aspect-ratio: 3 / 2; }
}
</style>
</head>

<body>

<nav class="nav-header">
  <button class="back-btn" onclick="goBack()">← BACK</button>
  <span class="nav-title">KYEOL ARCHITECTURE</span>
</nav>

<header class="header-section">
  <h1>PORTFOLIO</h1>
</header>

<main class="grid">
  <div class="item" onclick="goDetail('project1.html')">
    <div class="img-box"><img src="01.jpg" alt=""></div>
    <div class="text">
      <div class="title">수지초등학교 생각나무 숲 도서관</div>
      <div class="sub">NAMWON · 115㎡ · EDUCATION</div>
    </div>
  </div>

  <div class="item" onclick="goDetail('project2.html')">
    <div class="img-box"><img src="10.jpg" alt=""></div>
    <div class="text">
      <div class="title">덕암정보고등학교 행정실</div>
      <div class="sub">GIMJE · 75㎡ · OFFICE</div>
    </div>
  </div>

  <div class="item" onclick="goDetail('project3.html')">
    <div class="img-box"><img src="3-8.jpg" alt=""></div>
    <div class="text">
      <div class="title">IN THE MAKE UP</div>
      <div class="sub">JEONJU · 132㎡ · COMMERCIAL</div>
    </div>
  </div>

  <div class="item" onclick="goDetail('project4.html')">
    <div class="img-box"><img src="22.jpg" alt=""></div>
    <div class="text">
      <div class="title">학교 안 작은미술관</div>
      <div class="sub">JEONJU · 24㎡ · GALLERY</div>
    </div>
  </div>

  <div class="item" onclick="goDetail('project5.html')">
    <div class="img-box"><img src="29.jpg" alt=""></div>
    <div class="text">
      <div class="title">농소마을 주택</div>
      <div class="sub">JEONJU · 400㎡ · RESIDENTIAL</div>
    </div>
  </div>

  <div class="item" onclick="goDetail('project6.html')">
    <div class="img-box"><img src="6-1.jpg" alt=""></div>
    <div class="text">
      <div class="title">송정써미트아파트</div>
      <div class="sub">JEONJU · 112㎡ · APARTMENT</div>
    </div>
  </div>
</main>

<script>
window.onload = () => {
  const items = document.querySelectorAll('.item');
  items.forEach((item, i) => {
    setTimeout(() => {
      item.classList.add('show');
    }, 200 * i);
  });
};

function goDetail(page) {
  document.body.style.opacity = "0";
  document.body.style.transition = "0.6s";
  setTimeout(() => { window.location.href = page; }, 600);
}

function goBack() {
  window.location.href = 'index.html'; 
}
</script>

</body>
</html>
