<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KYEOL | PORTFOLIO</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Montserrat', sans-serif;
  background: #0d0d0d;
  color: white;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
  letter-spacing: 0.02em;
}

/* 🔙 상단 네비게이션 */
.nav-header {
  position: fixed;
  top: 50px;
  left: 50px;
  z-index: 100;
  display: flex;
  align-items: center;
  gap: 25px;
}

.back-btn {
  color: white;
  text-decoration: none;
  font-size: 10px;
  letter-spacing: 4px;
  opacity: 0.5;
  cursor: pointer;
  transition: 0.4s;
  background: none;
  border: none;
  padding: 0;
  text-transform: uppercase;
}

.back-btn:hover {
  opacity: 1;
  transform: translateX(-3px);
}

.nav-title {
  font-size: 10px;
  letter-spacing: 5px;
  opacity: 0.1;
  font-weight: 400;
  text-transform: uppercase;
}

/* 타이틀 섹션 (와이드 레이아웃에 맞춰 좌우 여백 확대) */
.header-section {
  padding: 180px 15% 60px;
}

.header-section h1 {
  font-size: 24px;
  letter-spacing: 10px;
  margin: 0;
  font-weight: 500;
  opacity: 0.8;
  text-transform: uppercase;
}

/* 그리드 시스템 (1열 와이드 배치) */
.grid {
  display: grid;
  grid-template-columns: 1fr; /* 가로 1개씩 */
  row-gap: 120px; /* 작품 간의 수직 여백 확대 */
  padding: 0 15% 150px; /* 좌우 여백을 넓혀서 중앙 집중도 향상 */
}

/* 카드 아이템 */
.item {
  position: relative;
  opacity: 0;
  transform: translateY(30px);
  transition: transform 1.5s cubic-bezier(0.16, 1, 0.3, 1), opacity 1.5s ease;
}

.item.show {
  opacity: 1;
  transform: translateY(0);
}

/* 이미지 박스 (가로로 길고 세로로 짧은 비율) */
.img-box {
  width: 100%;
  aspect-ratio: 2.5 / 1; /* 가로 2.5 : 세로 1의 황금 와이드 비율 */
  overflow: hidden;
  background: #1a1a1a;
  position: relative;
}

.item img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  filter: grayscale(100%) brightness(0.5) contrast(1.1);
  transition: filter 1.2s cubic-bezier(0.16, 1, 0.3, 1), transform 2s cubic-bezier(0.16, 1, 0.3, 1);
}

.item:hover img {
  filter: grayscale(0%) brightness(0.8) contrast(1);
  transform: scale(1.02); /* 와이드 화면이므로 미세한 확대가 더 고급스러움 */
}

/* 텍스트 정보 */
.item .text {
  margin-top: 30px;
  display: flex;
  justify-content: space-between; /* 제목은 왼쪽, 설명은 오른쪽 배치로 고급화 */
  align-items: baseline;
  border-bottom: 1px solid rgba(255,255,255,0.05); /* 하단 가느다란 구분선 */
  padding-bottom: 15px;
}

.item .title {
  font-size: 14px;
  letter-spacing: 2px;
  font-weight: 400;
  text-transform: uppercase;
}

.item .sub {
  font-size: 9px;
  letter-spacing: 2px;
  opacity: 0.3;
  text-transform: uppercase;
}

/* 모바일 최적화 */
@media (max-width: 1024px) {
  .header-section, .grid { padding-left: 8%; padding-right: 8%; }
}

@media (max-width: 768px) {
  .nav-header { top: 30px; left: 30px; }
  .header-section { padding-top: 140px; }
  .header-section h1 { font-size: 20px; letter-spacing: 6px; }

  .grid {
    row-gap: 80px;
    padding: 0 30px 100px;
  }

  .img-box { aspect-ratio: 1.8 / 1; } /* 모바일에서는 너무 얇으면 안 보이므로 조절 */
  
  .item .text {
    flex-direction: column; /* 모바일에서는 위아래로 */
    gap: 8px;
  }
}
</style>
</head>

<body>

<nav class="nav-header">
  <button class="back-btn" onclick="goBack()">← BACK</button>
  <span class="nav-title">KYEOL ARCHITECTURE</span>
</nav>

<header class="header-section">
  <h1>PORTFOLIO</h1>
</header>

<main class="grid">
  <div class="item" onclick="goDetail('project1.html')">
    <div class="img-box"><img src="01.jpg" alt=""></div>
    <div class="text">
      <div class="title">수지초등학교 생각나무 숲 도서관</div>
      <div class="sub">NAMWON · 115㎡ · EDUCATION</div>
    </div>
  </div>

  <div class="item" onclick="goDetail('project2.html')">
    <div class="img-box"><img src="10.jpg" alt=""></div>
    <div class="text">
      <div class="title">덕암정보고등학교 행정실</div>
      <div class="sub">GIMJE · 75㎡ · OFFICE</div>
    </div>
  </div>

  <div class="item" onclick="goDetail('project3.html')">
    <div class="img-box"><img src="3-8.jpg" alt=""></div>
    <div class="text">
      <div class="title">IN THE MAKE UP</div>
      <div class="sub">JEONJU · 132㎡ · COMMERCIAL</div>
    </div>
  </div>

  <div class="item" onclick="goDetail('project4.html')">
    <div class="img-box"><img src="22.jpg" alt=""></div>
    <div class="text">
      <div class="title">학교 안 작은미술관</div>
      <div class="sub">JEONJU · 24㎡ · GALLERY</div>
    </div>
  </div>

  <div class="item" onclick="goDetail('project5.html')">
    <div class="img-box"><img src="29.jpg" alt=""></div>
    <div class="text">
      <div class="title">농소마을 주택</div>
      <div class="sub">JEONJU · 400㎡ · RESIDENTIAL</div>
    </div>
  </div>

  <div class="item" onclick="goDetail('project6.html')">
    <div class="img-box"><img src="6-1.jpg" alt=""></div>
    <div class="text">
      <div class="title">송정써미트아파트</div>
      <div class="sub">JEONJU · 112㎡ · APARTMENT</div>
    </div>
  </div>
</main>

<script>
window.onload = () => {
  const items = document.querySelectorAll('.item');
  items.forEach((item, i) => {
    setTimeout(() => {
      item.classList.add('show');
    }, 300 * i); // 와이드형은 천천히 하나씩 등장하는 게 더 묵직함
  });
};

function goDetail(page) {
  document.body.style.opacity = "0";
  document.body.style.transform = "translateY(-10px)"; /* 위로 살짝 떠오르며 사라지는 효과 */
  document.body.style.transition = "1s cubic-bezier(0.16, 1, 0.3, 1)";
  setTimeout(() => { window.location.href = page; }, 1000);
}

function goBack() {
  window.location.href = 'index.html'; 
}
</script>

</body>
</html>
