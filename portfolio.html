<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portfolio</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display&family=Montserrat:wght@300;500&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Montserrat', sans-serif;
  background: #111;
  color: white;
}

/* 🔙 BACK 버튼 */
.back {
  position: fixed;
  top: 20px;
  left: 20px;
  font-size: 13px;
  letter-spacing: 2px;
  cursor: pointer;
  opacity: 0.8;
  z-index: 10;
  transition: 0.3s;
}

.back:hover {
  opacity: 0.4;
}

/* 타이틀 */
.header {
  padding: 80px 40px 40px;
  font-size: 28px;
  font-family: 'Playfair Display';
}

/* 리스트 */
.grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 20px;
  padding: 40px;
}

/* 카드 */
.item {
  position: relative;
  overflow: hidden;
  cursor: pointer;
}

.item img {
  width: 100%;
  height: 420px;
  object-fit: cover;
  transition: 0.6s;
}

.item:hover img {
  transform: scale(1.1);
}

/* 텍스트 */
.item .text {
  position: absolute;
  bottom: 20px;
  left: 20px;
}

.item .title {
  font-size: 18px;
}

.item .sub {
  font-size: 12px;
  opacity: 0.7;
}

/* 모바일 */
@media (max-width: 768px) {
  .grid {
    grid-template-columns: 1fr;
    padding: 20px;
  }

  .item img {
    height: 260px;
  }
}
</style>
</head>

<body>

<div class="back" onclick="goBack()">← BACK</div>

<div class="header">PORTFOLIO</div>

<div class="grid">

  <div class="item" onclick="goDetail('project1.html')">
    <img src="01.jpg">
    <div class="text">
      <div class="title">수지초등학교 생각나무 숲 도서관</div>
      <div class="sub">남원 · 115㎡</div>
    </div>
  </div>

  <div class="item" onclick="goDetail('project2.html')">
    <img src="06.jpg">
    <div class="text">
      <div class="title">덕암정보고등학교 행정실 프로젝트</div>
      <div class="sub">김제 · 75㎡</div>
    </div>
  </div>

</div>

<script>
function goDetail(page) {
  window.location.href = page;
}

function goBack() {
  window.history.back();
}
</script>

</body>
</html>
