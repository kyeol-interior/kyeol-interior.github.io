<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PORTFOLIO | (주)결</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Noto+Sans+KR:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        /* [1] 공통 네비게이션 스타일 (ABOUT 페이지와 동일하게 통일) */
        * { margin:0; padding:0; box-sizing:border-box; -webkit-font-smoothing: antialiased; }
        body { background:#fff; font-family: 'Noto Sans KR', sans-serif; color:#111; overflow-x:hidden; }
        
        nav { 
            position:fixed; top:0; width:100%; height:80px; 
            display:flex; justify-content:space-between; align-items:center; 
            padding:0 50px; background:#fff; z-index:1000; 
            border-bottom:1px solid #f2f2f2;
        }
        .logo { font-family: 'Playfair Display', serif; font-size:24px; font-weight:700; text-decoration:none; color:#000; letter-spacing:4px; }
        
        /* PC 메뉴 */
        .nav-links { display:flex; gap:35px; }
        .nav-links a { text-decoration:none; color:#999; font-size:13px; letter-spacing:2px; font-weight:400; transition: 0.3s; }
        .nav-links a.active { color:#000; font-weight:700; }

        /* 모바일 햄버거 버튼 */
        .menu-btn { display: none; cursor: pointer; flex-direction: column; gap: 6px; z-index: 1002; }
        .menu-btn span { width: 22px; height: 2px; background: #000; transition: 0.3s; }

        /* 모바일 드롭다운 메뉴 */
        .mobile-nav {
            position: fixed; top: 70px; left: 0; width: 100%; 
            background: #fff; border-bottom: 1px solid #eee;
            display: none; flex-direction: column; padding: 15px 0;
            z-index: 999; box-shadow: 0 10px 20px rgba(0,0,0,0.05);
        }
        .mobile-nav a { padding: 15px 30px; text-decoration: none; color: #111; font-size: 14px; font-weight: 500; border-bottom: 1px solid #f9f9f9; }

        /* [2] 포트폴리오 그리드 디자인 */
        .container { padding: 140px 50px 100px; max-width: 1600px; margin: 0 auto; }
        .filter-nav { font-size: 12px; letter-spacing: 5px; color: #999; text-align: center; margin-bottom: 60px; font-weight: 400; }
        
        .grid-container { 
            display: grid; 
            grid-template-columns: repeat(3, 1fr); /* PC는 3열 */
            gap: 20px; 
        }
        
        .grid-item { 
            position: relative; overflow: hidden; background: #eee; aspect-ratio: 4/3; 
            display: block; text-decoration: none;
        }
        .grid-item img { 
            width: 100%; height: 100%; object-fit: cover; 
            filter: grayscale(100%); transition: 0.6s ease; transform: scale(1.0);
        }
        .item-overlay { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.4); display: flex; align-items: center; justify-content: center; 
            opacity: 0; transition: 0.4s ease;
        }
        .item-title { color: #fff; font-size: 15px; letter-spacing: 2px; font-weight: 300; border-bottom: 1px solid #fff; padding-bottom: 5px; }

        /* 호버 효과 (PC) 및 활성화 효과 (모바일) */
        .grid-item:hover img, .grid-item.active img { filter: grayscale(0%); transform: scale(1.05); }
        .grid-item:hover .item-overlay, .grid-item.active .item-overlay { opacity: 1; }

        /* 📱 모바일 및 태블릿 대응 */
        @media (max-width: 1024px) {
            nav { padding: 0 25px; height: 70px; }
            .logo { font-size: 20px; }
            .nav-links { display: none; } 
            .menu-btn { display: flex; } 

            .container { padding: 110px 20px 80px; }
            .grid-container { grid-template-columns: repeat(2, 1fr); gap: 10px; } /* 모바일은 2열 */
            .item-title { font-size: 12px; }
        }
    </style>
</head>
<body>

    <nav>
        <a href="index.html" class="logo">KYEOL</a>
        <div class="nav-links">
            <a href="about.html">ABOUT</a>
            <a href="portfolio.html" class="active">PORTFOLIO</a>
            <a href="proposal.html">PROPOSAL</a>
            <a href="contact.html">CONTACT</a>
        </div>
        <div class="menu-btn" id="menuToggle">
            <span></span><span></span><span></span>
        </div>
    </nav>

    <div class="mobile-nav" id="dropdown">
        <a href="about.html">ABOUT</a>
        <a href="portfolio.html">PORTFOLIO</a>
        <a href="proposal.html">PROPOSAL</a>
        <a href="contact.html">CONTACT</a>
    </div>

    <div class="container">
        <div class="filter-nav">SELECTED PROJECTS</div>

        <section class="grid-container">
            <a href="projects/1suji.html" class="grid-item">
                <img src="image/1-1.jpg">
                <div class="item-overlay"><div class="item-title">남원 수지초 도서관</div></div>
            </a>
            <a href="projects/2dukam.html" class="grid-item">
                <img src="image/2-1.jpg">
                <div class="item-overlay"><div class="item-title">덕암정보고 행정실</div></div>
            </a>
            <a href="projects/3makeup.html" class="grid-item">
                <img src="image/3-1.jpg">
                <div class="item-overlay"><div class="item-title">IN THE MAKE UP</div></div>
            </a>
            <a href="projects/4seoil.html" class="grid-item">
                <img src="image/4-1.jpg">
                <div class="item-overlay"><div class="item-title">서일초 작은미술관</div></div>
            </a>
            <a href="projects/5nongso.html" class="grid-item">
                <img src="image/5-6.jpg">
                <div class="item-overlay"><div class="item-title">농소마을 주택</div></div>
            </a>
            <a href="projects/6summit.html" class="grid-item">
                <img src="image/6-8.jpg">
                <div class="item-overlay"><div class="item-title">송정써미트 아파트</div></div>
            </a>
            <a href="projects/7eco.html" class="grid-item">
                <img src="image/7-9.jpg">
                <div class="item-overlay"><div class="item-title">전주 에코체육센터</div></div>
            </a>
            <a href="projects/8raum.html" class="grid-item">
                <img src="image/8-5.jpg">
                <div class="item-overlay"><div class="item-title">Raum Hair</div></div>
            </a>
            <a href="projects/9furniture.html" class="grid-item">
                <img src="image/9-1.jpg">
                <div class="item-overlay"><div class="item-title">가구제작 - 어린이 맞춤</div></div>
            </a>
            <a href="projects/10ocheon.html" class="grid-item">
                <img src="image/10-3.jpg">
                <div class="item-overlay"><div class="item-title">오천초 교무실</div></div>
            </a>
        </section>
    </div>

    <script>
        // 메뉴 토글 로직
        const menuToggle = document.getElementById('menuToggle');
        const dropdown = document.getElementById('dropdown');
        menuToggle.onclick = () => { dropdown.style.display = (dropdown.style.display === 'flex') ? 'none' : 'flex'; };

        // 스크롤 감지 활성화 (흑백 -> 컬러 전환)
        const items = document.querySelectorAll('.grid-item');
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) { entry.target.classList.add('active'); }
                else { entry.target.classList.remove('active'); }
            });
        }, { threshold: 0.2 });
        items.forEach(item => observer.observe(item));

        // 외부 클릭 시 메뉴 닫기
        window.onclick = (e) => { if (!e.target.matches('#menuToggle') && !e.target.matches('#menuToggle span')) dropdown.style.display = 'none'; }
    </script>
</body>
</html>
