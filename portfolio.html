<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KYEOL | PORTFOLIO</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; font-family: 'Montserrat', sans-serif; background: #0a0a0a; color: white; overflow-x: hidden; }
        
        /* 🔙 BACK 버튼 (ABOUT, PROPOSAL 페이지와 디자인 통일) */
        .back {
            position: fixed;
            top: 30px;
            left: 30px;
            z-index: 1000;
            cursor: pointer;
            opacity: 0.6;
            font-size: 13px;
            letter-spacing: 2px;
            transition: 0.3s;
        }
        .back:hover { opacity: 1; transform: translateX(-5px); }

        header { padding: 80px 50px 40px; text-align: center; }
        .logo { font-size: 32px; letter-spacing: 12px; font-weight: 500; margin-bottom: 10px; cursor: pointer; text-decoration: none; color: white; display: block; }
        .sub-title { font-size: 10px; letter-spacing: 5px; opacity: 0.4; text-transform: uppercase; }

        .filter-nav { margin: 40px 0; text-align: center; font-size: 11px; letter-spacing: 2px; opacity: 0.6; }

        /* 그리드 컨테이너 */
        .grid-container { 
            display: grid; 
            grid-template-columns: repeat(3, 1fr); 
            gap: 30px; 
            padding: 0 50px 100px; 
            max-width: 1400px; 
            margin: 0 auto; 
        }

        .grid-item { 
            position: relative; 
            overflow: hidden; 
            aspect-ratio: 4 / 3; 
            background: #1a1a1a;
            cursor: pointer;
            text-decoration: none;
            display: block;
        }

        .grid-item img { 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
            filter: grayscale(100%) brightness(0.5); 
            transition: all 0.7s ease-out;
            transform: scale(1.05);
        }

        /* PC 호버 효과 */
        @media (min-width: 1025px) {
            .grid-item:hover img { filter: grayscale(0%) brightness(1); transform: scale(1); }
            .grid-item:hover .item-overlay { opacity: 1; }
        }

        /* 모바일 활성화 효과 (스크롤 감지) */
        @media (max-width: 1024px) {
            .grid-item.is-active img { filter: grayscale(0%) brightness(1); transform: scale(1); }
            .grid-item.is-active .item-overlay { opacity: 1; }
            .back { top: 20px; left: 20px; }
            .grid-container { grid-template-columns: 1fr; padding: 0 20px 60px; gap: 40px; }
        }

        .item-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.1);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            opacity: 0; transition: opacity 0.5s;
        }

        .item-title { font-size: 16px; letter-spacing: 3px; margin-bottom: 10px; font-weight: 400; color: white; text-align: center; }
        .item-category { font-size: 9px; letter-spacing: 2px; opacity: 0.7; text-transform: uppercase; color: white; }
    </style>
</head>
<body>

<div class="back" onclick="goBack()">← BACK</div>

<header>
    <a href="index.html" class="logo">KYEOL</a>
    <div class="sub-title">Interior Design & Construction</div>
</header>

<div class="filter-nav">SELECTED PROJECTS</div>

<section class="grid-container">
    <a href="projects/1suji.html" class="grid-item">
        <img src="image/1-1.jpg" alt="수지초등학교">
        <div class="item-overlay">
            <div class="item-title">남원 수지초 도서관</div>
            <div class="item-category">Educational Space</div>
        </div>
    </a>

    <a href="projects/2dukam.html" class="grid-item">
        <img src="image/2-1.jpg" alt="덕암정보고">
        <div class="item-overlay">
            <div class="item-title">덕암정보고 행정실</div>
            <div class="item-category">Office Space</div>
        </div>
    </a>

    <a href="projects/3makeup.html" class="grid-item">
        <img src="image/3-1.jpg" alt="인더메이크업">
        <div class="item-overlay">
            <div class="item-title">IN THE MAKE UP</div>
            <div class="item-category">Beauty Salon</div>
        </div>
    </a>

    <a href="projects/4seoil.html" class="grid-item">
        <img src="image/4-1.jpg" alt="서일초등학교">
        <div class="item-overlay">
            <div class="item-title">서일초 작은미술관</div>
            <div class="item-category">Gallery Space</div>
        </div>
    </a>

    <a href="projects/5nongso.html" class="grid-item">
        <img src="image/5-6.jpg" alt="파벽돌시공">
        <div class="item-overlay">
            <div class="item-title">농소마을 주택</div>
            <div class="item-category">Exterior Work</div>
        </div>
    </a>

    <a href="projects/6summit.html" class="grid-item">
        <img src="image/6-8.jpg" alt="송정써미트">
        <div class="item-overlay">
            <div class="item-title">송정써미트 아파트</div>
            <div class="item-category">Residential</div>
        </div>
    </a>

    <a href="projects/7eco.html" class="grid-item">
        <img src="image/7-9.jpg" alt="전주 에코체육센터">
        <div class="item-overlay">
            <div class="item-title">전주 에코체육센터</div>
            <div class="item-category">Public Space</div>
        </div>
    </a>
</section>

<script>
// 백버튼 클릭 시 메뉴 화면(?menu)으로 강제 이동
function goBack() {
    location.href = "index.html?menu";
}

// 모바일 스크롤 감지 (중앙 감지 시 컬러 변경)
if (window.innerWidth <= 1024) {
    const observerOptions = {
        root: null,
        rootMargin: '-30% 0px -30% 0px', 
        threshold: 0.1
    };
    const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
            if (entry.isIntersecting) entry.target.classList.add('is-active');
            else entry.target.classList.remove('is-active'); 
        });
    }, observerOptions);
    document.querySelectorAll('.grid-item').forEach(item => observer.observe(item));
}
</script>

</body>
</html>
