<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KYEOL | Portfolio</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Montserrat:wght@300;500&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Montserrat', sans-serif;
  background: #0a0a0a; /* 메인과 통일된 더 깊은 블랙 */
  color: white;
  overflow-x: hidden;
}

/* 🔙 BACK 버튼 (메인 가이드 준수) */
.nav-header {
  position: fixed;
  top: 60px;
  left: 60px;
  z-index: 100;
  display: flex;
  align-items: center;
  gap: 30px;
}

.back-btn {
  color: white;
  text-decoration: none;
  font-size: 12px;
  letter-spacing: 4px;
  opacity: 0.6;
  cursor: pointer;
  transition: 0.4s;
  background: none;
  border: none;
  padding: 0;
}

.back-btn:hover {
  opacity: 1;
  transform: translateX(-5px);
}

.nav-title {
  font-size: 13px;
  letter-spacing: 5px;
  opacity: 0.2;
  font-weight: 500;
  text-transform: uppercase;
}

/* 타이틀 섹션 */
.header-section {
  padding: 160px 60px 60px; /* 상단 버튼 공간 확보 */
}

.header-section h1 {
  font-family: 'Playfair Display';
  font-size: 42px;
  letter-spacing: 8px;
  margin: 0;
  font-weight: 600;
}

.header-section .line {
  width: 40px;
  height: 1px;
  background: rgba(255,255,255,0.3);
  margin-top: 20px;
}

/* 리스트 그리드 */
.grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 40px;
  padding: 0 60px 100px;
}

/* 카드 아이템 */
.item {
  position: relative;
  overflow: hidden;
  cursor: pointer;
  opacity: 0; /* JS 애니메이션용 초기값 */
  transform: translateY(30px);
  transition: transform 1.2s cubic-bezier(0.22, 1, 0.36, 1), opacity 1.2s ease;
}

.item.show {
  opacity: 1;
  transform: translateY(0);
}

.img-box {
  width: 100%;
  height: 550px;
  overflow: hidden;
  position: relative;
}

.item img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  filter: brightness(0.8);
  transition: 1.2s cubic-bezier(0.22, 1, 0.36, 1);
}

.item:hover img {
  transform: scale(1.05);
  filter: brightness(1);
}

/* 텍스트 정보 */
.item .text {
  margin-top: 25px;
  transition: 0.4s;
}

.item .title {
  font-family: 'Playfair Display', serif;
  font-size: 20px;
  letter-spacing: 1px;
  margin-bottom: 8px;
}

.item .sub {
  font-size: 11px;
  letter-spacing: 2px;
  opacity: 0.5;
  text-transform: uppercase;
}

/* 호버 시 텍스트 변화 */
.item:hover .text {
  transform: translateX(10px);
}

/* 모바일 최적화 */
@media (max-width: 768px) {
  .nav-header { top: 35px; left: 25px; }
  .nav-title { display: none; }
  
  .header-section { padding: 120px 25px 40px; }
  .header-section h1 { font-size: 32px; }

  .grid {
    grid-template-columns: 1fr;
    padding: 0 25px 60px;
    gap: 50px;
  }

  .img-box { height: 320px; }
  .item .title { font-size: 18px; }
}
</style>
</head>

<body>

<nav class="nav-header">
  <button class="back-btn" onclick="goBack()">← BACK</button>
  <span class="nav-title">KYEOL ARCHITECTURE</span>
</nav>

<header class="header-section">
  <h1>PORTFOLIO</h1>
  <div class="line"></div>
</header>

<main class="grid">
  <div class="item" onclick="goDetail('project1.html')">
    <div class="img-box">
      <img src="01.jpg" alt="수지초등학교">
    </div>
    <div class="text">
      <div class="title">수지초등학교 생각나무 숲 도서관</div>
      <div class="sub">NAMWON · 115㎡ · EDUCATION</div>
    </div>
  </div>

  <div class="item" onclick="goDetail('project2.html')">
    <div class="img-box">
      <img src="10.jpg" alt="덕암정보고">
    </div>
    <div class="text">
      <div class="title">덕암정보고등학교 행정실 프로젝트</div>
      <div class="sub">GIMJE · 75㎡ · OFFICE</div>
    </div>
  </div>

  <div class="item" onclick="goDetail('project3.html')">
    <div class="img-box">
      <img src="3-8.jpg" alt="인더메이크업">
    </div>
    <div class="text">
      <div class="title">IN THE MAKE UP</div>
      <div class="sub">JEONJU · 132㎡ · COMMERCIAL</div>
    </div>
  </div>

  <div class="item" onclick="goDetail('project4.html')">
    <div class="img-box">
      <img src="22.jpg" alt="작은미술관">
    </div>
    <div class="text">
      <div class="title">학교 안 작은미술관</div>
      <div class="sub">JEONJU · 24㎡ · GALLERY</div>
    </div>
  </div>

  <div class="item" onclick="goDetail('project5.html')">
    <div class="img-box">
      <img src="29.jpg" alt="농소마을">
    </div>
    <div class="text">
      <div class="title">농소마을 주택</div>
      <div class="sub">JEONJU · 400㎡ · RESIDENTIAL</div>
    </div>
  </div>

  <div class="item" onclick="goDetail('project6.html')">
    <div class="img-box">
      <img src="6-1.jpg" alt="송정써미트">
    </div>
    <div class="text">
      <div class="title">송정써미트아파트</div>
      <div class="sub">JEONJU · 112㎡ · APARTMENT</div>
    </div>
  </div>
</main>

<script>
// 페이지 로드 시 아이템 순차 등장
window.onload = () => {
  const items = document.querySelectorAll('.item');
  items.forEach((item, i) => {
    setTimeout(() => {
      item.classList.add('show');
    }, 150 * i);
  });
};

function goDetail(page) {
  // 여기에 페이드 아웃 효과를 추가하고 이동하면 더 고급스럽습니다.
  document.body.style.opacity = "0";
  document.body.style.transition = "0.5s";
  setTimeout(() => {
    window.location.href = page;
  }, 500);
}

function goBack() {
  // 인덱스 페이지로 이동하거나 이전 페이지로 이동
  window.location.href = 'index.html'; 
}
</script>

</body>
</html>
