<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ABOUT | (주)결</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Noto+Sans+KR:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { background:#fff; font-family: 'Noto Sans KR', sans-serif; color:#111; line-height:1.7; }

        /* 네비게이션 */
        nav { 
            position:fixed; top:0; width:100%; height:80px; 
            display:flex; justify-content:space-between; align-items:center; 
            padding:0 50px; background:rgba(255,255,255,0.98); z-index:1000; 
            border-bottom:1px solid #f2f2f2;
        }
        .logo { font-family: 'Playfair Display', serif; font-size:24px; letter-spacing:4px; font-weight:700; text-decoration:none; color:#000; }
        .nav-links a { text-decoration:none; color:#999; font-size:13px; letter-spacing:2px; margin-left:35px; font-weight:400; }
        .nav-links a.active { color:#000; font-weight:700; border-bottom:2px solid #000; padding-bottom:5px; }

        /* 메인 레이아웃 */
        .wrapper { display:flex; width:100%; height:100vh; padding-top:80px; overflow:hidden; }
        .text-side { flex:1; padding:0 8% 0 60px; display:flex; flex-direction:column; justify-content:center; background:#fbfbfb; }
        .img-side { flex:1.3; overflow:hidden; }
        .img-side img { width:100%; height:100%; object-fit:cover; filter: grayscale(10%) contrast(1.05); }

        /* 텍스트 스타일 개편 */
        .category-tag { font-family: 'Playfair Display', serif; font-size:15px; letter-spacing:6px; color:#aaa; margin-bottom:15px; }
        .title-main { font-size:52px; font-weight:800; line-height:1.2; margin-bottom:35px; color:#111; word-break:keep-all; }
        .desc-text { font-size:18px; color:#555; margin-bottom:50px; word-break:keep-all; font-weight:300; }
        .desc-text b { font-weight: 700; color: #111; }
        
        .btn-action { display:inline-block; padding:20px 60px; background:#111; color:#fff; text-decoration:none; font-size:14px; letter-spacing:4px; font-weight:500; transition:0.3s; border-radius: 2px; }
        .btn-action:hover { background:#d4af37; transform: translateY(-3px); }

        /* 모바일 대응 (시원한 세로형) */
        @media (max-width: 1024px) {
            nav { padding:0 25px; height:70px; }
            .nav-links { display:none; } /* 모바일은 단순하게 */
            .wrapper { flex-direction:column; height:auto; overflow:visible; padding-top:70px; }
            .img-side { height:380px; order:1; }
            .text-side { padding:60px 30px 100px; order:2; background:#fff; }
            .title-main { font-size:36px; }
            .desc-text { font-size:16px; }
            .btn-action { width:100%; text-align:center; }
        }
    </style>
</head>
<body>
    <nav>
        <a href="index.html" class="logo">KYEOL</a>
        <div class="nav-links">
            <a href="about.html" class="active">ABOUT</a>
            <a href="portfolio.html">PORTFOLIO</a>
            <a href="contact.html">CONTACT</a>
        </div>
    </nav>
    
    <div class="wrapper">
        <div class="text-side">
            <p class="category-tag">PHILOSOPHY OF 結</p>
            <h1 class="title-main">공간과 사람의<br>소중한 인연을 맺다.</h1>
            <p class="desc-text">
                <b>(주)결</b>은 실내건축공사업 면허를 보유한 전문 인테리어 법인입니다.<br><br>
                단순한 시공을 넘어 공간의 본질을 깊이 고민하고,<br>
                그 안에서 머물 사람과 공간 사이의 <b>단단한 결속(結)</b>을 완성합니다.<br>
                교육 시설 및 공공기관 행정 공간 프로젝트의 압도적인 경험으로<br>
                신뢰할 수 있는 공간의 새로운 기준을 제시합니다.
            </p>
            <a href="portfolio.html" class="btn-action">VIEW PORTFOLIO</a>
        </div>
        <div class="img-side">
            <img src="https://images.unsplash.com/photo-1497366216548-37526070297c?q=80&w=2000" alt="KYEOL Interior Architecture">
        </div>
    </div>
</body>
</html>
