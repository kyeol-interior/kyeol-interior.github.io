<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ABOUT | (주)결</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">
    <style>
        /* [1] 전체 화면 고정 (스크롤 방지) */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; overflow: hidden; background: #fff; font-family: 'Noto Sans KR', sans-serif; }

        /* [2] 네비게이션 */
        nav { position: fixed; top: 0; width: 100%; height: 80px; display: flex; justify-content: space-between; align-items: center; padding: 0 60px; z-index: 1000; }
        .nav-logo { font-family: 'Playfair Display', serif; font-size: 24px; letter-spacing: 5px; font-weight: 600; color: #000; text-decoration: none; }
        .nav-links a { text-decoration: none; color: #999; font-size: 13px; letter-spacing: 2px; margin-left: 40px; transition: 0.3s; }
        .nav-links a.active { color: #000; font-weight: 600; border-bottom: 2px solid #000; padding-bottom: 5px; }

        /* [3] 메인 레이아웃 (반 분할) */
        .main-wrapper { display: flex; width: 100%; height: 100vh; padding-top: 80px; }

        /* 왼쪽: 텍스트 영역 */
        .content-side { 
            flex: 1; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            padding: 0 8% 0 60px; 
            background: #fbfbfb;
        }
        .hero-title { font-family: 'Playfair Display', serif; font-size: 82px; letter-spacing: 15px; color: #111; margin-bottom: 10px; line-height: 1; }
        .hero-sub { font-size: 18px; color: #bbb; letter-spacing: 8px; margin-bottom: 60px; font-weight: 300; }
        
        .story-title { font-size: 38px; font-weight: 700; line-height: 1.4; margin-bottom: 30px; color: #111; word-break: keep-all; }
        .story-desc { font-size: 16px; color: #666; line-height: 1.8; margin-bottom: 50px; word-break: keep-all; }

        /* 인증 마크 영역 (심플하게 하단 배치) */
        .trust-tags { display: flex; gap: 20px; margin-bottom: 50px; }
        .tag { padding: 10px 20px; border: 1px solid #ddd; font-size: 12px; color: #888; letter-spacing: 1px; border-radius: 2px; }

        .btn-view { display: inline-block; width: fit-content; padding: 18px 50px; background: #111; color: #fff; text-decoration: none; font-size: 13px; letter-spacing: 4px; transition: 0.3s; }
        .btn-view:hover { background: #d4af37; }

        /* 오른쪽: 이미지 영역 */
        .image-side { flex: 1.1; position: relative; overflow: hidden; }
        .image-side img { width: 100%; height: 100%; object-fit: cover; }
        .image-overlay { position: absolute; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.05); }

        /* 반응형: 모바일에서는 스크롤 허용 */
        @media (max-width: 1024px) {
            body, html { overflow: auto; height: auto; }
            .main-wrapper { flex-direction: column; height: auto; }
            .content-side { padding: 100px 30px 60px; }
            .image-side { height: 400px; }
            .hero-title { font-size: 50px; }
        }
    </style>
</head>
<body>

    <nav>
        <a href="index.html" class="nav-logo">KYEOL</a>
        <div class="nav-links">
            <a href="about.html" class="active">ABOUT</a>
            <a href="portfolio.html">PORTFOLIO</a>
            <a href="proposal.html">PROPOSAL</a>
            <a href="contact.html">CONTACT</a>
        </div>
    </nav>

    <div class="main-wrapper">
        <div class="content-side">
            <h1 class="hero-title">ABOUT</h1>
            <p class="hero-sub">KYEOL ARCHITECTURE</p>

            <h2 class="story-title">공간의 본질과<br>사용자의 결을 잇습니다.</h2>
            <p class="story-desc">
                (주)결은 실내건축공사업 면허를 보유한 전문 인테리어 법인입니다.<br>
                교육 시설 및 공공기관 행정 공간의 풍부한 경험을 바탕으로<br>
                단순한 시공을 넘어 공간의 새로운 기준을 제시합니다.
            </p>

            <div class="trust-tags">
                <span class="tag">실내건축공사업 면허</span>
                <span class="tag">장애인기업 인증</span>
                <span class="tag">공공·교육 시설 전문</span>
            </div>

            <a href="portfolio.html" class="btn-view">PORTFOLIO VIEW</a>
        </div>

        <div class="image-side">
            <div class="image-overlay"></div>
            <img src="https://images.unsplash.com/photo-1524995997946-a1c2e315a42f?q=80&w=2000" alt="KYEOL Interior Design">
        </div>
    </div>

</body>
</html>
