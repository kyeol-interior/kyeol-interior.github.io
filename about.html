<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ABOUT</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display&family=Montserrat:wght@300;500&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  background: #111;
  color: white;
  font-family: 'Montserrat', sans-serif;
}

/* 🔥 배경 이미지 */
.hero {
  height: 100vh;
  background: url('about.jpg') center/cover no-repeat;
  position: relative;
}

/* 어둡게 */
.hero::after {
  content: "";
  position: absolute;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.5);
}

/* 텍스트 */
.hero-text {
  position: absolute;
  z-index: 2;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  text-align: center;
}

/* 제목 */
.title {
  font-family: 'Playfair Display';
  font-size: 48px;
  line-height: 1.4;
}

/* 본문 영역 */
.container {
  max-width: 1000px;
  margin: auto;
  padding: 100px 40px;
}

/* 애니메이션 */
.fade {
  opacity: 0;
  transform: translateY(40px);
  transition: 1s;
}

.fade.show {
  opacity: 1;
  transform: translateY(0);
}

/* 설명 */
.desc {
  line-height: 1.8;
  opacity: 0.7;
}

/* 정보 */
.info {
  margin-top: 100px;
  display: flex;
  gap: 40px;
  flex-wrap: wrap;
}

.info-box {
  flex: 1;
  min-width: 200px;
  border-top: 1px solid rgba(255,255,255,0.2);
  padding-top: 20px;
}

/* 뒤로가기 */
.back {
  position: fixed;
  top: 30px;
  left: 30px;
  z-index: 10;
  cursor: pointer;
  opacity: 0.6;
}
</style>
</head>

<body>

<div class="back" onclick="goBack()">← BACK</div>

<!-- 🔥 배경 영역 -->
<div class="hero">
  <div class="hero-text">
    <div class="title">
      공간은 기능을 넘어,<br>
      브랜드의 가치를 담습니다.
    </div>
  </div>
</div>

<!-- 🔥 아래 콘텐츠 -->
<div class="container">

  <div class="desc fade">
    KYEOL은 공간의 결을 읽으며<br>
    감성과 기능이 균형을 이루는 디자인을 추구합니다.<br><br>

    우리는 브랜드의 경험을 설계하고,<br>
    오래 기억되는 공간을 만들어갑니다.
  </div>

  <div class="info fade">

    <div class="info-box">
      <div class="info-title">INTERIOR ARCHITECTURE</div>
      <div class="info-desc">
        상업공간 및 주거공간 설계<br>
        공간 브랜딩 및 디자인
      </div>
    </div>

    <div class="info-box">
      <div class="info-title">CORPORATION</div>
      <div class="info-desc">
        법인사업자 운영<br>
        체계적인 프로젝트 관리
      </div>
    </div>

    <div class="info-box">
      <div class="info-title">SOCIAL VALUE</div>
      <div class="info-desc">
        장애인기업 인증<br>
        지속 가능한 디자인 실현
      </div>
    </div>

  </div>

</div>

<script>
const fades = document.querySelectorAll('.fade');

function checkFade() {
  const trigger = window.innerHeight * 0.85;

  fades.forEach(el => {
    const top = el.getBoundingClientRect().top;
    if (top < trigger) {
      el.classList.add('show');
    }
  });
}

window.addEventListener('scroll', checkFade);
window.addEventListener('load', checkFade);

function goBack() {
  window.history.back();
}
</script>

</body>
</html>
