<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ABOUT</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display&family=Montserrat:wght@300;500&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  color: white;
  font-family: 'Montserrat', sans-serif;
  overflow: hidden; /* 🔥 스크롤 제거 */
}

/* 🔥 전체 배경 */
.hero {
  height: 100vh;
  background: url('about.jpg') center/cover no-repeat;
  position: relative;
  display: flex;
  justify-content: center;
  align-items: center;
}

/* 어둡게 */
.hero::after {
  content: "";
  position: absolute;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.5);
}

/* 🔥 전체 콘텐츠 */
.content {
  position: relative;
  z-index: 2;
  text-align: center;
  max-width: 800px;
  padding: 20px;
}

/* 제목 */
.title {
  font-family: 'Playfair Display';
  font-size: 48px;
  line-height: 1.4;
}

/* 설명 */
.desc {
  margin-top: 30px;
  line-height: 1.8;
  opacity: 0.8;
}

/* 정보 */
.info {
  margin-top: 60px;
  display: flex;
  justify-content: center;
  gap: 40px;
  flex-wrap: wrap;
}

.info-box {
  min-width: 160px;
}

.info-title {
  font-size: 12px;
  letter-spacing: 2px;
  opacity: 0.6;
}

.info-desc {
  margin-top: 10px;
  font-size: 14px;
}

/* 뒤로가기 */
.back {
  position: fixed;
  top: 30px;
  left: 30px;
  z-index: 10;
  cursor: pointer;
  opacity: 0.6;
}

/* 🔥 모바일 */
@media (max-width: 768px) {
  .title {
    font-size: 26px;
  }

  .desc {
    font-size: 13px;
  }

  .info {
    gap: 20px;
  }
}
</style>
</head>

<body>

<div class="back" onclick="goBack()">← BACK</div>

<div class="hero">

  <div class="content">

    <div class="title">
      공간은 기능을 넘어,<br>
      브랜드의 가치를 담습니다.
    </div>

    <div class="desc">
      KYEOL은 공간의 결을 읽고<br>
      감성과 기능이 균형을 이루는 디자인을 추구합니다.<br><br>

      우리는 브랜드의 경험을 설계하고,<br>
      오래 기억되는 공간을 만들어갑니다.
    </div>

    <div class="info">

      <div class="info-box">
        <div class="info-title">INTERIOR ARCHITECTURE</div>
        <div class="info-desc">
          상업공간 및 주거공간 설계<br>
          학교 교실 및 관공서 
        </div>
      </div>

      <div class="info-box">
        <div class="info-title">CORPORATION</div>
        <div class="info-desc">
          실내건축공사업 면허 보유 법인
        </div>
      </div>

      <div class="info-box">
        <div class="info-title">SOCIAL VALUE</div>
        <div class="info-desc">
          장애인기업 인증
        </div>
      </div>

    </div>

  </div>

</div>

<script>
function goBack() {
  window.history.back();
}
</script>

</body>
</html>
