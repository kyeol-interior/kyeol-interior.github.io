<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ABOUT | (주)결</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #fff; font-family: sans-serif; color: #333; }

        /* 네비게이션 */
        nav { position: fixed; top: 0; width: 100%; height: 70px; display: flex; justify-content: space-between; align-items: center; padding: 0 30px; background: #fff; z-index: 100; border-bottom: 1px solid #eee; }
        .nav-logo { font-weight: 700; font-size: 20px; text-decoration: none; color: #000; letter-spacing: 3px; }

        /* 메인 레이아웃 */
        .wrapper { display: flex; width: 100%; height: 100vh; padding-top: 70px; }

        .text-side { flex: 1; padding: 60px; display: flex; flex-direction: column; justify-content: center; background: #f9f9f9; }
        .hero-title { font-size: 70px; font-weight: 800; letter-spacing: 10px; margin-bottom: 20px; }
        .sub-desc { font-size: 30px; font-weight: 700; line-height: 1.4; margin-bottom: 20px; }
        .main-p { font-size: 16px; color: #666; line-height: 1.8; margin-bottom: 40px; }

        .img-side { flex: 1; background: #eee; }
        .img-side img { width: 100%; height: 100%; object-fit: cover; }

        /* 📱 모바일 버전 (별로라고 하신 부분 집중 보수) */
        @media (max-width: 1024px) {
            .wrapper { flex-direction: column; height: auto; } /* 가로 배열을 세로로 변경 */
            .text-side { padding: 40px 20px; order: 1; } /* 텍스트가 위로 */
            .img-side { height: 350px; order: 2; } /* 이미지가 아래로 */
            .hero-title { font-size: 40px; letter-spacing: 5px; }
            .sub-desc { font-size: 22px; }
            .main-p { font-size: 14px; }
        }
    </style>
</head>
<body>
    <nav>
        <a href="index.html" class="nav-logo">KYEOL</a>
    </nav>

    <div class="wrapper">
        <div class="text-side">
            <h1 class="hero-title">ABOUT</h1>
            <h2 class="sub-desc">공간의 결을 이해하는<br>전문 건설 법인, (주)결</h2>
            <p class="main-p">
                (주)결은 실내건축공사업 면허를 보유한 전문 인테리어 법인입니다.<br>
                교육 시설 및 공공기관 행정 공간의 풍부한 경험을 바탕으로<br>
                단순한 시공을 넘어 공간의 새로운 기준을 제시합니다.
            </p>
            <a href="portfolio.html" style="display:inline-block; padding:15px 40px; background:#000; color:#fff; text-decoration:none; font-size:13px; letter-spacing:2px;">PORTFOLIO</a>
        </div>
        <div class="img-side">
            <img src="https://images.unsplash.com/photo-1524995997946-a1c2e315a42f?q=80&w=2000" alt="Interior">
        </div>
    </div>
</body>
</html>
