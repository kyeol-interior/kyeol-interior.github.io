<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ABOUT | (주)결</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Noto+Sans+KR:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; -webkit-font-smoothing: antialiased; }
        body { background:#fff; font-family: 'Noto Sans KR', sans-serif; color:#111; line-height:1.7; overflow-x:hidden; }

        /* [1] 네비게이션: PC/모바일 통합 복구 */
        nav { 
            position:fixed; top:0; width:100%; height:70px; 
            display:flex; justify-content:space-between; align-items:center; 
            padding:0 50px; background:rgba(255,255,255,0.98); z-index:1000; 
            border-bottom:1px solid #f2f2f2;
        }
        .logo { font-family: 'Playfair Display', serif; font-size:20px; letter-spacing:3px; font-weight:700; text-decoration:none; color:#000; }
        
        .nav-links { display:flex; gap:25px; }
        .nav-links a { text-decoration:none; color:#999; font-size:12px; letter-spacing:1px; font-weight:400; transition:0.3s; }
        .nav-links a:hover, .nav-links a.active { color:#000; font-weight:700; }

        /* [2] 메인 레이아웃 (PC 버전) */
        .wrapper { display:flex; width:100%; height:100vh; padding-top:70px; overflow:hidden; }
        .text-side { flex:1; padding:0 8% 0 60px; display:flex; flex-direction:column; justify-content:center; background:#fbfbfb; }
        .img-side { flex:1.3; overflow:hidden; }
        .img-side img { width:100%; height:100%; object-fit:cover; }

        .category-tag { font-family: 'Playfair Display', serif; font-size:14px; letter-spacing:5px; color:#aaa; margin-bottom:15px; }
        .title-main { font-size:48px; font-weight:800; line-height:1.2; margin-bottom:30px; color:#111; word-break:keep-all; }
        .desc-text { font-size:17px; color:#555; margin-bottom:45px; word-break:keep-all; font-weight:300; }
        .desc-text b { font-weight: 700; color: #111; }
        
        .btn-action { display:inline-block; padding:18px 50px; background:#111; color:#fff; text-decoration:none; font-size:13px; letter-spacing:3px; font-weight:500; transition:0.3s; }

        /* 📱 [모바일 대응: 메뉴가 절대 사라지지 않게 수정] */
        @media (max-width: 1024px) {
            nav { padding: 0 20px; height: 60px; }
            .logo { font-size: 16px; letter-spacing: 1px; }
            
            /* 모바일 메뉴 간격 및 폰트 조정 */
            .nav-links { gap: 12px; }
            .nav-links a { font-size: 10px; letter-spacing: 0; }

            .wrapper { flex-direction:column; height:auto; overflow:visible; padding-top:60px; }
            .img-side { height:300px; order:1; }
            .text-side { padding:40px 20px 80px; order:2; background:#fff; }
            .title-main { font-size:30px; margin-bottom:20px; }
            .desc-text { font-size:15px; }
            .btn-action { width:100%; text-align:center; }
        }
    </style>
</head>
<body>
    <nav>
        <a href="index.html" class="logo">KYEOL</a>
        <div class="nav-links">
            <a href="about.html" class="active">ABOUT</a>
            <a href="portfolio.html">PORTFOLIO</a>
            <a href="proposal.html">PROPOSAL</a> <a href="contact.html">CONTACT</a>
        </div>
    </nav>
    
    <div class="wrapper">
        <div class="text-side">
            <p class="category-tag">PHILOSOPHY OF 結</p>
            <h1 class="title-main">공간과 사람의<br>소중한 인연을 맺다.</h1>
            <p class="desc-text">
                <b>(주)결</b>은 실내건축공사업 면허를 보유한 전문 인테리어 법인입니다.<br><br>
                단순한 시공을 넘어 공간의 본질을 깊이 고민하고,<br>
                그 안에서 머물 사람과 공간 사이의 <b>단단한 결속(結)</b>을 완성합니다.<br>
                교육 시설 및 공공기관 행정 공간 프로젝트의 풍부한 경험으로<br>
                신뢰할 수 있는 공간의 새로운 기준을 제시합니다.
            </p>
            <a href="portfolio.html" class="btn-action">VIEW PORTFOLIO</a>
        </div>
        <div class="img-side">
            <img src="https://images.unsplash.com/photo-1497366216548-37526070297c?q=80&w=2000" alt="KYEOL Interior">
        </div>
    </div>
</body>
</html>
