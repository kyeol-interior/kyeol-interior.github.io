<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ABOUT | (주)결</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Noto+Sans+KR:wght@300;400;700;900&display=swap" rel="stylesheet">
    <style>
        /* [1] 공통 스타일 */
        * { margin:0; padding:0; box-sizing:border-box; -webkit-font-smoothing: antialiased; }
        body { background:#000; font-family: 'Noto Sans KR', sans-serif; overflow: hidden; height: 100vh; }

        nav { 
            position:fixed; top:0; width:100%; height:80px; 
            display:flex; justify-content:space-between; align-items:center; 
            padding:0 50px; background:transparent; z-index:1000; 
        }
        .logo { font-family: 'Playfair Display', serif; font-size:24px; font-weight:700; text-decoration:none; color:#fff; letter-spacing:4px; }
        
        .nav-links { display:flex; gap:35px; }
        .nav-links a { text-decoration:none; color:rgba(255,255,255,0.7); font-size:13px; letter-spacing:2px; font-weight:400; transition: 0.3s; }
        .nav-links a.active { color:#fff; font-weight:700; }

        /* [2] 배경 이미지 (about1.jpg) */
        .bg-fixed {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            background: url('./image/about1.jpg') no-repeat center center / cover;
            filter: brightness(0.4); /* 글자를 살리기 위해 어둡게 처리 */
        }

        /* [3] 컨텐츠 영역 */
        .wrapper { 
            height: 100vh; display: flex; align-items: center; justify-content: center;
            padding: 0 20px; color: #fff; text-align: center;
        }
        .text-content { 
            max-width: 850px; 
            opacity: 0; transform: translateY(30px); 
            animation: fadeInUp 1.2s forwards; 
        }

        /* 💡 타이틀 스타일: 메인과 동일하게 얇은 글씨 속 '결' 강조 */
        .title-main { font-size: 42px; font-weight: 300; margin-bottom: 35px; line-height: 1.4; word-break: keep-all; }
        
        /* 💡 '결'자 포인트 강조 (두께 900) */
        .point-text { 
            font-weight: 900; 
            color: #fff;
            display: inline-block;
            margin: 0 2px;
        }

        .desc-text { font-size: 18px; font-weight: 300; line-height: 2.2; color: rgba(255,255,255,0.85); word-break: keep-all; }
        .desc-text b { color: #fff; font-weight: 700; }

        .highlight { margin-top: 50px; border-top: 1px solid rgba(255,255,255,0.2); padding-top: 40px; }
        .badge { display: inline-block; padding: 8px 20px; border: 1px solid rgba(255,255,255,0.6); font-size: 11px; margin: 5px; letter-spacing: 1px; color: #fff; }

        @keyframes fadeInUp { to { opacity: 1; transform: translateY(0); } }

        @media (max-width: 1024px) {
            nav { padding: 0 25px; height: 70px; }
            .title-main { font-size: 28px; }
            .desc-text { font-size: 16px; }
        }
    </style>
</head>
<body>

    <nav>
        <a href="index.html" class="logo">KYEOL</a>
        <div class="nav-links">
            <a href="about.html" class="active">ABOUT</a>
            <a href="portfolio.html">PORTFOLIO</a>
            <a href="proposal.html">PROPOSAL</a>
            <a href="contact.html">CONTACT</a>
        </div>
    </nav>

    <div class="bg-fixed"></div>

    <div class="wrapper">
        <div class="text-content">
            <h1 class="title-main">
                "당신이 머무는 곳마다,<br>
                기분 좋은 <span class="point-text">결</span>이 흐르도록."
            </h1>
            
            <p class="desc-text">
                공간은 사람을 닮아 있기에, 우리는 사용자의 <b>시선과 동선</b>을 먼저 읽습니다.<br><br>
                실내건축 전문 법인 <b>(주)결</b>만의 섬세한 손길로 사람과 공간,<br>
                그 사이의 모든 가능성을 가장 따스하게 <b>연결(結)</b>합니다.
            </p>

            <div class="highlight">
                <div class="badge">실내건축공사업 면허 보유 법인</div>
                <div class="badge">인증 장애인기업</div>
                <p style="font-size:13px; color:rgba(255,255,255,0.5); margin-top:15px;">
                    (주)결은 공공의 신뢰를 바탕으로 공간의 새로운 기준을 제시합니다.
                </p>
            </div>
        </div>
    </div>

</body>
</html>
