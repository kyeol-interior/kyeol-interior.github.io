<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ABOUT | (주)결</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Noto+Sans+KR:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        /* [1] 네비게이션 및 메뉴 설정 (기존 스타일 유지) */
        * { margin:0; padding:0; box-sizing:border-box; -webkit-font-smoothing: antialiased; }
        body { background:#fff; font-family: 'Noto Sans KR', sans-serif; color:#111; line-height:1.8; overflow-x:hidden; }

        nav { 
            position:fixed; top:0; width:100%; height:80px; 
            display:flex; justify-content:space-between; align-items:center; 
            padding:0 50px; background:#fff; z-index:1000; 
            border-bottom:1px solid #f2f2f2;
        }
        .logo { font-family: 'Playfair Display', serif; font-size:24px; font-weight:700; text-decoration:none; color:#000; letter-spacing:4px; }
        .nav-links { display:flex; gap:35px; }
        .nav-links a { text-decoration:none; color:#999; font-size:13px; letter-spacing:2px; font-weight:400; }
        .nav-links a.active { color:#000; font-weight:700; }

        .menu-btn { display: none; cursor: pointer; flex-direction: column; gap: 6px; z-index: 1002; }
        .menu-btn span { width: 22px; height: 2px; background: #000; transition: 0.3s; }

        .mobile-nav {
            position: fixed; top: 70px; left: 0; width: 100%; 
            background: #fff; border-bottom: 1px solid #eee;
            display: none; flex-direction: column; padding: 15px 0;
            z-index: 999; box-shadow: 0 10px 20px rgba(0,0,0,0.05);
        }
        .mobile-nav a { padding: 15px 30px; text-decoration: none; color: #111; font-size: 14px; font-weight: 500; border-bottom: 1px solid #f9f9f9; }

        /* [2] 메인 레이아웃 및 텍스트 시공 */
        .wrapper { display:flex; width:100%; height:100vh; padding-top:80px; }
        .text-side { flex:1; padding:0 8% 0 60px; display:flex; flex-direction:column; justify-content:center; background:#fbfbfb; }
        .img-side { flex:1.3; overflow:hidden; }
        .img-side img { width:100%; height:100%; object-fit:cover; }

        /* 💡 문구의 리듬감을 살린 타이틀 스타일 */
        .title-main { font-size:42px; font-weight:800; line-height:1.4; margin-bottom:35px; letter-spacing:-1.5px; color:#111; word-break:keep-all; }
        .desc-text { font-size:18px; color:#444; font-weight:300; word-break:keep-all; line-height:2; }
        .desc-text b { font-weight: 700; color:#000; border-bottom: 1px solid #ddd; }
        
        .highlight-section { margin-top:45px; padding-top:35px; border-top:1px solid #ddd; }
        .cert-badge { display:inline-block; padding:7px 15px; background:#000; color:#fff; font-size:11px; letter-spacing:1px; margin-right:8px; margin-bottom:12px; }

        /* 📱 모바일 대응 */
        @media (max-width: 1024px) {
            nav { padding: 0 25px; height: 70px; }
            .logo { font-size: 20px; }
            .nav-links { display: none; } 
            .menu-btn { display: flex; } 

            .wrapper { flex-direction:column; height:auto; padding-top:70px; }
            .img-side { height:350px; order:1; }
            .text-side { padding:60px 25px 100px; order:2; background:#fff; }
            .title-main { font-size:30px; margin-bottom:25px; }
            .desc-text { font-size:16px; }
        }
    </style>
</head>
<body>
    <nav>
        <a href="index.html" class="logo">KYEOL</a>
        <div class="nav-links">
            <a href="about.html" class="active">ABOUT</a>
            <a href="portfolio.html">PORTFOLIO</a>
            <a href="proposal.html">PROPOSAL</a>
            <a href="contact.html">CONTACT</a>
        </div>
        <div class="menu-btn" id="menuToggle">
            <span></span><span></span><span></span>
        </div>
    </nav>

    <div class="mobile-nav" id="dropdown">
        <a href="about.html">ABOUT</a>
        <a href="portfolio.html">PORTFOLIO</a>
        <a href="proposal.html">PROPOSAL</a>
        <a href="contact.html">CONTACT</a>
    </div>
    
    <div class="wrapper">
        <div class="text-side">
            <h1 class="title-main">당신이 머무는 곳마다,<br>기분 좋은 결이 흐르도록.</h1>
            
            <p class="desc-text">
                공간은 사람을 닮아 있기에,<br>
                우리는 사용자의 <b>시선과 동선</b>을 먼저 읽습니다.<br><br>
                
                실내건축 전문 법인 <b>(주)결</b>만의 섬세한 손길로<br>
                사람과 공간, 그 사이의 모든 가능성을<br>
                가장 따스하게 <b>연결(結)</b>합니다.
            </p>

            <div class="highlight-section">
                <div>
                    <span class="cert-badge">실내건축공사업 면허 보유 법인</span>
                    <span class="cert-badge">인증 장애인기업</span>
                </div>
                <p style="font-size:14px; color:#888; margin-top:5px; font-weight:300;">
                    (주)결은 신뢰와 전문성을 바탕으로 공간의 새로운 가치를 제안합니다.
                </p>
            </div>
        </div>
        <div class="img-side">
            <img src="image/about.jpg" alt="KYEOL Interior Design">
        </div>
    </div>

    <script>
        const menuToggle = document.getElementById('menuToggle');
        const dropdown = document.getElementById('dropdown');

        menuToggle.onclick = function() {
            dropdown.style.display = (dropdown.style.display === 'flex') ? 'none' : 'flex';
        };

        window.onclick = function(event) {
            if (!event.target.matches('#menuToggle') && !event.target.matches('#menuToggle span')) {
                dropdown.style.display = 'none';
            }
        }
    </script>
</body>
</html>
