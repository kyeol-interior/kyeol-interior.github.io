<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ABOUT | (주)결</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <style>
        /* [1] 기본 세팅 */
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }
        body { background: #fff; font-family: 'Noto Sans KR', sans-serif; color: #111; line-height: 1.6; overflow-x: hidden; }

        /* [2] 상단 네비게이션 (고정) */
        nav { 
            position: fixed; top: 0; width: 100%; height: 60px; 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 0 25px; background: rgba(255,255,255,0.95); z-index: 1000; 
            border-bottom: 1px solid #eee;
        }
        .nav-logo { font-family: 'Playfair Display', serif; font-size: 20px; font-weight: 700; letter-spacing: 3px; text-decoration: none; color: #000; }

        /* [3] 전체 레이아웃 구획 */
        .container { display: flex; width: 100%; height: 100vh; padding-top: 60px; }

        /* 왼쪽: 텍스트 영역 */
        .content-section { 
            flex: 1; display: flex; flex-direction: column; justify-content: center; 
            padding: 0 8% 0 50px; background: #fbfbfb; 
        }
        .hero-label { font-family: 'Playfair Display', serif; font-size: 60px; letter-spacing: 12px; color: #000; margin-bottom: 5px; opacity: 0.9; }
        .hero-sub-label { font-size: 14px; color: #aaa; letter-spacing: 6px; margin-bottom: 40px; font-weight: 300; }
        
        .main-title { font-size: 34px; font-weight: 700; line-height: 1.4; margin-bottom: 25px; color: #111; word-break: keep-all; }
        .main-p { font-size: 16px; color: #666; margin-bottom: 40px; word-break: keep-all; line-height: 1.8; }

        .btn-portfolio { 
            display: inline-block; width: fit-content; padding: 18px 45px; 
            background: #111; color: #fff; text-decoration: none; 
            font-size: 13px; letter-spacing: 3px; font-weight: 400;
        }

        /* 오른쪽: 이미지 영역 */
        .image-section { flex: 1.2; position: relative; overflow: hidden; }
        .image-section img { width: 100%; height: 100%; object-fit: cover; }

        /* 📱 [모바일 최적화 - 핵심 수정 구간] */
        @media (max-width: 1024px) {
            .container { flex-direction: column; height: auto; padding-top: 60px; }
            
            /* 이미지 영역을 위로 올리고 크기 조절 */
            .image-section { order: 1; height: 320px; width: 100%; }
            
            /* 텍스트 영역을 아래로 배치하고 여백 조정 */
            .content-section { 
                order: 2; padding: 40px 25px 80px; 
                background: #fff; text-align: left;
            }
            
            .hero-label { font-size: 42px; letter-spacing: 8px; margin-bottom: 0; }
            .hero-sub-label { font-size: 12px; letter-spacing: 4px; margin-bottom: 30px; }
            
            .main-title { font-size: 26px; margin-bottom: 20px; }
            .main-p { font-size: 15px; color: #555; margin-bottom: 35px; }
            
            .btn-portfolio { width: 100%; text-align: center; padding: 20px 0; }
        }
    </style>
</head>
<body>

    <nav>
        <a href="index.html" class="nav-logo">KYEOL</a>
    </nav>

    <div class="container">
        <div class="content-section">
            <h1 class="hero-label">ABOUT</h1>
            <p class="hero-sub-label">KYEOL ARCHITECTURE</p>

            <h2 class="main-title">공간의 본질과<br>사용자의 결을 잇습니다.</h2>
            <p class="main-p">
                (주)결은 실내건축공사업 면허를 보유한 전문 인테리어 법인입니다.<br>
                교육 시설 및 공공기관 행정 공간의 풍부한 경험을 바탕으로<br>
                단순한 시공을 넘어 공간의 새로운 기준을 제시합니다.
            </p>

            <a href="portfolio.html" class="btn-portfolio">PORTFOLIO VIEW</a>
        </div>

        <div class="image-section">
            <img src="https://images.unsplash.com/photo-1524995997946-a1c2e315a42f?q=80&w=2000" alt="KYEOL Interior Design">
        </div>
    </div>

</body>
</html>
