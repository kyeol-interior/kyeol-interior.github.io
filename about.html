<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ABOUT | (주)결</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Noto+Sans+KR:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { background:#fff; font-family: 'Noto Sans KR', sans-serif; color:#111; line-height:1.6; }

        /* [1] 상단 네비게이션 - 모든 페이지 이동 가능하게 복구 */
        nav { 
            position:fixed; top:0; width:100%; height:80px; 
            display:flex; justify-content:space-between; align-items:center; 
            padding:0 50px; background:rgba(255,255,255,0.98); z-index:1000; 
            border-bottom:1px solid #f0f0f0;
        }
        .logo { font-family: 'Playfair Display', serif; font-size:22px; letter-spacing:4px; font-weight:600; text-decoration:none; color:#000; }
        .nav-links a { text-decoration:none; color:#999; font-size:13px; letter-spacing:2px; margin-left:30px; transition:0.3s; }
        .nav-links a.active { color:#000; font-weight:700; }

        /* [2] 메인 레이아웃 (PC 버전 복구) */
        .wrapper { display:flex; width:100%; height:100vh; padding-top:80px; }
        .text-side { flex:1; padding:0 8% 0 60px; display:flex; flex-direction:column; justify-content:center; background:#fbfbfb; }
        .img-side { flex:1.2; overflow:hidden; }
        .img-side img { width:100%; height:100%; object-fit:cover; }

        .about-tag { font-family: 'Playfair Display', serif; font-size:14px; letter-spacing:5px; color:#aaa; margin-bottom:10px; }
        .title-main { font-size:48px; font-weight:700; line-height:1.3; margin-bottom:30px; color:#111; word-break:keep-all; }
        .desc-text { font-size:17px; color:#666; margin-bottom:45px; word-break:keep-all; }
        .btn-more { display:inline-block; padding:18px 55px; background:#111; color:#fff; text-decoration:none; font-size:13px; letter-spacing:3px; transition:0.3s; }

        /* [3] 모바일 최적화 (촌스럽지 않게 보수) */
        @media (max-width: 1024px) {
            nav { padding:0 20px; height:65px; }
            .nav-links { display: flex; } /* 모바일에서도 메뉴 보이게 */
            .nav-links a { margin-left: 15px; font-size: 11px; letter-spacing: 1px; }
            
            .wrapper { flex-direction:column; height:auto; padding-top:65px; }
            .img-side { height:350px; order:1; }
            .text-side { padding:50px 25px 80px; order:2; background:#fff; }
            .title-main { font-size:32px; }
            .btn-more { width:100%; text-align:center; }
        }
    </style>
</head>
<body>
    <nav>
        <a href="index.html" class="logo">KYEOL</a>
        <div class="nav-links">
            <a href="about.html" class="active">ABOUT</a>
            <a href="portfolio.html">PORTFOLIO</a>
            <a href="contact.html">CONTACT</a>
        </div>
    </nav>
    
    <div class="wrapper">
        <div class="text-side">
            <p class="about-tag">ABOUT US</p>
            <h1 class="title-main">공간의 본질과<br>사용자의 결을 잇는 파트너</h1>
            <p class="desc-text">
                (주)결은 실내건축공사업 면허를 보유한 전문 인테리어 법인입니다.<br>
                교육 시설 및 공공기관 프로젝트에서 쌓아온 풍부한 경험을 바탕으로<br>
                단순한 시공을 넘어 공간의 새로운 가치를 창출합니다.
            </p>
            <a href="portfolio.html" class="btn-more">VIEW PORTFOLIO</a>
        </div>
        <div class="img-side">
            <img src="https://images.unsplash.com/photo-1524995997946-a1c2e315a42f?q=80&w=2000" alt="KYEOL Interior">
        </div>
    </div>
</body>
</html>
