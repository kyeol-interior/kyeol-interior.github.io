<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ABOUT</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display&family=Montserrat:wght@300;500&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  background: #111;
  color: white;
  font-family: 'Montserrat', sans-serif;
}

/* 전체 */
.container {
  max-width: 1000px;
  margin: auto;
  padding: 120px 40px;
}

/* 🔥 메인 문장 */
.title {
  font-family: 'Playfair Display';
  font-size: 48px;
  line-height: 1.4;
  letter-spacing: 2px;
}

/* 설명 */
.desc {
  margin-top: 50px;
  font-size: 15px;
  line-height: 1.9;
  opacity: 0.7;
}

/* 🔥 정보 영역 */
.info {
  margin-top: 100px;
  display: flex;
  gap: 40px;
  flex-wrap: wrap;
}

.info-box {
  flex: 1;
  min-width: 200px;
  border-top: 1px solid rgba(255,255,255,0.2);
  padding-top: 20px;
}

.info-title {
  font-size: 13px;
  letter-spacing: 2px;
  opacity: 0.6;
}

.info-desc {
  margin-top: 10px;
  font-size: 14px;
}

/* 🔥 하단 여백 */
.space {
  height: 200px;
}

/* 뒤로가기 */
.back {
  position: fixed;
  top: 30px;
  left: 30px;
  font-size: 12px;
  letter-spacing: 2px;
  cursor: pointer;
  opacity: 0.6;
}

.back:hover {
  opacity: 1;
}

/* 🔥 모바일 */
@media (max-width: 768px) {
  .title {
    font-size: 32px;
  }
}
</style>
</head>

<body>

<div class="back" onclick="goBack()">← BACK</div>

<div class="container">

  <!-- 🔥 메인 문장 -->
  <div class="title">
    공간은 기능을 넘어,<br>
    브랜드의 가치를 담습니다.
  </div>

  <!-- 🔥 설명 -->
  <div class="desc">
    KYEOL은 공간의 결을 읽고,<br>
    감성과 기능이 균형을 이루는 디자인을 추구합니다.<br><br>

    우리는 단순한 인테리어를 넘어,<br>
    브랜드의 정체성과 경험을 설계합니다.<br><br>

    절제된 디자인과 깊이 있는 디테일을 통해<br>
    오래 기억되는 공간을 만들어갑니다.
  </div>

  <!-- 🔥 핵심 정보 -->
  <div class="info">

    <div class="info-box">
      <div class="info-title">INTERIOR ARCHITECTURE</div>
      <div class="info-desc">
        상업공간 및 주거공간 설계<br>
        공간 기획 및 브랜딩 디자인
      </div>
    </div>

    <div class="info-box">
      <div class="info-title">CORPORATION</div>
      <div class="info-desc">
        법인사업자 운영<br>
        체계적인 프로젝트 관리 시스템
      </div>
    </div>

    <div class="info-box">
      <div class="info-title">SOCIAL VALUE</div>
      <div class="info-desc">
        장애인기업 인증<br>
        사회적 가치 실현과 지속 가능한 디자인
      </div>
    </div>

  </div>

  <div class="space"></div>

</div>

<script>
function goBack() {
  window.history.back();
}
</script>

</body>
</html>
