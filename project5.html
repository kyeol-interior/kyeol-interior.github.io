<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KYEOL | EXTERIOR STONE WORK</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">
<style>
body { margin: 0; font-family: 'Montserrat', sans-serif; background: #0a0a0a; color: white; overflow-x: hidden; }
.nav-header { position: fixed; top: 50px; left: 50px; z-index: 1000; }
.back-btn { color: white; text-decoration: none; font-size: 10px; letter-spacing: 4px; opacity: 0.5; cursor: pointer; background: none; border: none; text-transform: uppercase; }
.container { display: flex; min-height: 100vh; }
.left { width: 40%; height: 100vh; position: fixed; left: 0; top: 0; padding: 180px 80px 80px; box-sizing: border-box; overflow-y: auto; background: #0a0a0a; }
.title { font-size: 26px; letter-spacing: 5px; margin-bottom: 50px; font-weight: 500; }
.meta { display: flex; flex-direction: column; gap: 25px; margin-bottom: 50px; }
.meta-item span { display: block; font-size: 9px; letter-spacing: 3px; opacity: 0.3; text-transform: uppercase; margin-bottom: 8px; }
.meta-item p { margin: 0; font-size: 13px; opacity: 0.8; }
.desc { line-height: 2.2; font-size: 13px; font-weight: 300; opacity: 0.6; }
.right { width: 60%; margin-left: 40%; background: #0d0d0d; padding: 100px 0; }
.image-box { width: 75%; max-width: 650px; margin: 0 auto 60px; }
.image-box img { width: 100%; height: auto; display: block; filter: brightness(0.9); border-radius: 2px; }
@media (max-width: 768px) {
  .container { flex-direction: column; }
  .left { position: relative; width: 100%; height: auto; padding: 120px 30px 40px; }
  .right { width: 100%; margin-left: 0; padding: 40px 0; }
  .image-box { width: 90%; }
}
</style>
</head>
<body>
<nav class="nav-header"><button class="back-btn" onclick="history.back()">← BACK TO LIST</button></nav>
<div class="container">
  <aside class="left">
    <div class="title">파벽돌 조적 작업<br>(치치석/컬처스톤)</div>
    <div class="meta">
      <div class="meta-item"><span>Project</span><p>🏛️ 공간 컨셉: "집의 살결을 빚다"</p></div>
      <div class="meta-item"><span>Interior Surface</span><p>400㎡</p></div>
      <div class="meta-item"><span>Location</span><p>전주</p></div>
    </div>
    <div class="desc">
      "세월의 깊이를 쌓아 올리다"<br><br>
      새하얀 외벽 아래 거칠고 불규칙한 질감의 파벽돌을 붙여나가는 것은 집에 '이야기'와 '안정감'을 부여하는 일입니다.<br><br>
      마치 오랜 세월 그 자리를 지켜온 듯한 묵직한 멋을 더해주며, 코너석 하나까지 신경 쓰는 시공팀의 장인 정신을 담았습니다.
    </div>
  </aside>
  <main class="right">
    <div class="image-box"><img src="29.jpg"></div>
    <div class="image-box"><img src="37.jpg"></div>
    <div class="image-box"><img src="30.jpg"></div>
    <div class="image-box"><img src="31.jpg"></div>
    <div class="image-box"><img src="32.jpg"></div>
    <div class="image-box"><img src="33.jpg"></div>
    <div class="image-box"><img src="34.jpg"></div>
    <div class="image-box"><img src="35.jpg"></div>
    <div class="image-box"><img src="36.jpg"></div>
  </main>
</div>
</body>
</html>
