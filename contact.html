<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CONTACT</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display&family=Montserrat:wght@300;500&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  color: white;
  font-family: 'Montserrat', sans-serif;
}

/* 🔥 배경 */
.hero {
  height: 100vh;
  background: url('image/about.jpg') center/cover no-repeat;
  position: relative;
  display: flex;
  flex-direction: column;
}

/* 어둡게 */
.hero::after {
  content: "";
  position: absolute;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.6);
}

/* 콘텐츠 */
.content {
  position: relative;
  z-index: 2;
  text-align: center;
  margin-top: 120px;
}

/* 제목 */
.title {
  font-family: 'Playfair Display';
  font-size: 42px;
}

/* 정보 */
.info {
  margin-top: 30px;
  line-height: 1.8;
  opacity: 0.8;
}

/* 🔥 버튼 */
.button {
  margin-top: 30px;
  display: inline-block;
  padding: 12px 30px;
  border: 1px solid white;
  text-decoration: none;
  color: white;
  letter-spacing: 2px;
  transition: 0.3s;
}

.button:hover {
  background: white;
  color: black;
  transform: translateY(-3px); /* 🔥 살짝 뜸 */
}

/* 🔥 지도 */
.map {
  position: relative;
  z-index: 2;
  margin-top: auto;
  height: 40vh;
}

.map iframe {
  width: 100%;
  height: 100%;
  border: none;
}

/* 🔥 카카오 고정 버튼 */
.kakao-fixed {
  position: fixed;
  right: 20px;
  bottom: 20px;
  background: #FEE500;
  color: black;
  padding: 12px 18px;
  border-radius: 30px;
  font-size: 13px;
  text-decoration: none;
  font-weight: bold;
  box-shadow: 0 4px 10px rgba(0,0,0,0.3);
  transition: 0.3s;
  z-index: 10;
}

.kakao-fixed:hover {
  transform: scale(1.1);
}

/* 뒤로가기 */
.back {
  position: fixed;
  top: 30px;
  left: 30px;
  z-index: 10;
  cursor: pointer;
  opacity: 0.6;
}

/* 모바일 */
@media (max-width: 768px) {
  .title {
    font-size: 26px;
  }

  .map {
    height: 35vh;
  }
}
</style>
</head>

<body>

<div class="back" onclick="goBack()">← BACK</div>

<div class="hero">

  <div class="content">

    <div class="title">
      함께 공간을 만들어보세요
    </div>

    <div class="info">
      📍 전북특별자치도 전주시 완산구 백제대로112 / 3F<br>
      📞 1551-9909<br>
      ✉️ kyeol999@naver.com
    </div>

    <a href="https://pf.kakao.com/_bTIEX/friend" target="_blank" class="button">
      CONTACT US
    </a>

  </div>

  <!-- 🔥 네이버 지도 -->
  <div class="map">
    <iframe src="https://map.naver.com/p/search/전북특별자치도%20전주시%20완산구%20백제대로112"></iframe>
  </div>

</div>

<!-- 🔥 카카오 고정 버튼 -->
<a href="https://pf.kakao.com/_bTIEX/friend" target="_blank" class="kakao-fixed">
  카카오 문의
</a>

<script>
function goBack() {
  window.history.back();
}
</script>

</body>
</html>
