<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CONTACT | (주)결</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Noto+Sans+KR:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        /* [1] 네비게이션 스타일 (디자인 통일) */
        * { margin:0; padding:0; box-sizing:border-box; -webkit-font-smoothing: antialiased; }
        body { background:#000; font-family: 'Noto Sans KR', sans-serif; color:#fff; overflow-x:hidden; }
        
        nav { 
            position:fixed; top:0; width:100%; height:80px; 
            display:flex; justify-content:space-between; align-items:center; 
            padding:0 50px; background:rgba(0,0,0,0.5); z-index:1000; 
            border-bottom: 1px solid rgba(255,255,255,0.1);
            backdrop-filter: blur(10px); /* 뒤 배경 살짝 흐리게 고급처리 */
        }
        .logo { font-family: 'Playfair Display', serif; font-size:24px; font-weight:700; text-decoration:none; color:#fff; letter-spacing:4px; }
        
        .nav-links { display:flex; gap:35px; }
        .nav-links a { text-decoration:none; color:rgba(255,255,255,0.6); font-size:13px; letter-spacing:2px; font-weight:400; transition: 0.3s; }
        .nav-links a.active { color:#fff; font-weight:700; }

        .menu-btn { display: none; cursor: pointer; flex-direction: column; gap: 6px; z-index: 1002; }
        .menu-btn span { width: 22px; height: 2px; background: #fff; transition: 0.3s; }

        /* 모바일 드롭다운 */
        .mobile-nav {
            position: fixed; top: 70px; left: 0; width: 100%; 
            background: #fff; display: none; flex-direction: column; padding: 15px 0;
            z-index: 1100;
        }
        .mobile-nav a { padding: 15px 30px; text-decoration: none; color: #111; font-size: 14px; font-weight: 500; border-bottom: 1px solid #f9f9f9; }

        /* [2] 컨택트 메인 섹션 */
        .hero {
            height: 100vh;
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('image/about.jpg') center/cover no-repeat;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 0 20px;
        }

        .title { font-family: 'Playfair Display', serif; font-size: 42px; font-weight: 700; margin-bottom: 30px; letter-spacing: -1px; }
        .info { font-size: 16px; line-height: 2; color: rgba(255,255,255,0.8); font-weight: 300; margin-bottom: 40px; }
        .info b { color: #fff; font-weight: 700; }

        .button {
            display: inline-block;
            padding: 15px 40px;
            border: 1px solid #fff;
            text-decoration: none;
            color: #fff;
            font-size: 12px;
            letter-spacing: 3px;
            transition: 0.4s;
        }
        .button:hover { background: #fff; color: #000; transform: translateY(-5px); }

        /* [3] 지도 영역 */
        .map-section { width: 100%; height: 45vh; background: #111; position: relative; }
        .map-section iframe { width: 100%; height: 100%; border: none; filter: grayscale(1) invert(0.9); /* 지도를 흑백톤으로 세련되게 */ }

        /* [4] 카카오 플로팅 버튼 */
        .kakao-fixed {
            position: fixed; right: 30px; bottom: 30px;
            background: #FEE500; color: #3c1e1e;
            padding: 15px 25px; border-radius: 50px;
            font-size: 14px; text-decoration: none; font-weight: 700;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            z-index: 1001; transition: 0.3s;
        }
        .kakao-fixed:hover { transform: scale(1.1); background: #fada00; }

        /* 📱 모바일 최적화 */
        @media (max-width: 1024px) {
            nav { padding: 0 25px; height: 70px; }
            .logo { font-size: 20px; }
            .nav-links { display: none; } 
            .menu-btn { display: flex; } 
            
            .title { font-size: 28px; }
            .info { font-size: 14px; }
            .map-section { height: 35vh; }
        }
    </style>
</head>
<body>

    <nav>
        <a href="index.html" class="logo">KYEOL</a>
        <div class="nav-links">
            <a href="about.html">ABOUT</a>
            <a href="portfolio.html">PORTFOLIO</a>
            <a href="proposal.html">PROPOSAL</a>
            <a href="contact.html" class="active">CONTACT</a>
        </div>
        <div class="menu-btn" id="menuToggle">
            <span></span><span></span><span></span>
        </div>
    </nav>

    <div class="mobile-nav" id="dropdown">
        <a href="about.html">ABOUT</a>
        <a href="portfolio.html">PORTFOLIO</a>
        <a href="proposal.html">PROPOSAL</a>
        <a href="contact.html">CONTACT</a>
    </div>

    <div class="hero">
        <h1 class="title">함께 공간을 만들어보세요</h1>
        <div class="info">
            📍 <b>전북특별자치도 전주시 완산구 백제대로 112, 3F</b><br>
            📞 1551-9909<br>
            ✉️ kyeol999@naver.com
        </div>
        <a href="https://pf.kakao.com/_bTIEX/friend" target="_blank" class="button">CONTACT US</a>
    </div>

    <div class="map-section">
        <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3230.3456729577714!2d127.1264423!3d35.815999!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x357022e3650f968f%3A0xe54e6093557e054b!2z7KCE67aB7Yq567OE7J6Q7LmY64-EIOyghOyevOyLnCDsmKjsgrDqtewg67Cx7KCc64yA66GcIDExMg!5e0!3m2!1sko!2skr!4v1711234567890!5m2!1sko!2skr" allowfullscreen="" loading="lazy"></iframe>
    </div>

    <a href="https://pf.kakao.com/_bTIEX/friend" target="_blank" class="kakao-fixed">
        카카오톡 실시간 문의
    </a>

    <script>
        const menuToggle = document.getElementById('menuToggle');
        const dropdown = document.getElementById('dropdown');
        
        menuToggle.onclick = (e) => { 
            e.stopPropagation();
            dropdown.style.display = (dropdown.style.display === 'flex') ? 'none' : 'flex'; 
        };

        window.onclick = () => { dropdown.style.display = 'none'; }
    </script>
</body>
</html>
